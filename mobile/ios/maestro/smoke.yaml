# Maestro smoke flow — gates every TestFlight upload.
#
# Boots the iOS simulator with the freshly-built .app, launches it,
# and asserts the toggle screen is reachable + the account ID is
# present in the Keychain (proxy for first-launch ID generation).
#
# Runs in CI BEFORE `eas submit` — if this flow fails, no TestFlight
# upload. Encoded per the expo-ios-pipeline skill recipe.
appId: io.iogrid.app
---
- launchApp:
    clearState: true
    clearKeychain: true

# First-launch contract:
#   - No login screen appears
#   - Main toggle screen renders within 5s
#   - Toggle is in OFF state
- assertVisible:
    text: "iogrid"
    timeout: 5000

- assertVisible:
    id: "vpn-toggle"
    timeout: 3000

- assertVisible:
    text: "OFF"

# Region picker is reachable
- tapOn:
    id: "region-picker-row"
- assertVisible:
    text: "Best (auto)"
- tapOn:
    text: "Best (auto)"

# Back on the toggle screen, account ID is shown in settings
- tapOn:
    id: "settings-button"
- assertVisible:
    text: "Account number"

# Tapping ON the toggle from the settings-screen → toggle screen → ON
# should not crash + should reach CONNECTING within 3s (we don't
# verify CONNECTED end-to-end here — that needs a live provider and
# is the C2 + #565 test, not the smoke gate)
- back
- tapOn:
    id: "vpn-toggle"
- assertVisible:
    text: "CONNECTING"
    timeout: 3000
