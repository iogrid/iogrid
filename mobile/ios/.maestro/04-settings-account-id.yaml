appId: io.iogrid.app
---
# Settings screen renders + the account-number row is present. Full
# Keychain-backed generator lands in #569 — for v1 we just check the
# label so the smoke catches regressions in the settings navigation
# / IPC bridge wiring.
# Cold-restart the app so we always start on /index regardless of
# where the previous flow left navigation. Flow 03 dropped its `back`
# step (Maestro's iOS back gesture isn't reliable for Expo Router
# stacks — see CONTRIBUTING.md gotcha 23) so without this we'd be
# stranded on /regions and `tapOn settings-button` would miss.
- launchApp:
    clearState: false
    stopApp: true

- tapOn:
    id: "settings-button"

- assertVisible:
    text: "Settings"
- assertVisible: "Account number"

- takeScreenshot: 04-settings-account-id
# Drop the back+assertVisible housekeeping for the same reason flow
# 03 did — Maestro's `back` on iOS is unreliable, and flow 05 starts
# with explicit clearState + clearKeychain so it doesn't care where
# we end up.
