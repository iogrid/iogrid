appId: io.iogrid.app
---
# Region picker:
#   - reachable via the testID region-picker-row on the toggle screen
#   - "Best (auto)" pinned at top + selected by default on first launch
#   - search input narrows the list
#   - selection persists across the back navigation (toggle screen
#     reflects the new label)
- launchApp

- tapOn:
    id: "region-picker-row"

- assertVisible:
    id: "region-row-auto"
# The literal label is "Best (auto)" but Maestro's `assertVisible: "string"`
# short form treats the value as a REGEX. The parens become a capture
# group, so the pattern `Best (auto)` matches "Best auto" (no parens)
# but NOT the on-screen "Best (auto)" with literal parens — the gate
# fails even though the row IS there. Match the literal-text portion
# only; the testID assertion above already proves the row exists.
- assertVisible: "Best"

# Search input narrows the list. Until coordinator returns rows the
# search is mostly cosmetic; this asserts the field exists + accepts
# input without crashing (catches a regression in the FlatList /
# TextInput controlled-state wiring).
- tapOn:
    id: "region-search"
- inputText: "us"
- hideKeyboard
- assertVisible:
    id: "region-row-auto"   # auto stays visible because of "search through label" doesn't strip it

- takeScreenshot: 03-region-picker-search

- back
- assertVisible:
    id: "vpn-toggle"
