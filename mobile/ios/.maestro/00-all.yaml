appId: io.iogrid.app
---
# Master flow — orchestrates the v2 iogrid iOS smoke suite in
# dependency order. `maestro test .maestro/` parallelizes flows which
# breaks chained scenarios (later flows reuse state from earlier ones).
#
# CI invokes this single file, NOT the directory (vcard pattern that
# learned this the hard way).
#
# v2 coverage (8 flows replacing the v1 set):
#   01 — onboarding (welcome → privacy → sign-in)
#   02 — sign-in (mocked Apple credential)
#   03 — wallet-connect (mocked Phantom/Ping handshake)
#   04 — main DISCONNECTED (post-onboarding home screen)
#   05 — main CONNECTING (tap connect, observe step list)
#   06 — main CONNECTED (egress IP visible, stats card, disconnect)
#   07 — region picker (auto pinned, search, country expand, city pick)
#   08 — settings (account row + sign-out)
#   09 — top up (quick amount + payment method + Continue)
#   10 — mobile session bring-up against LIVE coordinator (#588, #605)
#        — DEGRADED 503 path; runs LAST so the failing connect attempt
#        leaves a clean OFF state for the suite teardown.
#
# Gotchas observed during v1:
#   - No `- back` (gotcha 23) — flows cold-restart instead
#   - No regex-poisoned text assertions on Pressable+Text (gotcha 21+21b)
#     — prefer testID assertions for tappable rows
#   - Each subflow is wrapped in `retry` (maxRetries: 2): every flow
#     begins with its own launchApp, and the simulator relaunch is the
#     #575-family flake point — runs 26914283867 + 26918273935 both died
#     mid-chain ("App crashed or stopped", NO crash signature in the sim
#     log) at DIFFERENT flows. A retry re-runs just the flaky subflow
#     (app state persists across relaunch) instead of killing the chain.
- retry:
    maxRetries: 2
    commands:
      - runFlow: 01-onboarding.yaml
- retry:
    maxRetries: 2
    commands:
      - runFlow: 02-sign-in.yaml
- retry:
    maxRetries: 2
    commands:
      - runFlow: 03-wallet-connect.yaml
- retry:
    maxRetries: 2
    commands:
      - runFlow: 04-main-disconnected.yaml
- retry:
    maxRetries: 2
    commands:
      - runFlow: 05-main-connecting.yaml
- retry:
    maxRetries: 2
    commands:
      - runFlow: 06-main-connected.yaml
- retry:
    maxRetries: 2
    commands:
      - runFlow: 07-region-picker.yaml
- retry:
    maxRetries: 2
    commands:
      - runFlow: 08-settings.yaml
- retry:
    maxRetries: 2
    commands:
      - runFlow: 09-topup.yaml
- retry:
    maxRetries: 2
    commands:
      - runFlow: 10-mobile-session-live.yaml
