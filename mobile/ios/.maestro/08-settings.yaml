appId: io.iogrid.app
---
# Settings flow.
#
# Cold-restart to land at /index, tap settings-button, assert the
# canonical rows render (account, wallet, kill-switch, sign-out).

- launchApp:
    clearState: false
    stopApp: true

- tapOn:
    id: "settings-button"

- assertVisible:
    id: "settings-row-account-apple"
- assertVisible:
    id: "settings-row-account-wallet"
- assertVisible:
    id: "settings-row-kill-switch"
- assertVisible:
    id: "settings-sign-out"

- takeScreenshot: 08-settings
