appId: io.iogrid.app
---
# Settings flow.
#
# Cold-restart to land at /index, tap settings-button, assert the
# canonical rows render (account, wallet, kill-switch, sign-out).

- launchApp:
    clearState: false
    stopApp: true

- tapOn:
    id: "settings-button"

- assertVisible:
    id: "settings-row-account-apple"
- assertVisible:
    id: "settings-row-account-wallet"
- assertVisible:
    id: "settings-row-kill-switch"

# The Sign out section is the LAST group on the screen — below the fold on
# the CI simulator viewport (run 26903231905's failure screenshot shows the
# screen ending at "Version 1.0.0"). assertVisible requires the element in
# the viewport, so scroll to it first. This was the first-ever Maestro
# execution's only failure (flows 01-07 passed); app rendering was correct.
- scrollUntilVisible:
    element:
      id: "settings-sign-out"
    direction: DOWN

- assertVisible:
    id: "settings-sign-out"

- takeScreenshot: 08-settings
