appId: io.iogrid.app
---
# Main screen — CONNECTED state.
#
# Real tunnel won't actually establish on simulator (PacketTunnelProvider
# isn't connectable in the simulator host). In MAESTRO_MODE, the mock
# coordinator returns a synthetic CONNECTED session. The Track 3
# TunnelControl stub fires onStatusChange('connected') which advances
# the JS state machine.
#
# v1 of this flow is intentionally permissive: assert connect-button is
# present, tap it, then assert SOMETHING tunnel-related appears. The
# strict CONNECTED-side assertions land once Track 3 ships the real
# tunnel + the simulator mock harness.

- launchApp:
    clearState: false
    stopApp: true

- tapOn:
    id: "connect-button"

# CONNECTED is DEVICE-ONLY: the state is driven by NEVPNStatusDidChange
# (index.tsx status machine) and NetworkExtension never connects on the
# simulator — the connect attempt 503s/fails and the app honestly returns
# to OFF. Run 26927050194 proved a hard egress-ip wait can NEVER pass on
# CI (the old connect-button anchor had been passing trivially instead).
# optional:true = verifies the egress-ip row when a real device runs this
# suite (#574 TestFlight walk), no-ops on the simulator. The flow's CI
# value is the capture of the post-tap steady state.
- extendedWaitUntil:
    visible:
      id: "egress-ip"
    timeout: 30000
    optional: true

- takeScreenshot: 06-main-connected
