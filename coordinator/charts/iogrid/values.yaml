# Default values for the iogrid coordinator chart.
#
# Every microservice is rendered from the same Deployment / Service /
# ServiceAccount / HPA / NetworkPolicy templates by iterating `.Values.services`.
# Override a single service via:
#   helm install iogrid ./charts/iogrid \
#     --set services.identity-svc.image.tag=abc123 \
#     --set services.identity-svc.replicaCount=3

# -- Global image registry shared by every service unless overridden per-service.
imageRegistry: ghcr.io/iogrid

# -- Container image pull policy used when no per-service override is set.
imagePullPolicy: IfNotPresent

# -- Shared image-pull secrets (e.g. for ghcr.io private repos).
imagePullSecrets: []

# -- Defaults applied to every service. Per-service blocks override individual keys.
defaults:
  replicaCount: 2
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
  env: []
  # Per-service Volumes / VolumeMounts. Empty by default; services
  # that need to mount Secrets/ConfigMaps as files (e.g. billing-svc's
  # Solana hot-wallet keypair) override these.
  volumes: []
  volumeMounts: []
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /readyz
      port: 8080
    initialDelaySeconds: 3
    periodSeconds: 5

# -- Per-service configuration. Add new microservices here without touching the templates.
services:
  identity-svc:
    image:
      repository: identity-svc
      tag: latest
  providers-svc:
    image:
      repository: providers-svc
      tag: latest
  workloads-svc:
    image:
      repository: workloads-svc
      tag: latest
  antiabuse-svc:
    image:
      repository: antiabuse-svc
      tag: latest
    # Operator deny-list (BLOCK_DOMAINS). Empty by default; staging /
    # e2e overlays pre-seed known-bad fixtures here, prod sources from
    # the DB-backed loader (issue #72).
    env:
      - name: BLOCK_DOMAINS
        value: ""
  billing-svc:
    image:
      repository: billing-svc
      tag: latest
    # Phase 0 wiring for the $GRID Solana SPL token payout loop.
    # - These env vars carry non-sensitive devnet defaults (RPC URL,
    #   program, cron schedule). Override per-environment in the
    #   overlay or via `--set services.billing-svc.env[N]=...`.
    # - Secret `iogrid-solana-payout` holds the 64-byte keypair JSON
    #   (mounted as a file at /var/run/solana/keypair.json) AND the
    #   base58 mint address (referenced via secretKeyRef). Both keys
    #   are optional — billing-svc logs "stub mode" and keeps serving
    #   Stripe/usage routes when unset.
    # - See docs/SOLANA.md for the full operator runbook.
    env:
      - name: SOLANA_RPC_URL
        value: "https://api.devnet.solana.com"
      - name: SOLANA_HOT_WALLET_KEYPAIR_PATH
        value: "/var/run/solana/keypair.json"
      - name: GRID_TOKEN_PROGRAM
        value: "token-2022"
      - name: JUPITER_API_URL
        value: "https://quote-api.jup.ag/v6"
      - name: BURN_PERCENTAGE
        value: "2"
      - name: BURN_VIA_INCINERATOR
        value: "true"
      - name: INCINERATOR_ADDRESS
        value: "1nc1nerator11111111111111111111111111111111"
      - name: DAILY_PAYOUT_ENABLED
        value: "true"
      - name: DAILY_PAYOUT_CRON
        value: "5 0 * * *"
      - name: GRID_TOKEN_MINT_ADDRESS
        valueFrom:
          secretKeyRef:
            name: iogrid-solana-payout
            key: grid_token_mint_address
            optional: true
    volumes:
      - name: solana-keypair
        secret:
          secretName: iogrid-solana-payout
          optional: true
          defaultMode: 0400
          items:
            - key: keypair_json
              path: keypair.json
    volumeMounts:
      - name: solana-keypair
        mountPath: /var/run/solana
        readOnly: true
  telemetry-svc:
    image:
      repository: telemetry-svc
      tag: latest
  gateway-bff:
    image:
      repository: gateway-bff
      tag: latest
  proxy-gateway:
    image:
      repository: proxy-gateway
      tag: latest
    # proxy-gateway is data-plane: scale horizontally aggressively.
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 50
      targetCPUUtilizationPercentage: 60
  build-gateway:
    image:
      repository: build-gateway
      tag: latest

# -- NetworkPolicy stubs. Only intra-mesh + ingress allowed by default.
networkPolicy:
  enabled: true
  # CIDR of the in-cluster mesh (overlay). Override per-environment.
  podCIDR: 10.0.0.0/8
  # Allow ingress controller to reach gateway-bff / proxy-gateway / build-gateway.
  ingressNamespace: ingress-nginx
  # SPIFFE-style mutual auth via Cilium 1.14+ (issue #35).
  # When enabled, a CiliumNetworkPolicy per service requires SPIRE-backed
  # mTLS on every intra-mesh ingress. Off by default so the chart still
  # renders cleanly on clusters without Cilium (kindnet dev overlay).
  mutualAuth:
    enabled: false
