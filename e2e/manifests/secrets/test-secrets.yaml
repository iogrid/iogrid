# test-secrets.yaml — static stub secrets for the e2e kind harness.
#
# ⚠️  THESE ARE NOT REAL CREDENTIALS. Every value here is a fixed string
# scoped to the lifetime of the throwaway `kind` cluster created by
# `e2e/bootstrap.sh`. Nothing in this file leaks outside the cluster
# boundary, and the cluster is destroyed by `make down` after every run.
#
# This file is referenced by `bootstrap.sh` (line ~38):
#     kubectl -n iogrid apply -f manifests/secrets/test-secrets.yaml
#
# It is force-tracked despite the repo-wide `secrets/` .gitignore rule via a
# negation in the root `.gitignore` (`!e2e/manifests/secrets/test-secrets.yaml`).
# Do NOT put real secrets here — the negation is intentionally scoped to this
# one fixture path only.
#
# Secret inventory (all referenced by manifests/services/*.yaml + postgres.yaml):
#   - postgres-credentials   POSTGRES_PASSWORD + per-service DSNs
#   - identity-svc-secrets   identity-svc envFrom (JWT autogen + Google stubs)
#   - identity-svc-jwt       mounted volume (kept minimal; svc autogens its keypair)
#   - billing-svc-secrets    billing-svc envFrom
#   - proxy-gateway-secrets  proxy-gateway envFrom
---
# Postgres superuser password + per-service connection strings.
# DSNs point at the in-cluster `postgres` Service (postgres:5432, user
# `postgres`). The per-service databases (identity/providers/workloads/
# antiabuse/billing/telemetry) are CREATE DATABASE'd by bootstrap.sh after
# the postgres rollout. sslmode=disable because the e2e postgres is plain
# (no TLS) — prod uses CNPG with TLS, which the harness deliberately omits.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  labels:
    app.kubernetes.io/part-of: iogrid
    iogrid.org/e2e-fixture: "true"
type: Opaque
stringData:
  POSTGRES_PASSWORD: "e2e-postgres-not-a-real-secret"
  IDENTITY_DSN: "postgres://postgres:e2e-postgres-not-a-real-secret@postgres:5432/identity?sslmode=disable"
  PROVIDERS_DSN: "postgres://postgres:e2e-postgres-not-a-real-secret@postgres:5432/providers?sslmode=disable"
  WORKLOADS_DSN: "postgres://postgres:e2e-postgres-not-a-real-secret@postgres:5432/workloads?sslmode=disable"
  ANTIABUSE_DSN: "postgres://postgres:e2e-postgres-not-a-real-secret@postgres:5432/antiabuse?sslmode=disable"
  BILLING_DSN: "postgres://postgres:e2e-postgres-not-a-real-secret@postgres:5432/billing?sslmode=disable"
---
# identity-svc envFrom secret. The service has env-tag defaults for almost
# everything; here we only override what the e2e flow needs:
#   - JWT_KEYPAIR_AUTOGEN=true so the svc generates its own RS256 keypair at
#     boot (written to JWT_AUTOGEN_DIR=/tmp/jwt-keys, an emptyDir). This
#     avoids shipping a real private key in a git-tracked fixture.
#   - Google OAuth stubs so the auto-merge smoke path has non-empty client id.
#   - SMTP_HOST=mailhog so magic-link emails land in MailHog (intercepted by
#     identity-flow.sh). MailHog listens on :1025 (SMTP) with no auth/TLS.
apiVersion: v1
kind: Secret
metadata:
  name: identity-svc-secrets
  labels:
    app.kubernetes.io/part-of: iogrid
    iogrid.org/e2e-fixture: "true"
type: Opaque
stringData:
  JWT_KEYPAIR_AUTOGEN: "true"
  JWT_AUTOGEN_DIR: "/tmp/jwt-keys"
  JWT_ISSUER: "https://identity-svc.iogrid.svc.cluster.local"
  GOOGLE_CLIENT_ID: "e2e-google-client-id.apps.googleusercontent.com"
  GOOGLE_CLIENT_SECRET: "e2e-google-client-secret-not-real"
  SMTP_HOST: "mailhog"
  SMTP_PORT: "1025"
  SMTP_STARTTLS: "false"
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: "no-reply@iogrid.test"
  ALLOWED_RETURN_HOSTS: "localhost,127.0.0.1,iogrid.test,app.iogrid.test"
---
# Mounted-volume secret for identity-svc (/etc/identity/jwt). The deployment
# declares this as a required volume, so it must exist. The service is run
# with JWT_KEYPAIR_AUTOGEN=true (above), so it ignores this mount and
# generates its keypair to /tmp instead — this is intentionally a placeholder
# so the volume mount resolves without shipping real key material.
apiVersion: v1
kind: Secret
metadata:
  name: identity-svc-jwt
  labels:
    app.kubernetes.io/part-of: iogrid
    iogrid.org/e2e-fixture: "true"
type: Opaque
stringData:
  README: |
    Unused at runtime: identity-svc autogenerates its RS256 keypair to
    /tmp/jwt-keys (JWT_KEYPAIR_AUTOGEN=true). This Secret exists only to
    satisfy the required volume mount in manifests/services/identity-svc.yaml.
---
# billing-svc envFrom secret. Stripe/Solana off-ramp creds are stubbed; the
# billing smoke flow exercises the checkout-session path against a disabled
# Stripe client (returns FailedPrecondition cleanly) — no real Stripe call.
apiVersion: v1
kind: Secret
metadata:
  name: billing-svc-secrets
  labels:
    app.kubernetes.io/part-of: iogrid
    iogrid.org/e2e-fixture: "true"
type: Opaque
stringData:
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  SOLANA_RPC_URL: ""
---
# proxy-gateway envFrom secret. The gateway runs with WORKLOADS_SVC_URL="" /
# BILLING_SVC_URL="" (in-memory pool + Static validator), so no upstream
# credentials are required; this Secret exists so the envFrom reference
# resolves.
apiVersion: v1
kind: Secret
metadata:
  name: proxy-gateway-secrets
  labels:
    app.kubernetes.io/part-of: iogrid
    iogrid.org/e2e-fixture: "true"
type: Opaque
stringData:
  PROXY_STATIC_API_KEY: "e2e-proxy-static-key-not-real"
