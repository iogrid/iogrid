# identity-svc — minimal Deployment + Service for e2e.
# Differences vs infra/k8s/base/identity-svc:
#   - 1 replica (vs 2)
#   - Uses postgres-credentials secret instead of envFrom-only
#   - Wires SMTP envs to in-cluster MailHog
#   - Mounts identity-svc-jwt secret as RS256 keypair (test fixture)
#   - relaxes readOnlyRootFilesystem (mailer + JWT keygen write to /tmp)
---
apiVersion: v1
kind: Service
metadata:
  name: identity-svc
  labels: { app.kubernetes.io/name: identity-svc, app.kubernetes.io/part-of: iogrid }
spec:
  selector: { app.kubernetes.io/name: identity-svc }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-svc
  labels: { app.kubernetes.io/name: identity-svc, app.kubernetes.io/part-of: iogrid }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: identity-svc } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: identity-svc, app.kubernetes.io/part-of: iogrid }
    spec:
      containers:
        - name: identity-svc
          image: ghcr.io/iogrid/identity-svc:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - name: LOG_LEVEL
              value: debug
            - name: LISTEN_ADDR
              value: ":8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: IDENTITY_DSN }
            - name: REDIS_URL
              value: ""
          envFrom:
            - secretRef: { name: identity-svc-secrets }
          volumeMounts:
            - { name: jwt, mountPath: /etc/identity/jwt, readOnly: true }
            - { name: tmp, mountPath: /tmp }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
      volumes:
        - name: jwt
          secret: { secretName: identity-svc-jwt }
        - name: tmp
          emptyDir: {}
