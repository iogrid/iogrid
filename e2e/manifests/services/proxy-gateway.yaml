# proxy-gateway — customer SOCKS5/HTTP-CONNECT entrypoint.
# Two ports:
#   - 1080 (proxy listener, plain TCP — no TLS in e2e)
#   - 8080 (HTTP control plane: /healthz, /readyz, /metrics, /v1/)
#
# A NodePort surfaces 1080 -> :30080 on the host (kind extraPortMapping)
# so smoke scripts can hit the proxy directly via 127.0.0.1:30080.
---
apiVersion: v1
kind: Service
metadata:
  name: proxy-gateway
  labels: { app.kubernetes.io/name: proxy-gateway, app.kubernetes.io/part-of: iogrid }
spec:
  selector: { app.kubernetes.io/name: proxy-gateway }
  ports:
    - { name: proxy, port: 1080, targetPort: 1080 }
    - { name: http,  port: 8080, targetPort: 8080 }
---
apiVersion: v1
kind: Service
metadata:
  name: proxy-gateway-nodeport
  labels: { app.kubernetes.io/name: proxy-gateway, app.kubernetes.io/part-of: iogrid }
spec:
  selector: { app.kubernetes.io/name: proxy-gateway }
  type: NodePort
  ports:
    - { name: proxy, port: 1080, targetPort: 1080, nodePort: 30080 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-gateway
  labels: { app.kubernetes.io/name: proxy-gateway, app.kubernetes.io/part-of: iogrid }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: proxy-gateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: proxy-gateway, app.kubernetes.io/part-of: iogrid }
    spec:
      containers:
        - name: proxy-gateway
          image: ghcr.io/iogrid/proxy-gateway:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - { name: proxy, containerPort: 1080 }
            - { name: http,  containerPort: 8080 }
          env:
            - { name: LOG_LEVEL, value: debug }
            - { name: LISTEN_ADDR, value: ":1080" }
            - { name: HEALTH_ADDR, value: ":8080" }
            - { name: ANTIABUSE_SVC_URL, value: "http://antiabuse-svc:8080" }
            - { name: WORKLOADS_SVC_URL, value: "" }   # use in-memory pool
            - { name: BILLING_SVC_URL,   value: "" }   # use Static validator
            - { name: NATS_URL,          value: "nats://nats:4222" }
          envFrom:
            - secretRef: { name: proxy-gateway-secrets }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
