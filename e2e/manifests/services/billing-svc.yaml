---
apiVersion: v1
kind: Service
metadata:
  name: billing-svc
  labels: { app.kubernetes.io/name: billing-svc, app.kubernetes.io/part-of: iogrid }
spec:
  selector: { app.kubernetes.io/name: billing-svc }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-svc
  labels: { app.kubernetes.io/name: billing-svc, app.kubernetes.io/part-of: iogrid }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: billing-svc } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: billing-svc, app.kubernetes.io/part-of: iogrid }
    spec:
      containers:
        - name: billing-svc
          image: ghcr.io/iogrid/billing-svc:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: LOG_LEVEL, value: debug }
            - { name: LISTEN_ADDR, value: ":8080" }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: BILLING_DSN }
            - { name: NATS_URL, value: "nats://nats:4222" }
          envFrom:
            - secretRef: { name: billing-svc-secrets }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
