# releases.iogrid.org — 302-redirect server.
#
# We do NOT host release blobs on-cluster. Every release artifact
# (signed .pkg, signed appcast.xml, Windows .msi, Linux .deb/.rpm/.apk)
# lives on GitHub Releases. The releases container is a thin redirect
# layer that gives Sparkle / iogridd / curl a stable, branded URL
# (releases.iogrid.org/macos/<file>) while the actual bytes flow direct
# from GitHub's CDN to the client.
#
# Why a thin nginx and not a Traefik-only middleware:
#   1. The URL rewrites need ${arg} / ${uri} pattern matching that
#      Traefik's RedirectRegex covers but in a more verbose form per
#      route. Centralising in nginx.conf makes the surface explicit.
#   2. Adding a new channel (Windows, Linux) = one location block here,
#      not a new IngressRoute round-trip through Flux + cert-manager.
#   3. The deploy pattern (image-pin via deploy-bot commit on every
#      push to main) matches marketing-ci's, which has been the most
#      reliable CI shape in the repo since #384.
#
# Refs #392 #348 #387.

server {
    listen 8080 default_server;
    server_name _;

    # k8s liveness/readiness probe + LB health checks.
    location = /healthz {
        access_log off;
        add_header Content-Type "text/plain" always;
        return 200 "ok\n";
    }

    # ----- macOS Sparkle channel ---------------------------------------
    #
    # /macos/appcast.xml is the Sparkle feed URL pinned in
    # installer/macos/app/Contents/Info.plist (`SUFeedURL`). It MUST
    # always resolve to the freshly signed feed — we redirect to the
    # GitHub "latest release" pseudo-tag so the URL auto-tracks the
    # newest tag the publish job has uploaded the appcast.xml asset to.
    #
    # The HTTP redirect chain is:
    #   Sparkle GET  https://releases.iogrid.org/macos/appcast.xml
    #     ↓ 302
    #   GET  https://github.com/iogrid/iogrid/releases/latest/download/appcast.xml
    #     ↓ 302
    #   GET  https://objects.githubusercontent.com/.../appcast.xml
    #
    # `proxy_intercept_errors off` isn't needed because we never proxy —
    # the redirect terminates at nginx; GitHub serves the body.
    location = /macos/appcast.xml {
        # 302 (not 301) so Sparkle clients re-check on every poll —
        # the "latest" pointer can move forward with each tag push and
        # we don't want intermediate caches to pin it.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 302 https://github.com/iogrid/iogrid/releases/latest/download/appcast.xml;
    }

    # Versioned macOS .pkg redirects.
    #
    # The appcast.xml's <enclosure url=...> values are constructed by
    # generate-appcast.sh as `${IOGRID_PKG_URL_BASE}/<basename>` where
    # IOGRID_PKG_URL_BASE = "https://releases.iogrid.org/macos/<version>".
    # That gives URLs like:
    #   https://releases.iogrid.org/macos/v0.1.1/iogrid-0.1.1-arm64.pkg
    # which we redirect to:
    #   https://github.com/iogrid/iogrid/releases/download/v0.1.1/iogrid-0.1.1-arm64.pkg
    #
    # The version segment is captured raw — GH Releases accepts any tag
    # string that matches an existing release. 404 falls through to
    # nginx's default 404 page (which is fine for Sparkle: it treats a
    # missing enclosure as "no update available" rather than crashing).
    location ~ ^/macos/(?<version>[^/]+)/(?<filename>[^/]+\.(pkg|dmg|sha256|sig))$ {
        # Cache the redirect for 5 minutes — version-specific URLs are
        # immutable once published, but Sparkle clients should still
        # follow a fresh redirect after a re-publish (rare; only happens
        # if a tag's assets are replaced, which Phase 1 disallows).
        add_header Cache-Control "public, max-age=300" always;
        return 302 https://github.com/iogrid/iogrid/releases/download/$version/$filename;
    }

    # ----- Phase-0 legacy /latest/ surface -----------------------------
    #
    # Per docs/TRACKER.md the Phase-0 installers shipped under URLs
    # like `https://releases.iogrid.org/latest/iogrid-darwin-arm64.pkg`.
    # That surface is referenced by `marketing/content/installer-manifest.json`
    # (and the /install/* marketing pages) — we MUST keep it alive so a
    # marketing-site refresh doesn't 404 existing install links.
    #
    # The redirect maps the Phase-0 naming convention
    #   iogrid-<os>-<arch>.<ext>
    # to the GH Release "latest" pseudo-tag asset. macOS .pkg assets
    # already match the canonical GH basename; Linux + Windows assets
    # use different GH naming (`iogrid_<ver>_<arch>.deb`,
    # `iogrid-<ver>-1.<arch>.rpm`, `iogrid-<ver>-<arch>.msi`) so each
    # short URL is mapped explicitly. Caught in #348 Phase 2 verifier
    # 2026-05-24 — previously /latest/iogrid-linux-amd64.rpm bounced to
    # /releases/latest because the named asset didn't exist under that
    # filename, breaking marketing /install download links.
    #
    # NOTE: hardcoded `v0.1.0` until the publish job emits short-name
    # symlinked assets (tracked: follow-up after #398 EV cert ships).
    set $iogrid_ver "v0.1.0";
    set $iogrid_ver_bare "0.1.0";

    # macOS .pkg
    location = /latest/iogrid-darwin-arm64.pkg {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 302 https://github.com/iogrid/iogrid/releases/download/$iogrid_ver/iogrid-$iogrid_ver_bare-arm64.pkg;
    }
    location = /latest/iogrid-darwin-amd64.pkg {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 302 https://github.com/iogrid/iogrid/releases/download/$iogrid_ver/iogrid-$iogrid_ver_bare-amd64.pkg;
    }

    # Linux .deb (`iogrid_<ver>_<arch>.deb`)
    location = /latest/iogrid-linux-amd64.deb {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 302 https://github.com/iogrid/iogrid/releases/download/$iogrid_ver/iogrid_${iogrid_ver_bare}_amd64.deb;
    }
    location = /latest/iogrid-linux-arm64.deb {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 302 https://github.com/iogrid/iogrid/releases/download/$iogrid_ver/iogrid_${iogrid_ver_bare}_arm64.deb;
    }

    # Linux .rpm (`iogrid-<ver>-1.<arch>.rpm`; RPM uses x86_64/aarch64)
    location = /latest/iogrid-linux-amd64.rpm {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 302 https://github.com/iogrid/iogrid/releases/download/$iogrid_ver/iogrid-$iogrid_ver_bare-1.x86_64.rpm;
    }
    location = /latest/iogrid-linux-arm64.rpm {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 302 https://github.com/iogrid/iogrid/releases/download/$iogrid_ver/iogrid-$iogrid_ver_bare-1.aarch64.rpm;
    }

    # Linux .apk (`iogrid_<ver>_<arch>.apk`; apk uses x86_64/aarch64)
    location = /latest/iogrid-linux-amd64.apk {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 302 https://github.com/iogrid/iogrid/releases/download/$iogrid_ver/iogrid_${iogrid_ver_bare}_x86_64.apk;
    }
    location = /latest/iogrid-linux-arm64.apk {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 302 https://github.com/iogrid/iogrid/releases/download/$iogrid_ver/iogrid_${iogrid_ver_bare}_aarch64.apk;
    }

    # Windows .msi (`iogrid-<ver>-x64.msi`)
    location = /latest/iogrid-windows-amd64.msi {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 302 https://github.com/iogrid/iogrid/releases/download/$iogrid_ver/iogrid-$iogrid_ver_bare-x64.msi;
    }

    # Fallback for anything else under /latest/ — tries GH latest/download
    # pseudo-tag. If basename absent on the latest release, GH returns 404.
    location ~ ^/latest/(?<filename>[^/]+)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 302 https://github.com/iogrid/iogrid/releases/latest/download/$filename;
    }

    # ----- Future channels (Linux + Windows manifestd) -----------------
    #
    # The Linux/Windows auto-update protocol (#348 Phase 2) uses a JSON
    # manifest at https://updates.iogrid.org/manifest.json instead of
    # Sparkle's RSS feed. Those routes will land in a follow-up PR on
    # the `updates` hostname; the IngressRoute already accepts both
    # hostnames against this same Service (see ingressroute-releases.yaml).

    # ----- Repository root / index -------------------------------------
    #
    # GET / returns a tiny human-readable HTML stub so an operator who
    # types `releases.iogrid.org` into a browser doesn't see Traefik's
    # 404 default backend (which has historically been confused for an
    # outage). Refs feedback on #384 default-backend cleanup.
    location = / {
        add_header Content-Type "text/html; charset=utf-8" always;
        add_header Cache-Control "public, max-age=300" always;
        return 200 '<!DOCTYPE html><html><head><title>iogrid releases</title><meta name="robots" content="noindex"></head><body><h1>iogrid releases</h1><p>This host serves the iogrid auto-update channels. Browse releases at <a href="https://github.com/iogrid/iogrid/releases">github.com/iogrid/iogrid/releases</a>.</p><ul><li><code>/macos/appcast.xml</code> — Sparkle feed for the macOS daemon</li><li><code>/macos/&lt;version&gt;/iogrid-&lt;version&gt;-&lt;arch&gt;.pkg</code> — versioned macOS installers</li><li><code>/latest/iogrid-&lt;os&gt;-&lt;arch&gt;.&lt;ext&gt;</code> — Phase-0 installer URLs</li></ul></body></html>';
    }

    # Security headers — mirror marketing/nginx.conf's posture.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
