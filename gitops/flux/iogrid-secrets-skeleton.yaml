# iogrid secrets skeleton — DO NOT APPLY AS-IS.
#
# This file documents the EXACT Secret key set that the iogrid base
# manifests (infra/k8s/base/*) expect to find in the iogrid namespace
# at reconcile time. The founder fills in real values out-of-band:
#   - via sealed-secrets (bitnami): seal each Secret to a SealedSecret CR
#     and commit those SealedSecrets to a private ops repo.
#   - via external-secrets (ESO): create ExternalSecret CRs that pull
#     from the cluster's secret store (1Password, Vault, AWS SSM, etc.)
#     and synthesise the Secrets listed here.
#   - or, for Phase 0 quick-start, paste real values directly with the
#     `kubectl create secret` commands at the bottom of this file.
#
# Issue: https://github.com/iogrid/iogrid/issues/201
#
# Convention:
#   - Each Secret is in the `iogrid` namespace.
#   - Naming follows the existing chart references in
#     infra/k8s/base/*/deployment.yaml — DO NOT rename without auditing
#     every envFrom/secretKeyRef.
#   - All values shown as `# FILL IN — <how to obtain>` placeholders.

# ============================================================================
# 1. Google OAuth — identity-svc social sign-in
# ============================================================================
# How to obtain:
#   - https://console.cloud.google.com/apis/credentials
#   - Create OAuth 2.0 Client ID, type=Web application.
#   - Authorized redirect URIs: https://app.iogrid.org/auth/google/callback
#   - Copy the Client ID + Client secret.
---
apiVersion: v1
kind: Secret
metadata:
  name: iogrid-google-oauth
  namespace: iogrid
type: Opaque
stringData:
  client_id: "# FILL IN — Google Cloud Console > APIs & Services > Credentials"
  client_secret: "# FILL IN — same place; treat as production secret"

# ============================================================================
# 2. Stalwart SMTP — outbound transactional email (verification, billing, etc.)
# ============================================================================
# How to obtain:
#   - On bastion: ssh root@mail.openova.io, see /etc/stalwart/credentials.
#   - Or call the Stalwart admin API as `admin` to create a service
#     principal scoped to iogrid (preferred — don't reuse a human mailbox).
#   - Endpoint is mail.openova.io:587 (STARTTLS) or :465 (SMTPS).
---
apiVersion: v1
kind: Secret
metadata:
  name: iogrid-smtp
  namespace: iogrid
type: Opaque
stringData:
  host: "mail.openova.io"
  port: "587"
  username: "# FILL IN — Stalwart service principal username (e.g. iogrid-noreply@iogrid.org)"
  password: "# FILL IN — Stalwart service principal password"
  from_address: "noreply@iogrid.org"
  from_name: "iogrid"

# ============================================================================
# 3. CNPG Postgres connection — every -svc reads DATABASE_URL
# ============================================================================
# How to obtain:
#   - The CNPG Cluster CR `iogrid-pg` (infra/k8s/base/data/cnpg-cluster.yaml,
#     or wherever the base lands it) will create app-user creds in a
#     Secret named `iogrid-pg-app` by default. CNPG fills `uri` already.
#   - This Secret is a thin wrapper / pin so the consuming Deployments
#     can read a stable name. If CNPG's own Secret is sufficient, point
#     deployments at `iogrid-pg-app` directly and skip this entry.
---
apiVersion: v1
kind: Secret
metadata:
  name: iogrid-database
  namespace: iogrid
type: Opaque
stringData:
  # Full libpq URL incl. sslmode=require
  DATABASE_URL: "# FILL IN — copy from `kubectl -n iogrid get secret iogrid-pg-app -o jsonpath={.data.uri} | base64 -d`"

# ============================================================================
# 4. NATS — inter-service event bus (scheduler, telemetry, anti-abuse)
# ============================================================================
# How to obtain:
#   - In-cluster NATS at nats://nats.iogrid.svc.cluster.local:4222 (no auth
#     for Phase 0 — internal mesh, mTLS via Cilium per #200).
#   - For an external NATS, populate username/password + creds_jwt.
---
apiVersion: v1
kind: Secret
metadata:
  name: iogrid-nats
  namespace: iogrid
type: Opaque
stringData:
  NATS_URL: "nats://nats.iogrid.svc.cluster.local:4222"
  # Leave the next two empty for in-cluster Phase 0; populate for external NATS.
  NATS_USERNAME: ""
  NATS_PASSWORD: ""
  # Optional NATS JWT creds (NGS-style) — comment out the username/password
  # pair above if you use this.
  # creds: "# FILL IN — paste the .creds file contents"

# ============================================================================
# 5. Redis — scheduler hot-path cache + rate limits
# ============================================================================
# How to obtain:
#   - In-cluster Redis (bitnami chart) at redis://redis-master.iogrid:6379
#     with a password Secret generated by the chart at install time.
#   - If you use Upstash / Redis Cloud, populate the full rediss:// URL.
---
apiVersion: v1
kind: Secret
metadata:
  name: iogrid-redis
  namespace: iogrid
type: Opaque
stringData:
  REDIS_URL: "# FILL IN — e.g. redis://default:<password>@redis-master.iogrid:6379/0"

# ============================================================================
# 6. Solana hot wallet — billing-svc pay-out keypair
# ============================================================================
# How to obtain:
#   - On the bastion:
#       solana-keygen new --no-bip39-passphrase -o /tmp/iogrid-payout.json
#       cat /tmp/iogrid-payout.json   # 64-byte JSON array
#       rm /tmp/iogrid-payout.json    # do not leave on disk
#   - Fund the resulting pubkey with operating SOL (~5-10 SOL for Phase 0).
#   - Treat this keypair as HIGHEST SENSITIVITY — anyone with this Secret
#     can drain the wallet. Lock down RBAC accordingly.
---
apiVersion: v1
kind: Secret
metadata:
  name: iogrid-solana-payout
  namespace: iogrid
type: Opaque
stringData:
  # 64-byte JSON array as produced by `solana-keygen new -o`.
  # Stored as a string; billing-svc decodes at startup.
  keypair_json: "# FILL IN — JSON array, e.g. [12,34,56,...]"

# ============================================================================
# 7. Apollo — vCard enrichment fallback API key (Phase 0 customer)
# ============================================================================
# How to obtain:
#   - https://app.apollo.io/#/settings/integrations/api
#   - Use the production key for the Dynolabs vCard / OpenOva account.
#   - This is the OUT-OF-BAND fallback used by examples/phase0-vcard-customer
#     when the LinkedIn-via-iogrid path is not yet wired. Required only
#     for the first-customer smoke; can be removed once the proxy path
#     is sufficient.
---
apiVersion: v1
kind: Secret
metadata:
  name: iogrid-apollo
  namespace: iogrid
type: Opaque
stringData:
  APOLLO_API_KEY: "# FILL IN — Apollo.io > Settings > Integrations > API"

# ============================================================================
# kubectl create secret examples (Phase 0 quick-start, no sealed-secrets)
# ============================================================================
#
# Run these on a workstation with kubeconfig pointing at the mothership.
# Each command replaces the corresponding Secret manifest above.
#
# 1. Google OAuth:
#   kubectl -n iogrid create secret generic iogrid-google-oauth \
#     --from-literal=client_id='<CID>' \
#     --from-literal=client_secret='<CSEC>'
#
# 2. Stalwart SMTP:
#   kubectl -n iogrid create secret generic iogrid-smtp \
#     --from-literal=host='mail.openova.io' \
#     --from-literal=port='587' \
#     --from-literal=username='iogrid-noreply@iogrid.org' \
#     --from-literal=password='<PASS>' \
#     --from-literal=from_address='noreply@iogrid.org' \
#     --from-literal=from_name='iogrid'
#
# 3. Database (re-wrap CNPG's secret):
#   PG_URL=$(kubectl -n iogrid get secret iogrid-pg-app -o jsonpath='{.data.uri}' | base64 -d)
#   kubectl -n iogrid create secret generic iogrid-database \
#     --from-literal=DATABASE_URL="$PG_URL"
#
# 4. NATS (in-cluster, no auth):
#   kubectl -n iogrid create secret generic iogrid-nats \
#     --from-literal=NATS_URL='nats://nats.iogrid.svc.cluster.local:4222' \
#     --from-literal=NATS_USERNAME='' \
#     --from-literal=NATS_PASSWORD=''
#
# 5. Redis:
#   kubectl -n iogrid create secret generic iogrid-redis \
#     --from-literal=REDIS_URL='redis://default:<PASS>@redis-master.iogrid:6379/0'
#
# 6. Solana payout keypair (DO NOT echo this into shell history):
#   solana-keygen new --no-bip39-passphrase -o /tmp/iogrid-payout.json
#   kubectl -n iogrid create secret generic iogrid-solana-payout \
#     --from-file=keypair_json=/tmp/iogrid-payout.json
#   shred -u /tmp/iogrid-payout.json
#
# 7. Apollo API key:
#   kubectl -n iogrid create secret generic iogrid-apollo \
#     --from-literal=APOLLO_API_KEY='<APOLLO_KEY>'
#
# After all 7 are in place, verify with:
#   kubectl -n iogrid get secrets | grep iogrid-
# (expect 7 rows; CNPG's iogrid-pg-app is an 8th unrelated row).
