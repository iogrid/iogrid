---
# Reference copy. Authoritative version in iogrid/iogrid-ops.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: iogrid-staging
  namespace: flux-system
spec:
  interval: 5m
  path: ./infra/k8s/overlays/staging
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: iogrid
  targetNamespace: iogrid
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: gateway-bff
      namespace: iogrid
    - apiVersion: apps/v1
      kind: Deployment
      name: web
      namespace: iogrid
