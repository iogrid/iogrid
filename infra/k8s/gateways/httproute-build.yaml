# build.iogrid.org → build-gateway :8080.
#
# The iOS-build workload (Tart macOS VMs on provider Macs) and the
# Docker/GPU build orchestrator both register here. Customers upload
# build context and poll status via REST; long-running build attaches
# go over WebSocket on /ws.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: build
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  parentRefs:
    - name: iogrid-gateway
      sectionName: https-build
  hostnames:
    - build.iogrid.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: build-gateway
          port: 8080
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: build-redirect-https
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  parentRefs:
    - name: iogrid-gateway
      sectionName: http
  hostnames:
    - build.iogrid.org
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
