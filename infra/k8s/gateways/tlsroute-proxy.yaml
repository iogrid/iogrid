# proxy.iogrid.org → proxy-gateway :443 — TLS passthrough.
#
# The proxy-gateway service is itself a TLS server (residential-proxy
# frontend, HTTPS proxy mode). We MUST NOT terminate TLS at the edge:
# the customer's HTTPS CONNECT request needs to reach the proxy
# frontend wire-intact so it can authenticate the customer cert and
# tunnel the inner connection out through provider WireGuard endpoints.
#
# Hence TLSRoute (not HTTPRoute) and the Gateway listener is mode:
# Passthrough — Cilium SNI-routes by hostname and forwards raw bytes.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: proxy
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  parentRefs:
    - name: iogrid-gateway
      sectionName: tls-proxy
  hostnames:
    - proxy.iogrid.org
  rules:
    - backendRefs:
        - name: proxy-gateway
          port: 443
          weight: 1
