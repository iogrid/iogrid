# iogrid.org + www.iogrid.org — marketing site landing page.
#
# Both apex and www route to the same `marketing-site` service. Bare
# http://iogrid.org redirects to https://iogrid.org; we do NOT force
# www -> apex or apex -> www at this layer — both are first-class hosts.
# Once the marketing site team decides on a canonical form, add a
# RequestRedirect rule here.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: apex
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  parentRefs:
    - name: iogrid-gateway
      sectionName: https-www
  hostnames:
    - iogrid.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: marketing-site
          port: 80
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: www
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  parentRefs:
    - name: iogrid-gateway
      sectionName: https-www-www
  hostnames:
    - www.iogrid.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: marketing-site
          port: 80
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: apex-redirect-https
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  parentRefs:
    - name: iogrid-gateway
      sectionName: http-apex
  hostnames:
    - iogrid.org
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: www-redirect-https
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  parentRefs:
    - name: iogrid-gateway
      sectionName: http
  hostnames:
    - www.iogrid.org
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
