# app.iogrid.org → Next.js management plane (web service, :3000).
#
# Also redirects bare http://app.iogrid.org → https. The redirect is
# expressed as its own HTTPRoute attached to the http listener with a
# RequestRedirect filter; the HTTPS listener gets the real path rules.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  parentRefs:
    - name: iogrid-gateway
      sectionName: https-app
  hostnames:
    - app.iogrid.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web
          port: 3000
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-redirect-https
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  parentRefs:
    - name: iogrid-gateway
      sectionName: http
  hostnames:
    - app.iogrid.org
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
