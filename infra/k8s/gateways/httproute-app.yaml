# app.iogrid.org → iogrid.org 301 redirect (EPIC #422 Phase 3).
#
# Pre-Phase-3 this HTTPRoute pointed app.iogrid.org at the web
# service. Phase 3 retired the app.* subdomain — the product app
# moved to iogrid.org/. To keep stale bookmarks, SDK clients, and
# magic-link callback URLs working, app.iogrid.org now redirects
# every request to https://iogrid.org with path + query preserved.
#
# Gateway-API HTTPRoute uses statusCode 301 (the Cilium Gateway
# implementation does not yet support 308 in the RequestRedirect
# filter — the equivalent Traefik IngressRoute in
# `infra/k8s/traefik/ingressroute-app-redirect.yaml` returns 308 so
# POST bodies survive the redirect).
#
# Refs #422.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  parentRefs:
    - name: iogrid-gateway
      sectionName: https-app
  hostnames:
    - app.iogrid.org
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: iogrid.org
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-redirect-https
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  parentRefs:
    - name: iogrid-gateway
      sectionName: http
  hostnames:
    - app.iogrid.org
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: iogrid.org
            statusCode: 301
