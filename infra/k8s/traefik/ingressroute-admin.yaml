---
# admin.iogrid.org -> admin:3000 (independent Next.js admin console).
#
# EPIC #422 Phase 1.
#
# This file was originally added by PR #408 to route admin.iogrid.org
# at the same `web` Service that already backs app.iogrid.org. That
# approach (one codebase, host-aware middleware) was rejected by the
# founder:
#
#   "admin must be an idependent one admin.iogriod.org
#    And admis app and user apps cannot be mixed to each other or
#    instnace what is the point of showing the provide option to admin,
#    he needs to access from teh eother indepent apps"
#
# EPIC #422 Phase 1 re-does the split properly: the admin/ workspace is
# now a fully independent Next.js app shipping ghcr.io/iogrid/admin via
# .github/workflows/admin-ci.yml, with its own Deployment + Service
# (infra/k8s/base/admin/). This IngressRoute is repointed from `web` to
# the new `admin` Service.
#
# Cookie scope is enforced inside the admin app via
# `admin/src/auth.config.ts` (cookies.sessionToken.options.domain =
# "admin.iogrid.org", host-scoped). A session minted on admin.iogrid.org
# will NEVER be sent to iogrid.org / app.iogrid.org and vice-versa.
#
# TLS secret: the existing `iogrid-org-tls` Secret (issued by the
# Certificate in infra/k8s/certificates/iogrid-org-cert.yaml) covers
# admin.iogrid.org via the SAN list bump from PR #408.
#
# Refs #422 #408 #361 #365 #383.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: admin-iogrid-org
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  entryPoints:
    - websecure
  routes:
    # Catch-all -> admin Service (NEW; replaces PR #408's web routing).
    # Every request to admin.iogrid.org now hits the dedicated admin
    # Next.js app, which gates on its own host-scoped NextAuth cookie +
    # IOGRID_ADMIN_EMAILS allowlist.
    - kind: Rule
      match: Host(`admin.iogrid.org`)
      priority: 100
      services:
        - name: admin
          port: 3000
  tls:
    # SAN-listed in infra/k8s/certificates/iogrid-org-cert.yaml.
    secretName: iogrid-org-tls
