# api.iogrid.org/iogrid.providers.v1* → providers-svc :8080 (h2c, bidi).
# api.iogrid.org/api/v1/providers* → providers-svc :8080 (h2c, browser).
#
# This route handles the long-lived
# `SchedulingService.StreamHeartbeats` bidi stream that every paired
# daemon opens immediately after `coordinator mTLS channel connected`.
# Same shape as `ingressroute-workloads.yaml` (#271) — h2c + the long-
# lived ServersTransport + 100ms flush interval — because the heartbeat
# stream has the same h2 lifetime requirement as the dispatch stream.
#
# Without this file, the path `/iogrid.providers.v1.SchedulingService/
# StreamHeartbeats` fell through Traefik's default HTTP/1.1 routing
# and tonic on the daemon side saw `HTTP 505 / grpc-status header
# missing` — the wire-level symptom of an h2c handler talking to a
# default-HTTP/1.1 frontend. `providers.last_seen_at` never advanced
# despite the daemon's `live heartbeat bridge spawned` log line and
# all 4 layers below it being healthy.
#
# Discovered live on 2026-05-20 walking hatice's Mac through PR #346
# (the `port_or_known_default` daemon fix). Before that fix the daemon
# hung at TLS config; once #346 + #331 cleared the TLS stack, the
# daemon reached this provider stream and surfaced the missing
# IngressRoute. Live-patched on the cluster at the time; this PR puts
# the canonical declaration into git so fresh provs include it.
#
# X-Forwarded-For propagation (#381)
# ----------------------------------
# providers-svc's GeoIP2 path (#359/PR #378) reads X-Forwarded-For off
# every heartbeat stream's initial HEADERS frame to resolve the
# provider's country + region. Traefik's default behaviour is to
# rewrite XFF from `req.RemoteAddr` on every entrypoint ingress — but
# that rewrite is GATED on whether the entrypoint trusts its previous
# hop (typically the Hetzner LB). With the default
# `forwardedHeaders.insecure=false` AND empty `trustedIPs=[]`, Traefik
# STRIPS any incoming XFF/X-Real-IP from the LB AND silently does NOT
# add a fresh one on the proxied request (the rewrite path is skipped
# for streaming HTTP/2 requests when the previous hop isn't trusted).
#
# Result: on hatice's Mac (2026-05-21) `clientIP` resolved to "" inside
# `StreamHeartbeats`, the geoip refresh short-circuited, and the
# `providers.country_code / region_name / public_ip` columns stayed
# NULL forever despite a healthy stream.
#
# Fix lives in the mothership Traefik static config (THIS file is the
# dynamic route; the static config is the kube-system Helm values).
# The required Helm-values fragment for the mothership Traefik chart
# release is:
#
#   ports:
#     websecure:
#       forwardedHeaders:
#         # `insecure: true` accepts XFF/Forwarded from any source —
#         # safe here because the Hetzner LB is L4 (proxy-protocol-less)
#         # and the underlying TCP source is the LB's egress IP, not a
#         # spoofable client. If/when the platform adds a CDN in front
#         # of the LB, swap to `trustedIPs: [<LB CIDR>, <CDN CIDR>]` so
#         # only those hops can populate XFF; clients still cannot
#         # forge it because they terminate TLS at Traefik first.
#         insecure: true
#
# Apply on the mothership:
#
#   helm upgrade traefik traefik/traefik -n kube-system --reuse-values \
#     --set ports.websecure.forwardedHeaders.insecure=true
#
# After the chart re-rolls and the daemon reconnects, the next
# `heartbeat: stream opened` log line in providers-svc will carry a
# non-empty `client_ip` and `applyHeartbeatGeo` will populate the geo
# columns within ≤ 24h (immediately on the first heartbeat of a fresh
# stream, per the LastGeoLookupAt-zero short-circuit in scheduling.go).
#
# Issue: #352 (this file's intent). Refs #271 (sibling for workloads),
# #381 (XFF/geo plumbing), #378 (the GeoIP2 ship this unblocks).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: api-iogrid-org-providers
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  entryPoints:
    - websecure
  routes:
    # gRPC path — daemon ↔ coordinator + service-to-service Connect-RPC
    # calls that providers-svc exposes (SchedulingService.StreamHeartbeats,
    # DashboardService.StreamAuditEvents, RegistrationService.Pair, …).
    - kind: Rule
      match: Host(`api.iogrid.org`) && PathPrefix(`/iogrid.providers.v1`)
      priority: 100
      middlewares:
        - name: cors-app-iogrid
      services:
        - name: providers-svc
          port: 8080
          scheme: h2c
          serversTransport: long-lived-bidi
          responseForwarding:
            flushInterval: "100ms"
    # REST path — the browser-facing /api/v1/providers/* surface used by
    # gateway-bff (admin/providers list, transparency feed bootstrap, etc).
    # Same h2c stack so a single ServersTransport pool serves both.
    - kind: Rule
      match: Host(`api.iogrid.org`) && PathPrefix(`/api/v1/providers`)
      priority: 100
      middlewares:
        - name: cors-app-iogrid
      services:
        - name: providers-svc
          port: 8080
          scheme: h2c
          serversTransport: long-lived-bidi
          responseForwarding:
            flushInterval: "100ms"
  tls:
    secretName: iogrid-tls
