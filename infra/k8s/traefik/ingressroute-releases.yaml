---
# releases.iogrid.org -> releases:8080 (nginx-based static redirect server).
#
# Backend behaviour:
#   - GET /macos/appcast.xml          -> 302 to GH Release asset for the
#                                        canonical "latest" tag (Sparkle
#                                        clients follow the redirect; the
#                                        upstream URL eventually resolves to
#                                        objects.githubusercontent.com).
#   - GET /macos/<version>/<file>.pkg -> 302 to GH Release asset for that
#                                        version's .pkg blob.
#   - GET /latest/iogrid-<os>-<arch>.<ext> (Phase-0 legacy surface)
#                                     -> 302 to GH Release asset.
#   - GET /healthz                    -> 200 OK (Traefik / k8s probe).
#
# Issue #392 — wires the daemon-ci `generate-appcast` job (Phase 1 of
# EPIC #348) to a public-facing surface so Sparkle clients have a stable
# URL to poll.
#
# The Cilium Gateway form of the same intent will land alongside the
# next gateway.yaml bump (an `https-releases` listener on iogrid-gateway
# pointing at the same releases:8080 Service); this IngressRoute is the
# live Traefik materialisation per the shim convention documented in
# `infra/k8s/traefik/README.md`.
#
# Refs #392 #348 #387.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: iogrid-releases
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  entryPoints:
    - websecure
  routes:
    # Single catch-all rule — the redirect logic lives inside the
    # releases container's nginx.conf, not at the Traefik layer. Keeping
    # the IngressRoute one-line means a future surface addition (e.g.
    # /windows/manifest.json for the Windows auto-update channel) is a
    # releases-image change with zero IngressRoute churn.
    - kind: Rule
      match: Host(`releases.iogrid.org`)
      priority: 100
      services:
        - name: releases
          port: 8080
  tls:
    # Reuses the canonical `iogrid-org-tls` Secret. The companion change
    # in `infra/k8s/certificates/iogrid-org-cert.yaml` appends
    # `releases.iogrid.org` to the SAN list so cert-manager re-issues
    # the bundle with the new hostname. Until that re-issuance lands
    # (cert-manager picks up the spec change within ≤ 5 min, then
    # solves HTTP-01 against the Gateway), this IngressRoute will
    # serve a cert that's valid-for-name-mismatch — Sparkle clients
    # treat that as a hard failure, so the cert append MUST land
    # before this IngressRoute is reconciled.
    secretName: iogrid-org-tls
