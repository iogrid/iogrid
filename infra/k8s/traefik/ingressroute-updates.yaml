---
# updates.iogrid.org -> updates:8080 (manifestd — Go binary, not nginx).
#
# GET /manifest.json   200 JSON served from updates-manifest ConfigMap
# GET /healthz         200 "ok" for liveness / Traefik health checks
#
# The cert SAN for updates.iogrid.org was pre-staged in
# infra/k8s/certificates/iogrid-org-cert.yaml alongside releases.iogrid.org
# (per #392). cert-manager has already issued a cert including this hostname.
#
# Refs #485.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: iogrid-updates
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`updates.iogrid.org`)
      priority: 100
      services:
        - name: updates
          port: 8080
  tls:
    secretName: iogrid-org-tls
