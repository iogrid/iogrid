---
# CNPG Cluster — single Postgres cluster, multi-database via post-init scripts.
# Per-service databases: identity, providers, workloads, antiabuse, billing, telemetry.
# Each microservice connects with its own role + database — isolation via Postgres ACLs,
# not via separate clusters (cost/operational tradeoff; clusters split later when warranted).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: iogrid-pg
  namespace: iogrid
  labels:
    app.kubernetes.io/name: iogrid-pg
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: database
spec:
  # 2, not 3: the contabo-mkt cluster has headroom for a primary + 1 replica
  # only; instances:3 left the 3rd CNPG pod Pending and a declarative apply
  # mutated the live cluster 2->3 (prod incident 2026-06-03, #637). Bump back to
  # 3 only after the cluster gains node headroom.
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised
  # Superuser secret (iogrid-pg-superuser) so the pg_dump stop-gap CronJob can
  # pg_dumpall every per-service DB + roles (the app user can't — per-svc tables
  # are owned by per-svc roles). #642. Patched live 2026-06-03.
  enableSuperuserAccess: true
  storage:
    size: 50Gi
    storageClass: local-path
  monitoring:
    # false: the contabo-mkt k3s cluster has no Prometheus-Operator, so the
    # PodMonitor CRD is absent — enablePodMonitor:true makes CNPG perpetually
    # fail to reconcile the PodMonitor sub-resource. Re-enable only if/when a
    # Prometheus Operator is installed (#637).
    enablePodMonitor: false
  postgresql:
    parameters:
      max_connections: "400"
      shared_buffers: 128MB
      effective_cache_size: 384MB
      work_mem: 8MB
      maintenance_work_mem: 128MB
      wal_buffers: 16MB
      wal_compression: "on"
      log_min_duration_statement: "250"
      log_checkpoints: "on"
      log_connections: "off"
      log_disconnections: "off"
      log_lock_waits: "on"
      log_temp_files: "0"
    pg_hba:
      # Allow each microservice role from inside the cluster
      - host all all 10.0.0.0/8 scram-sha-256
      - host all all 172.16.0.0/12 scram-sha-256
      - host all all 192.168.0.0/16 scram-sha-256
  bootstrap:
    initdb:
      database: iogrid
      owner: iogrid
      postInitApplicationSQL:
        # Per-service databases. Roles are created via SealedSecrets out-of-band
        # (each service ships its own Secret with its connection string at deploy time).
        - CREATE DATABASE identity;
        - CREATE DATABASE providers;
        - CREATE DATABASE workloads;
        - CREATE DATABASE antiabuse;
        - CREATE DATABASE billing;
        - CREATE DATABASE telemetry;
        - CREATE ROLE identity_user LOGIN;
        - CREATE ROLE providers_user LOGIN;
        - CREATE ROLE workloads_user LOGIN;
        - CREATE ROLE antiabuse_user LOGIN;
        - CREATE ROLE billing_user LOGIN;
        - CREATE ROLE telemetry_user LOGIN;
        - GRANT ALL PRIVILEGES ON DATABASE identity TO identity_user;
        - GRANT ALL PRIVILEGES ON DATABASE providers TO providers_user;
        - GRANT ALL PRIVILEGES ON DATABASE workloads TO workloads_user;
        - GRANT ALL PRIVILEGES ON DATABASE antiabuse TO antiabuse_user;
        - GRANT ALL PRIVILEGES ON DATABASE billing TO billing_user;
        - GRANT ALL PRIVILEGES ON DATABASE telemetry TO telemetry_user;
  resources:
    requests:
      # 200m (was 500m): actual steady-state usage is ~20m/instance; 200m is
      # ~8x headroom for query/backup spikes. Reclaims 600m across the 2
      # instances on a CPU-request-constrained single node (#664). Memory kept
      # at 1Gi (conservative for Postgres shared_buffers + page cache; usage
      # ~170Mi but DBs benefit from cache headroom). Limits unchanged.
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  affinity:
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname
  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      destinationPath: s3://iogrid-backups/cnpg/iogrid-pg
      # In-cluster MinIO (infra/k8s/base/data/minio-backup.yaml) — the Hetzner
      # object-storage creds don't exist (operator-gated, exhaustively proven),
      # so WAL archiving targets a self-managed in-cluster store instead.
      # Verified live + independently accepted: ContinuousArchiving=True, base
      # backup completed, WAL segments continuously archived to the bucket
      # (#642). Flip back to Hetzner offsite for durable
      # DR once those creds land (same iogrid-pg-backup-s3 secret).
      endpointURL: http://minio.iogrid.svc.cluster.local:9000
      s3Credentials:
        accessKeyId:
          name: iogrid-pg-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: iogrid-pg-backup-s3
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
