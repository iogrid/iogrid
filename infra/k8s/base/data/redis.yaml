apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: iogrid
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: redis
  ports:
  - name: client
    port: 6379
    targetPort: 6379
  - name: gossip
    port: 16379
    targetPort: 16379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-client
  namespace: iogrid
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
  - name: client
    port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: iogrid
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: iogrid
data:
  redis.conf: 'cluster-enabled yes

    cluster-require-full-coverage no

    cluster-node-timeout 15000

    cluster-config-file /data/nodes.conf

    cluster-migration-barrier 1

    appendonly yes

    protected-mode no

    bind 0.0.0.0

    port 6379

    maxmemory-policy allkeys-lru

    maxmemory 512mb

    save 900 1

    save 300 10

    save 60 10000

    '
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: iogrid
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: cache
spec:
  serviceName: redis
  replicas: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: cache
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: redis
        image: redis:7.4-alpine
        imagePullPolicy: IfNotPresent
        command:
        - redis-server
        - /etc/redis/redis.conf
        ports:
        - name: client
          containerPort: 6379
        - name: gossip
          containerPort: 16379
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 768Mi
        livenessProbe:
          tcpSocket:
            port: client
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /etc/redis
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: redis-config
          items:
          - key: redis.conf
            path: redis.conf
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: redis
              topologyKey: kubernetes.io/hostname
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: local-path
