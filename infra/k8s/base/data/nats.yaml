apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: iogrid
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: messaging
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: nats
  ports:
  - name: client
    port: 4222
    targetPort: 4222
  - name: cluster
    port: 6222
    targetPort: 6222
  - name: monitor
    port: 8222
    targetPort: 8222
  - name: metrics
    port: 7777
    targetPort: 7777
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: iogrid
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: iogrid
data:
  nats.conf: "server_name: $POD_NAME\nlisten: 0.0.0.0:4222\nhttp: 0.0.0.0:8222\npid_file:\
    \ \"/var/run/nats/nats.pid\"\n\njetstream {\n  store_dir: /data/jetstream\n  max_mem:\
    \ 256MB\n  max_file: 8GB\n}\n\n# cluster { ... } block intentionally omitted \u2014\
    \ phase-0 runs at\n# replicas=1 (per #455). The previous config had routes to\
    \ nats-1\n# and nats-2 which don't exist, causing \"Waiting for routing to be\n\
    # established...\" WARN spam. Re-introduce the cluster block when\n# bumping replicas\
    \ back to 3.\n\naccounts {\n  SYS: { users: [ { user: sys, pass: \"$NATS_SYS_PASSWORD\"\
    \ } ] }\n}\nsystem_account: SYS\n"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: iogrid
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: messaging
spec:
  serviceName: nats
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: messaging
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '7777'
        prometheus.io/path: /metrics
    spec:
      terminationGracePeriodSeconds: 60
      shareProcessNamespace: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nats
        image: nats:2.10-alpine
        imagePullPolicy: IfNotPresent
        command:
        - /usr/local/bin/nats-server
        - --config
        - /etc/nats/nats.conf
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NATS_SYS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nats-sys
              key: password
              optional: true
        ports:
        - name: client
          containerPort: 4222
        - name: cluster
          containerPort: 6222
        - name: monitor
          containerPort: 8222
        resources:
          requests:
            cpu: 200m
            memory: 64Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /healthz
            port: monitor
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /healthz
            port: monitor
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: config
          mountPath: /etc/nats
          readOnly: true
        - name: data
          mountPath: /data
        - name: pid
          mountPath: /var/run/nats
      - name: nats-exporter
        image: natsio/prometheus-nats-exporter:0.15.0
        imagePullPolicy: IfNotPresent
        args:
        - -varz
        - -connz
        - -routez
        - -subz
        - -jsz=all
        - http://localhost:8222
        ports:
        - name: metrics
          containerPort: 7777
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        configMap:
          name: nats-config
      - name: pid
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: nats
              topologyKey: kubernetes.io/hostname
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
      storageClassName: local-path
