---
# NATS JetStream — 3-replica clustered, durable streams for cross-service events:
#  - daemon.events (registrations, heartbeats, offline)
#  - workload.events (submit, dispatch, finish, fail)
#  - billing.events (usage metering)
#  - antiabuse.events (filter hits, blocks)
#  - audit.events (transparency dashboard feed)
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: iogrid
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: messaging
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: cluster
      port: 6222
      targetPort: 6222
    - name: monitor
      port: 8222
      targetPort: 8222
    - name: metrics
      port: 7777
      targetPort: 7777
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: iogrid
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: iogrid
data:
  nats.conf: |
    server_name: $POD_NAME
    listen: 0.0.0.0:4222
    http: 0.0.0.0:8222
    pid_file: "/var/run/nats/nats.pid"

    jetstream {
      store_dir: /data/jetstream
      max_mem: 256MB
      max_file: 8GB
    }

