---
# Stop-gap logical backups for iogrid-pg (#642). The CNPG barmanObjectStore
# WAL archiving is down (missing Hetzner creds → ContinuousArchiving=False, no
# PITR). Until those creds land, this CronJob gives us SOMETHING: scheduled
# pg_dump of every per-service database to a local PVC, with 7-day retention.
# Additive + read-only on the DB — safe to apply standalone (NOT the gated
# overlays/prod apply). Logical dumps ≠ PITR, but ≫ the current zero backups.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iogrid-pg-dump
  namespace: iogrid
  labels:
    app.kubernetes.io/name: iogrid-pg-dump
    app.kubernetes.io/part-of: iogrid
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: iogrid-pg-dump
  namespace: iogrid
  labels:
    app.kubernetes.io/name: iogrid-pg-dump
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: backup
spec:
  schedule: "0 */6 * * *"   # every 6h
  concurrencyPolicy: Forbid
  # startingDeadlineSeconds: if a scheduled run can't START on time (the
  # job pod stuck Pending at the pod cap — #682/#691), still launch it
  # within this window once a slot frees, instead of skipping the tick
  # entirely. Without it, a cap-pressured 00:00 tick is simply lost.
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # The DR-net failure on 2026-06-04 (#691) was a TRANSIENT DNS blip
      # (CoreDNS starved at the cap) that resolved minutes later — but
      # backoffLimit:1 gave up after one retry, leaving the backup silently
      # broken for 6h+. 4 retries with the default exponential backoff
      # (~10s,20s,40s,80s) ride out a transient DNS/scheduling hiccup; the
      # 1800s activeDeadline still caps total runtime so a genuinely stuck
      # job can't run forever.
      activeDeadlineSeconds: 1800
      backoffLimit: 4
      template:
        metadata:
          labels:
            app.kubernetes.io/name: iogrid-pg-dump
            app.kubernetes.io/part-of: iogrid
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 26          # postgres uid in the CNPG image
            runAsGroup: 26
            fsGroup: 26
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: pg-dump
              image: ghcr.io/cloudnative-pg/postgresql:16.4
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: PGHOST
                  value: iogrid-pg-rw.iogrid.svc.cluster.local
                - name: PGPORT
                  value: "5432"
                # Superuser (postgres) so pg_dumpall covers EVERY per-service DB
                # + globals/roles. The app user can't read identity/providers/
                # billing tables (owned by per-service roles) — #642.
                - name: PGUSER
                  valueFrom:
                    secretKeyRef: { name: iogrid-pg-superuser, key: username }
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef: { name: iogrid-pg-superuser, key: password }
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -uo pipefail
                  ts="$(date -u +%Y%m%dT%H%M%SZ)"
                  out="/backups/iogrid-pg-all-${ts}.sql.gz"
                  echo "pg_dumpall (all DBs + globals/roles) -> ${out}"
                  if pg_dumpall | gzip -c > "$out"; then
                    echo "  ok $(du -h "$out" | cut -f1)"
                  else
                    echo "::error:: pg_dumpall failed"; rm -f "$out"; exit 1
                  fi
                  echo "pruning dumps older than 7 days"
                  find /backups -name '*.sql.gz' -mtime +7 -delete 2>/dev/null || true
                  echo "current backups:"; ls -lh /backups/*.sql.gz 2>/dev/null | tail -20
              volumeMounts:
                - name: dumps
                  mountPath: /backups
          volumes:
            - name: dumps
              persistentVolumeClaim:
                claimName: iogrid-pg-dump
