---
# iogrid.org + www.iogrid.org — apex + www certificate for the
# product-app frontend on the Gateway. Added in EPIC #422 Phase 3
# when the apex moved from marketing-site to web/. This is the cert
# referenced by the `apex-https` and `www-https` listeners on the
# Cilium Gateway.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: iogrid-org
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  secretName: iogrid-org-tls
  duration: 2160h     # 90d
  renewBefore: 360h   # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  dnsNames:
    - iogrid.org
    - www.iogrid.org
  issuerRef:
    name: letsencrypt-prod-http01
    kind: ClusterIssuer
    group: cert-manager.io
---
# app.iogrid.org — kept for the 90-day redirect grace window after
# EPIC #422 Phase 3 retired the subdomain. The corresponding HTTPRoute
# returns 301 to iogrid.org for every request. Follow-up ticket drops
# this Certificate + the `app-https` Gateway listener after expiry.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-iogrid-org
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  secretName: app-iogrid-org-tls
  duration: 2160h     # 90d
  renewBefore: 360h   # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  dnsNames:
    - app.iogrid.org
  issuerRef:
    name: letsencrypt-prod-http01
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-iogrid-org
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  secretName: api-iogrid-org-tls
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  dnsNames:
    - api.iogrid.org
  issuerRef:
    name: letsencrypt-prod-http01
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: build-iogrid-org
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  secretName: build-iogrid-org-tls
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  dnsNames:
    - build.iogrid.org
  issuerRef:
    name: letsencrypt-prod-http01
    kind: ClusterIssuer
    group: cert-manager.io
---
# proxy.iogrid.org — http-01 via Traefik. The original comment claimed DNS-01
# was needed because the Gateway is TLS-passthrough, but http-01 uses port 80
# (NOT 443), and Traefik serves /.well-known/acme-challenge/* on :80 normally
# (verified: curl http://proxy.iogrid.org/.well-known/acme-challenge/test → 404,
# Traefik responding). The DNS-01 dynadot ClusterIssuer's webhook is broken
# (dynadot.acme.dynadot.iogrid.org → "server could not find" — 10d stuck
# challenge, #645). Patched live + updated here to letsencrypt-prod-http01.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: proxy-iogrid-org
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  secretName: proxy-iogrid-org-tls
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  dnsNames:
    - proxy.iogrid.org
  issuerRef:
    name: letsencrypt-prod-http01
    kind: ClusterIssuer
    group: cert-manager.io
