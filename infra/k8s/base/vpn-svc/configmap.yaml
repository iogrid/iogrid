---
# vpn-svc runtime config (NON-secret). Referenced via envFrom in the
# Deployment. Captured from the live prod Deployment (2026-06-03, #640).
apiVersion: v1
kind: ConfigMap
metadata:
  name: vpn-svc-config
  namespace: iogrid
  labels:
    app.kubernetes.io/name: vpn-svc
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: vpn
data:
  STUN_LISTEN_ADDR: ":3478"
  LISTEN_ADDR: ":8080"
  BILLING_SVC_URL: "http://billing-svc.iogrid.svc.cluster.local:8080"
  NATS_URL: "nats://nats.iogrid.svc.cluster.local:4222"
