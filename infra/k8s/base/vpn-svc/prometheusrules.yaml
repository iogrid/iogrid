# Prometheus alerts for POST /v1/vpn/sessions/mobile (#605).
#
# vpn-svc emits a labelled counter at every response path:
#   iogrid_vpn_svc_mobile_session_requests_total{outcome=
#       "created" | "no_peer" | "bad_request" | "unauthorized" | "internal_error"}
#
# These rules alert on patterns that warrant operator attention.
# Alertmanager routing + severity → oncall mapping lives in
# telemetry-svc/alertmanager-config.yaml.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/component: alerts
    app.kubernetes.io/name: vpn-svc
    app.kubernetes.io/part-of: iogrid
  name: iogrid-vpn-svc-mobile-session
  namespace: iogrid
spec:
  groups:
    - name: iogrid.vpn-svc.mobile-session
      interval: 30s
      rules:
        # ── Page on high error rate ────────────────────────────────
        - alert: SessionsMobileHighErrorRate
          expr: |
            (
              sum(rate(iogrid_vpn_svc_mobile_session_requests_total{outcome="internal_error"}[5m]))
              /
              sum(rate(iogrid_vpn_svc_mobile_session_requests_total[5m]))
            ) > 0.01
          for: 5m
          labels:
            severity: page
            service: vpn-svc
            team: backend
            tier: control-plane
          annotations:
            summary: /sessions/mobile internal-error rate > 1%
            description: |
              POST /v1/vpn/sessions/mobile is returning 500 (internal_error)
              for >1% of requests over the last 5 minutes. Likely causes:
              - Postgres connection pool exhausted
              - Inner-IP allocation race (vpn_provider_inner_ip_alloc deadlock)
              - PersistSessionPeerConfig SQL UPDATE failing on schema drift
            runbook_url: https://docs.iogrid.org/runbooks/vpn-svc-mobile-session#high-error-rate
            user_impact: Mobile users can't establish VPN sessions.

        # ── Page on 503 spike (degraded path > expected baseline) ──
        - alert: SessionsMobile503Spike
          expr: |
            (
              sum(rate(iogrid_vpn_svc_mobile_session_requests_total{outcome="no_peer"}[5m]))
              /
              clamp_min(sum(rate(iogrid_vpn_svc_mobile_session_requests_total[5m])), 0.01)
            ) > 0.5
          for: 5m
          labels:
            severity: page
            service: vpn-svc
            team: backend
            tier: control-plane
          annotations:
            summary: /sessions/mobile no-peer rate > 50%
            description: |
              POST /v1/vpn/sessions/mobile is returning 503 no_peer_available
              for >50% of requests over the last 5 minutes. The provider mesh
              has no healthy peers in the regions clients are requesting.
              Likely causes:
              - Provider daemon fleet outage (check provider_health_changes_total)
              - Region picker bug (geo-nearest selecting empty regions)
            runbook_url: https://docs.iogrid.org/runbooks/vpn-svc-mobile-session#no-peer-spike
            user_impact: Mobile users get "no peer" + Retry-After for >50% of attempts.

        # ── Ticket on 401 spike (BillingValidator misconfig or upstream auth-svc down) ──
        - alert: SessionsMobileAuthFailureSpike
          expr: |
            (
              sum(rate(iogrid_vpn_svc_mobile_session_requests_total{outcome="unauthorized"}[5m]))
              /
              clamp_min(sum(rate(iogrid_vpn_svc_mobile_session_requests_total[5m])), 0.01)
            ) > 0.1
          for: 5m
          labels:
            severity: ticket
            service: vpn-svc
            team: auth
            tier: control-plane
          annotations:
            summary: /sessions/mobile unauthorized rate > 10%
            description: |
              POST /v1/vpn/sessions/mobile is returning 401 unauthorized for
              >10% of requests over the last 5 minutes. Possible causes:
              - Token rotation broken (mobile app holding stale JWT)
              - billing-svc upstream rejecting valid keys
              - BillingValidator misconfigured on this vpn-svc replica
            runbook_url: https://docs.iogrid.org/runbooks/vpn-svc-mobile-session#auth-spike
            user_impact: Authenticated mobile users get rejected.

        # ── Page when no requests at all (DNS / ingress / client outage) ──
        - alert: SessionsMobileTrafficStopped
          expr: |
            absent(rate(iogrid_vpn_svc_mobile_session_requests_total[10m]))
            or sum(rate(iogrid_vpn_svc_mobile_session_requests_total[10m])) == 0
          for: 15m
          labels:
            severity: ticket
            service: vpn-svc
            team: backend
            tier: control-plane
          annotations:
            summary: /sessions/mobile has received no traffic in 15 minutes
            description: |
              No mobile-session requests in the last 15 minutes. Likely
              causes (in decreasing probability):
              - mobile-app crash on most devices (check TestFlight crash logs)
              - api.iogrid.org DNS / ingress down (cross-check with
                health endpoint metrics)
              - Honest off-peak silence (overnight, low-traffic region)
              Ticket-severity (not page) because off-peak silence is
              expected at some times; oncall can triage in business hours.
            runbook_url: https://docs.iogrid.org/runbooks/vpn-svc-mobile-session#no-traffic
            user_impact: No mobile users are connecting (or none can).

        # ── Information: bad-request spike (clients sending malformed payloads) ──
        - alert: SessionsMobileBadRequestSpike
          expr: |
            (
              sum(rate(iogrid_vpn_svc_mobile_session_requests_total{outcome="bad_request"}[5m]))
              /
              clamp_min(sum(rate(iogrid_vpn_svc_mobile_session_requests_total[5m])), 0.01)
            ) > 0.2
          for: 10m
          labels:
            severity: info
            service: vpn-svc
            team: mobile
            tier: control-plane
          annotations:
            summary: /sessions/mobile bad-request rate > 20%
            description: |
              POST /v1/vpn/sessions/mobile is returning 400 bad_request for
              >20% of requests over the last 10 minutes. Likely a stale
              mobile-app client sending the v0 wire shape (missing
              client_public_key, malformed customer_id UUID, etc).
              Check TestFlight build distribution + force-update gate.
            runbook_url: https://docs.iogrid.org/runbooks/vpn-svc-mobile-session#bad-request
            user_impact: Mobile users on stale builds can't sign in.
