apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing
  namespace: iogrid
  labels:
    app.kubernetes.io/name: marketing
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: marketing
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: marketing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: marketing
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: marketing
      annotations:
        # Bumped by .github/workflows/marketing-ci.yml on every push to
        # main so the rolling update fires even when the image digest is
        # cache-identical. Treated as an opaque ISO-8601 string by the
        # deploy-bot rewriter in the workflow — do not hand-edit unless
        # you intend to roll the pods. Refs #384.
        kubectl.kubernetes.io/restartedAt: "2026-05-21T00:00:00Z"
    spec:
      serviceAccountName: marketing
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        # nginx:1.27-alpine ships with an unprivileged 'nginx' user (uid
        # 101). The image's default port is 80 (privileged), but our
        # marketing/nginx.conf overrides it to listen 8080 so the
        # container can run as non-root.
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: marketing
          # The image reference is rewritten by
          # .github/workflows/marketing-ci.yml on every push to main to
          # a fully-qualified digest pin of the form
          #   ghcr.io/iogrid/marketing@sha256:<digest>
          # so that:
          #   (a) the deployment is bit-exact reproducible from `git show`
          #   (b) the kustomize-controller detects the change on the next
          #       5m reconcile interval (gitops/flux/iogrid-kustomization.yaml)
          #   (c) imagePullPolicy: Always belt-and-braces guarantees the
          #       node pulls the digest even when the tag string is
          #       unchanged. Refs #384.
          image: ghcr.io/iogrid/marketing:scaffold
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              # marketing/nginx.conf serves the static export. There is
              # no dedicated /healthz endpoint — the index page is the
              # liveness signal (HEAD / returns 200 from the export).
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # nginx needs writable /var/cache/nginx for temp files and
            # /var/run for the pid file when running with
            # readOnlyRootFilesystem: true. Both are emptyDir so they're
            # ephemeral per-pod.
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: marketing
