---
# proxy.iogrid.org — TLS passthrough → proxy-gateway pod terminates TLS itself.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: proxy-iogrid-org
  namespace: iogrid
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  parentRefs:
    - name: iogrid
      namespace: gateway-system
      sectionName: proxy-tls
  hostnames:
    - proxy.iogrid.org
  rules:
    - backendRefs:
        - name: proxy-gateway
          port: 443
          weight: 100
