---
# ReferenceGrants let HTTPRoutes/TLSRoutes in the iogrid namespace target the
# parent Gateway in gateway-system, and let the Gateway pull Secrets across
# namespaces if cert-manager writes them into gateway-system.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: iogrid-routes-to-gateway
  namespace: gateway-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: iogrid
    - group: gateway.networking.k8s.io
      kind: TLSRoute
      namespace: iogrid
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: iogrid
