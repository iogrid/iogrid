---
# Gateway API v1 Gateway for iogrid hostnames.
# Sits in gateway-system namespace, exposed via Cilium / Envoy Gateway controller.
# Listeners:
#  - HTTPS  443 (terminate)     → iogrid.org, www.iogrid.org,
#                                  app.iogrid.org (redirect), api.iogrid.org,
#                                  build.iogrid.org
#  - TLS    443 (passthrough)   → proxy.iogrid.org   (raw TLS forwarded to proxy-gateway)
#  - HTTP   80                  → redirect to HTTPS
#
# EPIC #422 Phase 3 folded marketing/ into web/ and dropped the
# app.iogrid.org subdomain — the product app moved to iogrid.org.
# The `app-https` listener keeps app.iogrid.org alive for the 90-day
# redirect-grace window (HTTPRoute returns 301 to iogrid.org); the
# new `apex-https` + `www-https` listeners route iogrid.org +
# www.iogrid.org to the web Service.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: iogrid
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: iogrid
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: apex-https
      protocol: HTTPS
      port: 443
      hostname: iogrid.org
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            # iogrid-org-tls SAN list: iogrid.org, www.iogrid.org,
            # and (during the 90-day grace period) app.iogrid.org.
            name: iogrid-org-tls
            namespace: gateway-system
      allowedRoutes:
        namespaces:
          from: All
    - name: www-https
      protocol: HTTPS
      port: 443
      hostname: www.iogrid.org
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: iogrid-org-tls
            namespace: gateway-system
      allowedRoutes:
        namespaces:
          from: All
    - name: app-https
      protocol: HTTPS
      port: 443
      hostname: app.iogrid.org
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            # Kept during the 90-day redirect-grace window. After
            # the grace period the app-https listener + this Secret
            # both retire — see the follow-up ticket for SAN cleanup.
            name: app-iogrid-org-tls
            namespace: gateway-system
      allowedRoutes:
        namespaces:
          from: All
          # selector below cannot be combined with from: All — Gateway-API spec.
    - name: api-https
      protocol: HTTPS
      port: 443
      hostname: api.iogrid.org
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: api-iogrid-org-tls
            namespace: gateway-system
      allowedRoutes:
        namespaces:
          from: All
    - name: build-https
      protocol: HTTPS
      port: 443
      hostname: build.iogrid.org
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: build-iogrid-org-tls
            namespace: gateway-system
      allowedRoutes:
        namespaces:
          from: All
    # proxy.iogrid.org — TLS passthrough; the customer's TLS terminates inside
    # the proxy-gateway pod, not at the Gateway. Gateway only does SNI routing.
    - name: proxy-tls
      protocol: TLS
      port: 443
      hostname: proxy.iogrid.org
      tls:
        mode: Passthrough
      allowedRoutes:
        kinds:
          - kind: TLSRoute
        namespaces:
          from: All
