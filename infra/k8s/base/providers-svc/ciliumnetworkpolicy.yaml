---
# providers-svc CiliumNetworkPolicy — SPIFFE-style mutual auth.
# Companion to networkpolicy.yaml (issue #35).
# See docs/SECURITY-mTLS.md.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: providers-svc-mtls
  namespace: iogrid
  labels:
    app.kubernetes.io/name: providers-svc
    app.kubernetes.io/part-of: iogrid
    iogrid.org/policy-class: spiffe-mtls
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: providers-svc
  ingress:
    # iogrid peers that call providers-svc.
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: gateway-bff
            io.kubernetes.pod.namespace: iogrid
        - matchLabels:
            app.kubernetes.io/name: proxy-gateway
            io.kubernetes.pod.namespace: iogrid
        - matchLabels:
            app.kubernetes.io/name: workloads-svc
            io.kubernetes.pod.namespace: iogrid
        - matchLabels:
            app.kubernetes.io/name: billing-svc
            io.kubernetes.pod.namespace: iogrid
      authentication:
        mode: required
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Prometheus scrape — different trust domain, no SPIFFE auth.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
