apiVersion: v1
kind: Service
metadata:
  name: providers-svc
  namespace: iogrid
  labels:
    app.kubernetes.io/name: providers-svc
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: providers-svc
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
      # Connect-RPC handlers exposed by providers-svc speak HTTP/2 cleartext
      # to the gateway. Mark the Service port as h2c so Traefik / Cilium
      # Gateway don't downgrade the forward to HTTP/1.1. See #259.
      appProtocol: kubernetes.io/h2c
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
