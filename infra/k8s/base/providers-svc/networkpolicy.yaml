---
# providers-svc — provider registry, daemon long-lived gRPC streams terminate here.
# Ingress: gateway-bff (queries), proxy-gateway (daemon stream tunneling), workloads-svc (scheduling).
# Egress: Postgres, Redis (provider state cache), NATS.
#
# Kept as L3/L4 defense-in-depth alongside ./ciliumnetworkpolicy.yaml
# (issue #35 — Cilium SPIFFE-style service mTLS).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: providers-svc-allow
  namespace: iogrid
  labels:
    app.kubernetes.io/name: providers-svc
    app.kubernetes.io/part-of: iogrid
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: providers-svc
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway-bff
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: proxy-gateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: workloads-svc
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: billing-svc
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: iogrid-pg
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - protocol: TCP
          port: 4222
