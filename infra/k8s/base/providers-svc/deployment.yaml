apiVersion: apps/v1
kind: Deployment
metadata:
  name: providers-svc
  namespace: iogrid
  labels:
    app.kubernetes.io/name: providers-svc
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: providers-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: providers-svc
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        # Bumped by .github/workflows/coordinator-ci.yml on every push to
        # main so the rolling update fires even when the image digest is
        # cache-identical. Treated as an opaque ISO-8601 string by the
        # deploy-bot — do not hand-edit unless you intend to roll the
        # pods. Refs #335.
        kubectl.kubernetes.io/restartedAt: "2026-05-21T01:35:26Z"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: providers-svc
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: providers-svc
          image: ghcr.io/iogrid/providers-svc@sha256:fd3f3f562331a3ad3fe4f8f0748bfa77e8127e864220cd9707061264e53fc7d7
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: info
            - name: SERVICE_NAME
              value: providers-svc
          envFrom:
            - configMapRef:
                name: providers-svc-config
                optional: true
            - secretRef:
                name: providers-svc-secrets
                optional: true
            # CNPG Postgres connection — carries DATABASE_URL. Without
            # this, providers-svc falls back to the in-memory store and
            # loses every paired daemon on pod restart (issue #242, #284).
            #
            # Name matches the CNPG-managed Secret on the mothership
            # (created by the iogrid-pg Cluster's bootstrap step that
            # provisions one role per service). Earlier versions of this
            # manifest used the more generic name `iogrid-database`,
            # which the cluster never had — the pod silently fell back
            # to memory mode and operators saw paired daemons vanish on
            # every rollout (regression captured in #284).
            - secretRef:
                name: iogrid-providers-db
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: providers-svc
