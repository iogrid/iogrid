apiVersion: v1
kind: ServiceAccount
metadata:
  name: updates
  namespace: iogrid
  labels:
    app.kubernetes.io/name: updates
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: updates
# manifestd serves a static manifest.json from a ConfigMap mount. It does
