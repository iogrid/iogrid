---
# manifest.json served by updates.iogrid.org/manifest.json (manifestd).
#
# This ConfigMap is the source-of-truth for what iogridd instances poll
# when checking for updates. It is auto-updated by the
# `.github/workflows/updates-ci.yml` `manifest-publish` job on every
# `v*` tag push: the job generates the real artifact SHA256 hashes from
# GitHub Release assets and commits a new version of this file.
#
# Format: installer/auto-update/manifest.schema.json
# Schema owner: daemon/crates/core/src/updater/manifest.rs
#
# Refs #485.
apiVersion: v1
kind: ConfigMap
metadata:
  name: updates-manifest
  namespace: iogrid
  labels:
    app.kubernetes.io/name: updates
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: updates
