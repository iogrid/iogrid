apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-svc
  namespace: iogrid
  labels:
    app.kubernetes.io/name: billing-svc
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billing-svc
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        # Bumped by .github/workflows/coordinator-ci.yml on every push to
        # main so the rolling update fires even when the image digest is
        # cache-identical. Treated as an opaque ISO-8601 string by the
        # deploy-bot — do not hand-edit unless you intend to roll the
        # pods. Refs #335.
        kubectl.kubernetes.io/restartedAt: "2026-06-03T18:53:49Z"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: billing-svc
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: billing-svc
          # The image reference is rewritten by .github/workflows/coordinator-ci.yml
          # on every push to main to a fully-qualified digest pin of the form
          #   ghcr.io/iogrid/billing-svc@sha256:<digest>
          # so that:
          #   (a) the deployment is bit-exact reproducible from `git show`
          #   (b) the kustomize-controller detects the change on the next
          #       5m reconcile interval (gitops/flux/iogrid-kustomization.yaml)
          #   (c) imagePullPolicy: Always belt-and-braces guarantees the
          #       node pulls the digest even when the tag string is unchanged
          # Refs #335 (and #324, which depends on this loop to actually
          # ship the new EarningsService RPCs to prod).
          image: harbor.openova.io/iogrid/billing-svc@sha256:77fcbc1f515f1e1f80d777d8308abd103ed5024a5aabb0f60cea08913dbf0bb8
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: billing-svc
            # NATS JetStream for the metering consumer (workload events
            # → usage rollup). When the in-cluster NATS StatefulSet at
            # `infra/k8s/base/data/nats.yaml` is applied, billing-svc's
            # metering loop subscribes to the `workload.metering.>` topic
            # and aggregates per-customer usage. Until the StatefulSet
            # is applied, the boot WARN "NATS_URL not set — metering
            # consumer disabled" keeps firing — usage rollup just stays
            # idle (no data loss; events sit on the producer side).
            - name: NATS_URL
              value: nats://nats.iogrid.svc.cluster.local:4222
            # GRID_TOKEN_MINT_ADDRESS is co-located with the keypair in
            # the iogrid-solana-payout Secret so the operator pastes
            # mint + keypair together. envFrom on the secret would also
            # slurp the binary `keypair_json` blob into an env var,
            # which we DON'T want — that's mounted as a file below.
            - name: GRID_TOKEN_MINT_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: iogrid-solana-payout
                  key: grid_token_mint_address
                  optional: true
          envFrom:
            - configMapRef:
                name: billing-svc-config
                optional: true
            - secretRef:
                name: billing-svc-secrets
                optional: true
            # CNPG Postgres connection — carries DATABASE_URL. Same
            # pattern as other coordinator services (vpn-svc has
            # iogrid-vpn-svc-db, identity-svc has iogrid-identity-svc-db,
            # etc.). Made required so the pod refuses to boot rather
            # than crash-loop on missing DB.
            - secretRef:
                name: iogrid-billing-db
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # Solana hot-wallet keypair. The Secret's `keypair_json`
            # key is projected as a file at /var/run/solana/keypair.json
            # which billing-svc reads via SOLANA_HOT_WALLET_KEYPAIR_PATH.
            # Optional: when the Secret is missing the volume mounts an
            # empty dir and billing-svc stays in stub mode (logs SKIP).
            - name: solana-keypair
              mountPath: /var/run/solana
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: solana-keypair
          secret:
            secretName: iogrid-solana-payout
            optional: true
            defaultMode: 0400
            items:
              - key: keypair_json
                path: keypair.json
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: billing-svc
