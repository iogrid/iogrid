---
# proxy-gateway — raw-TLS-passthrough data plane for proxy.iogrid.org.
# Ingress: Gateway-system (TLS passthrough), customer TCP traffic.
# Egress: providers-svc (route to daemon stream), antiabuse-svc (pre-flight), telemetry-svc (flow events),
#         Redis (session stickiness), NATS, customer destinations (the whole internet — this IS the proxy).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: proxy-gateway-allow
  namespace: iogrid
  labels:
    app.kubernetes.io/name: proxy-gateway
    app.kubernetes.io/part-of: iogrid
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: proxy-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway-system
      ports:
        - protocol: TCP
          port: 8443
        - protocol: TCP
          port: 1080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: providers-svc
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: antiabuse-svc
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: telemetry-svc
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: workloads-svc
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - protocol: TCP
          port: 4222
    # Egress to provider WireGuard endpoints (UDP) is brokered via providers-svc
    # over the gRPC stream — proxy-gateway never opens raw UDP to provider IPs
    # in the default policy. The data-plane crossing happens inside the cluster
    # via the provider's long-lived stream terminating on providers-svc.
