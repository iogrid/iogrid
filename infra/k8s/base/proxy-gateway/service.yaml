apiVersion: v1
kind: Service
metadata:
  name: proxy-gateway
  namespace: iogrid
  labels:
    app.kubernetes.io/name: proxy-gateway
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: gateway
  annotations:
    # TLS-passthrough: Gateway API listener forwards raw TCP to this ClusterIP service.
    # No L7 decoding happens between Gateway and proxy-gateway pod.
    iogrid.org/tls-passthrough: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: proxy-gateway
  ports:
    - name: tls
      port: 443
      targetPort: tls
      protocol: TCP
    - name: socks5
      port: 1080
      targetPort: socks5
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
