---
# Grafana dashboards are shipped as ConfigMaps in the iogrid namespace
# with the label `grafana_dashboard: "1"`. The Grafana sidecar
# (kiwigrid/k8s-sidecar) running in the mothership monitoring namespace
# auto-discovers these and provisions them into Grafana — no manual
# Grafana API calls needed.
#
# The actual ConfigMap is generated by kustomize from the JSON files
# under coordinator/services/telemetry-svc/dashboards/. See the
# top-level base/kustomization.yaml `configMapGenerator` entry.
#
# This placeholder file exists so the dashboards directory shows up in
# `kustomize build` output even when the configMapGenerator is empty
# (e.g. first-time bootstrap before the file is wired).
apiVersion: v1
kind: ConfigMap
metadata:
  name: telemetry-svc-dashboards-marker
  namespace: iogrid
  labels:
    app.kubernetes.io/name: telemetry-svc
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: dashboards
data:
  README: |
    Grafana dashboards for iogrid live under
    coordinator/services/telemetry-svc/dashboards/ and are loaded into
    the iogrid-dashboards ConfigMap by the configMapGenerator in
    base/kustomization.yaml.
