---
# telemetry-svc — ingests daemon and proxy-flow telemetry, fans out to Loki/Tempo/Prom + audit log.
# Ingress: proxy-gateway (flow events), gateway-bff (read API), workloads-svc (workload events).
# Egress: Postgres (audit log), Redis (hot metrics), NATS (event bus), monitoring namespace (Loki/Tempo).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: telemetry-svc-allow
  namespace: iogrid
  labels:
    app.kubernetes.io/name: telemetry-svc
    app.kubernetes.io/part-of: iogrid
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: telemetry-svc
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: proxy-gateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway-bff
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: workloads-svc
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: build-gateway
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: iogrid-pg
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - protocol: TCP
          port: 4222
    # Push to Loki/Tempo in monitoring namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3100
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
