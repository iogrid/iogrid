apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-svc
  namespace: iogrid
  labels:
    app.kubernetes.io/name: telemetry-svc
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: backend
spec:
  replicas: 0
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: telemetry-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: telemetry-svc
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: backend
      annotations:
        # The /metrics endpoint on the telemetry-svc container itself is
        # scraped by the in-pod otelcol gateway via prometheus receiver
        # auto-discovery. Annotations match the receiver's relabel_configs.
        prometheus.io/scrape: "true"
        # Bumped by .github/workflows/coordinator-ci.yml on every push to
        # main so the rolling update fires even when the image digest is
        # cache-identical. Treated as an opaque ISO-8601 string by the
        # deploy-bot — do not hand-edit unless you intend to roll the
        # pods. Refs #335.
        kubectl.kubernetes.io/restartedAt: "2026-06-03T22:27:43Z"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: telemetry-svc
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        # ---------- telemetry-svc control surface ----------
        - name: telemetry-svc
          image: harbor.openova.io/iogrid/telemetry-svc@sha256:1bcd4160a5d75149abd0c0471813abab2ee3cc151bc9830c721297585c313a6d
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: info
            - name: SERVICE_NAME
              value: telemetry-svc
            - name: SLO_DIR
              value: /etc/slo
            # The collector config is written here at boot, then mounted
            # into the otelcol container at the same path. The shared
            # volume is an emptyDir so both containers see the same file.
            - name: COLLECTOR_CONFIG_PATH
              value: /etc/otelcol/config.yaml
            - name: COLLECTOR_GRPC_ADDR
              value: 0.0.0.0:4317
            - name: COLLECTOR_HTTP_ADDR
              value: 0.0.0.0:4318
          envFrom:
            - configMapRef:
                name: telemetry-svc-config
                optional: true
            - secretRef:
                name: telemetry-svc-secrets
                optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: otelcol-config
              mountPath: /etc/otelcol
            - name: slo-catalogue
              mountPath: /etc/slo
              readOnly: true

        # ---------- otelcol gateway (central, in-pod) ----------
        # The collector is INSIDE the iogrid namespace as a central
        # gateway, not as a per-pod sidecar on every service. Other
        # iogrid services push OTLP to the telemetry-otelcol Service
        # on :4317 / :4318 (defined in service.yaml).
        #
        # Co-locating it in the telemetry-svc Pod lets us share the
        # config volume (no ConfigMap roundtrip on hot reload) and
        # gives the otelcol container an immediate ready-config the
        # moment telemetry-svc finishes rendering it on first boot.
        - name: otelcol
          image: otel/opentelemetry-collector-contrib:0.105.0
          imagePullPolicy: Always
          args:
            - --config=/etc/otelcol/config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: otelcol-metrics
              containerPort: 8888
              protocol: TCP
            - name: health-check
              containerPort: 13133
              protocol: TCP
          env:
            - name: GOMEMLIMIT
              value: "400MiB"
          resources:
            requests:
              # Phase-0 single-node fit — otelcol idle uses ~50Mi.
              # Limits still allow growth to 768Mi if pipelines load up.
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /
              port: health-check
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: health-check
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: otelcol-config
              mountPath: /etc/otelcol
              readOnly: true
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
        # otelcol-config is shared rw between telemetry-svc (writer) and
        # otelcol (reader). otelcol watches the file via its built-in
        # config watcher and hot-reloads its pipelines on change.
        - name: otelcol-config
          emptyDir: {}
        # The SLO catalogue is shipped as a ConfigMap so operators can
        # iterate on objectives without rebuilding the binary. The
        # ConfigMap is generated from coordinator/services/telemetry-svc/slo/
        # by the Flux Kustomization (configMapGenerator below).
        - name: slo-catalogue
          configMap:
            name: telemetry-svc-slo
            optional: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: telemetry-svc
