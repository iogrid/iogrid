apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vpn-gateway
  namespace: iogrid
  labels:
    app.kubernetes.io/name: vpn-gateway
    app.kubernetes.io/part-of: iogrid
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vpn-gateway
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    # vpn-gateway scales down slowly because each pod holds long-lived
    # WG tunnels — dropping a pod kicks every customer routed to it.
    scaleDown:
      stabilizationWindowSeconds: 900
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
