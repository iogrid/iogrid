---
# vpn-gateway CiliumNetworkPolicy — SPIFFE-style mutual auth.
# Companion to networkpolicy.yaml (issue #35).
#
# vpn-gateway accepts WireGuard handshakes on UDP :51820 from the
# public internet — that hop is NOT SPIFFE-auth'd (the source is the
# end customer, not a SPIFFE workload). The :8080 control surface
# from gateway-bff IS a SPIFFE workload and requires mutual auth.
#
# See docs/SECURITY-mTLS.md.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vpn-gateway-mtls
  namespace: iogrid
  labels:
    app.kubernetes.io/name: vpn-gateway
    app.kubernetes.io/part-of: iogrid
    iogrid.org/policy-class: spiffe-mtls
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vpn-gateway
  ingress:
    # gateway-bff → vpn-gateway control surface — SPIFFE mutual auth.
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: gateway-bff
            io.kubernetes.pod.namespace: iogrid
      authentication:
        mode: required
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Public Gateway → control surface (admit flow) — different trust domain.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gateway-system
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Prometheus scrape — different trust domain.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # WireGuard handshakes — public internet, no SPIFFE auth meaningful.
    - toPorts:
        - ports:
            - port: "51820"
              protocol: UDP
