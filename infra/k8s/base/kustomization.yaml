apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: iogrid
labels:
  # includeSelectors MUST be false: the live Deployments were created with
  # `{app.kubernetes.io/name: <svc>}`-only selectors. spec.selector is
  # IMMUTABLE, so injecting part-of into selectors (includeSelectors: true)
  # made Flux's server-side apply fail with "spec.selector: Invalid value"
  # on every Deployment — which is why iogrid could never be Flux-reconciled
  # (#637). part-of stays as a metadata label for grouping, just not in the
  # immutable selector.
  - pairs:
      app.kubernetes.io/part-of: iogrid
    includeSelectors: false
resources:
  - namespaces
  - data
  - identity-svc
  - providers-svc
  - workloads-svc
  - antiabuse-svc
  - billing-svc
  - telemetry-svc
  - grafana
  - gateway-bff
  - proxy-gateway
  - vpn-gateway
  - vpn-svc
  - build-gateway
  - web
  - admin
  # marketing/ was removed in EPIC #422 Phase 3 — the static-export
  # Deployment + Service no longer ship; the apex (iogrid.org) is
  # served by the `web` Service instead.
  - releases
  - updates
  - gateway
  - certs
  - sparkle
