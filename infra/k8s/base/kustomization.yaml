apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: iogrid
labels:
  - pairs:
      app.kubernetes.io/part-of: iogrid
    includeSelectors: true
resources:
  - namespaces
  - data
  - identity-svc
  - providers-svc
  - workloads-svc
  - antiabuse-svc
  - billing-svc
  - telemetry-svc
  - grafana
  - gateway-bff
  - proxy-gateway
  - vpn-gateway
  - build-gateway
  - web
  - admin
  - gateway
  - certs
