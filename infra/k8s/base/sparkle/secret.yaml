---
# iogrid-sparkle-signing — ed25519 private key used by daemon-ci.yml's
# generate-appcast step to sign the Sparkle 2 appcast.xml feed.
#
# IMPORTANT: this file is a TEMPLATE. The empty stringData is intentional:
# the actual private key MUST come from OpenBao via external-secrets at
# kv/iogrid/sparkle/privkey.ed25519. NEVER paste the private key into git.
#
# Phase 1 of EPIC #348 ships the shape; the wiring to external-secrets +
# OpenBao is filed as a follow-up because the iogrid Sovereign hasn't
# stood up its OpenBao instance yet. Until that lands, CI uploads the
# private key via a GitHub Actions repository-secret named
# SPARKLE_ED_PRIVKEY_B64 (base64-encoded), and the appcast generation step
# reads it from $RUNNER_TEMP.
#
# To rotate or first-provision:
#   1. ./installer/macos/sparkle/generate-keypair.sh /tmp/keys
#   2. Store /tmp/keys/privkey.ed25519 in OpenBao at
#      kv/iogrid/sparkle/privkey.ed25519
#   3. Apply this template AS-IS. external-secrets will project the value
#      once it reconciles.
#   4. Update installer/macos/sparkle/pubkey.ed25519 with the new pubkey +
#      bump the SUPublicEDKey in installer/macos/app/Contents/Info.plist
#      AND the dev-fallback path in daemon-ci.yml. Ship in the SAME PR.
apiVersion: v1
kind: Secret
metadata:
  name: iogrid-sparkle-signing
  namespace: iogrid
  labels:
    app.kubernetes.io/name: iogrid-sparkle-signing
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: signing
  annotations:
    iogrid.org/source: "openbao://kv/iogrid/sparkle/"
    iogrid.org/owner: "platform-team"
    iogrid.org/rotation-policy: "annual or on team-membership change"
type: Opaque
# stringData intentionally empty in git — values populated by
# external-secrets controller from OpenBao. See kustomization.yaml for
# the ExternalSecret resource that drives this (filed as follow-up
# once OpenBao stands up on iogrid Sovereign).
stringData:
  # ed25519 private key (PEM-encoded, as produced by Sparkle's generate_keys -f).
  # Format: base64 string, no surrounding PEM markers, single line.
  privkey.ed25519: ""
