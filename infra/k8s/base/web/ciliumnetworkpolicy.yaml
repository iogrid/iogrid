---
# web CiliumNetworkPolicy — SPIFFE-style mutual auth.
# Companion to networkpolicy.yaml (issue #35).
#
# Next.js web frontend. Ingress is only from the public Gateway and
# the monitoring scrape — both different trust domains. No SPIFFE auth
# on ingress; the egress side (web → gateway-bff) is enforced on the
# gateway-bff CNP, not here (Cilium auth is gated on the destination).
#
# See docs/SECURITY-mTLS.md.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: web-mtls
  namespace: iogrid
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: iogrid
    iogrid.org/policy-class: spiffe-mtls
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: web
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gateway-system
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
