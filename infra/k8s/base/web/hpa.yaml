apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web
  namespace: iogrid
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: iogrid
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  # minReplicas MUST stay >=2: the Deployment rolls with maxUnavailable:1,
  # which is only outage-free when a second replica keeps serving while one
  # is replaced. min=1 + maxUnavailable:1 took iogrid.org down for ~6 min on
  # 2026-06-04 when the image-reroll cron killed the sole pod and the node
  # was at the kubelet pod cap, so the replacement sat Pending (#682).
  minReplicas: 2
  # maxReplicas right-sized 10→3 (2026-06-04): on the single saturated
  # node (#682) 10 replicas can never schedule, and the flaky
  # metrics-server kept inflating web to 5–6 replicas at ~11% real CPU,
  # squatting scarce pod slots and starving fleet rollouts. 3 allows a
  # genuine burst replica while staying schedulable. Revisit when node 2
  # lands.
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
