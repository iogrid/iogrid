apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: iogrid
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    # web is STATELESS (no session affinity / tunnels — unlike the data-plane
    # gateways which keep maxUnavailable:0 deliberately). maxUnavailable:1 lets
    # rollouts proceed by replacing pods in place when the node has no surge
    # headroom — a surge-only strategy deadlocked the #677 web roll when the
    # HPA had scaled web to 4 and the node was out of memory + pod slots
    # (new pod Pending on "Insufficient memory / Too many pods").
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        # Bumped by .github/workflows/web-ci.yml on every push to main so the
        # rolling update fires even when the image digest happens to be
        # cache-identical. Treated as an opaque ISO-8601 string by the
        # deploy-bot sed in the workflow — do not hand-edit unless you intend
        # to roll the pods.
        kubectl.kubernetes.io/restartedAt: "2026-06-03T21:55:04Z"
    spec:
      serviceAccountName: web
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          # The image reference is rewritten by .github/workflows/web-ci.yml
          # on every push to main to a fully-qualified digest pin of the form
          #   ghcr.io/iogrid/web@sha256:<digest>
          # so that:
          #   (a) the deployment is bit-exact reproducible from `git show`
          #   (b) the kustomize-controller detects the change on the next
          #       5m reconcile interval (gitops/flux/iogrid-kustomization.yaml)
          #   (c) imagePullPolicy: Always belt-and-braces guarantees the
          #       node pulls the digest even when the tag string is unchanged
          # Refs #332.
          image: harbor.openova.io/iogrid/web@sha256:5328c674624f2dae948a346b0bae0550065c5a82e04cfbaca67fffef4b8c85d4
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: info
            - name: SERVICE_NAME
              value: web
          envFrom:
            - configMapRef:
                name: web-config
                optional: true
            - secretRef:
                name: web-secrets
                optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: web
