apiVersion: batch/v1
kind: Job
metadata:
  name: solana-grid-bootstrap
  namespace: iogrid
  labels:
    app.kubernetes.io/name: solana-grid-bootstrap
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: solana-grid-bootstrap
    spec:
      restartPolicy: OnFailure
      # Bootstrap needs the in-cluster SA token to call kubectl against
      # the API server (creates Secret, exec'es into validator pod).
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-validator
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "waiting for solana-validator:8899 …"
              until nc -z solana-validator 8899; do sleep 2; done
              echo "validator is up"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: bootstrap
          # bitnami/kubectl ships kubectl + bash. The solana CLI lives inside
          # the validator pod itself; we `kubectl exec` into it to run
          # solana-keygen / airdrop / spl-token, then create the Secret from
          # the captured output. This avoids cramming two binary sets into
          # one image.
          image: bitnami/kubectl:latest
          command: ["bash", "-c"]
          args:
            - |
              set -eu
              if kubectl -n iogrid get secret iogrid-solana-payout >/dev/null 2>&1; then
                echo "iogrid-solana-payout already present; nothing to do"
                exit 0
              fi
              VPOD=solana-validator-0
              RPC=http://127.0.0.1:8899
              KX() { kubectl -n iogrid exec "$VPOD" -- "$@"; }
              # The validator pod's HOME is non-writable for uid 1000;
              # `solana config set` fails with EACCES on ~/.config/solana.
              # Bypass by passing --url + --keypair as flags everywhere.
              echo "→ generating payer keypair inside validator pod"
              KX rm -f /tmp/payer.json
              KX solana-keygen new --no-bip39-passphrase --silent --outfile /tmp/payer.json
              PAYER_PUB=$(KX solana-keygen pubkey /tmp/payer.json | tr -d '\r\n')
              echo "  payer pubkey: $PAYER_PUB"
              echo "→ airdropping 100 SOL"
              KX solana airdrop 100 "$PAYER_PUB" --url "$RPC" --keypair /tmp/payer.json || true
              KX solana balance "$PAYER_PUB" --url "$RPC" || true
              echo "→ minting \$GRID SPL token (decimals 9)"
              MINT_OUT=$(KX spl-token create-token --decimals 9 --url "$RPC" --fee-payer /tmp/payer.json --mint-authority /tmp/payer.json --output json 2>&1) || true
              echo "$MINT_OUT"
              # Fallback: re-run without --output json for human-readable parse
              if ! echo "$MINT_OUT" | grep -q 'commandOutput\|Creating token'; then
                MINT_OUT=$(KX spl-token create-token --decimals 9 --url "$RPC" --fee-payer /tmp/payer.json --mint-authority /tmp/payer.json)
                echo "$MINT_OUT"
              fi
              echo "$MINT_OUT"
              # Parse mint from either JSON (.commandOutput) or text "Creating token ADDR"
              MINT=$(echo "$MINT_OUT" | grep -oE '[1-9A-HJ-NP-Za-km-z]{40,44}' | head -1)
              if [ -z "$MINT" ]; then
                echo "::error::failed to parse \$GRID mint address"
                exit 2
              fi
              echo "  GRID mint: $MINT"
              echo "→ creating ATA + minting 1B GRID treasury"
              KX spl-token create-account "$MINT" --url "$RPC" --fee-payer /tmp/payer.json --owner /tmp/payer.json || true
              KX spl-token mint "$MINT" 1000000000 --url "$RPC" --fee-payer /tmp/payer.json --mint-authority /tmp/payer.json || true
              echo "→ pulling keypair JSON out of validator pod"
              kubectl -n iogrid cp "$VPOD":/tmp/payer.json /tmp/payer.json
              echo "→ creating Secret iogrid-solana-payout"
              # Secret key "keypair_json" is the canonical name billing-svc's
              # Deployment volume-mount references (path: keypair.json under
              # /var/run/solana). GRID_TOKEN_MINT_ADDRESS + SOLANA_PAYER_PUBKEY
              # are sibling string fields read via envFrom.
              kubectl -n iogrid create secret generic iogrid-solana-payout \
                --from-file=keypair_json=/tmp/payer.json \
                --from-literal=GRID_TOKEN_MINT_ADDRESS="$MINT" \
                --from-literal=SOLANA_PAYER_PUBKEY="$PAYER_PUB" \
                --dry-run=client -o yaml | kubectl apply -f -
              echo "✓ \$GRID bootstrap complete (payer=$PAYER_PUB mint=$MINT)"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      serviceAccountName: solana-grid-bootstrap
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: solana-grid-bootstrap
  namespace: iogrid
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: solana-grid-bootstrap
  namespace: iogrid
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: solana-grid-bootstrap
  namespace: iogrid
subjects:
  - kind: ServiceAccount
    name: solana-grid-bootstrap
    namespace: iogrid
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: solana-grid-bootstrap
