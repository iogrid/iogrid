---
# identity-svc runtime config (NON-secret). Referenced via envFrom in the
# Deployment. Values captured from the live prod Deployment (2026-06-03,
# #640) where they were hardcoded literal env. The SECRETS that identity-svc
# also needs — GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, IOGRID_SERVICE_TOKEN,
# DATABASE_URL, JWT_* — belong in the identity-svc-secrets Secret (operator
# provided), NOT here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-svc-config
  namespace: iogrid
  labels:
    app.kubernetes.io/name: identity-svc
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: identity
data:
  # iogrid.org, NOT app.iogrid.org — the app.* subdomain was dropped and now
  # 301s to the apex (verified: app.iogrid.org/api/auth/callback/google → 301 →
  # iogrid.org/...). An OAuth redirect_uri must match EXACTLY; a 301 mid-flow
  # breaks Google sign-in, so this must be the canonical apex host (#648, prereq
  # for #646). Web NextAuth already derives the apex callback from NEXTAUTH_URL.
  GOOGLE_REDIRECT_URL: "https://iogrid.org/api/auth/callback/google"
  BASE_URL: "https://api.iogrid.org"
  ALLOWED_RETURN_HOSTS: "iogrid.org,app.iogrid.org"
  REDIS_URL: "redis://redis-client.iogrid.svc.cluster.local:6379/0"
