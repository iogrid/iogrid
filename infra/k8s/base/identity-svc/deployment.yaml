apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-svc
  namespace: iogrid
  labels:
    app.kubernetes.io/name: identity-svc
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-svc
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        # Bumped by .github/workflows/coordinator-ci.yml on every push to
        # main so the rolling update fires even when the image digest is
        # cache-identical. Treated as an opaque ISO-8601 string by the
        # deploy-bot — do not hand-edit unless you intend to roll the
        # pods. Refs #335.
        kubectl.kubernetes.io/restartedAt: "2026-05-22T20:55:51Z"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: identity-svc
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: identity-svc
          image: ghcr.io/iogrid/identity-svc@sha256:5df03729996b3119f8260428c933e4009ad9eef90679ee7d24cd9fce9c425e6d
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: info
            - name: SERVICE_NAME
              value: identity-svc
            # JWT keys — prod mounts the SealedSecret `identity-svc-jwt`
            # at /etc/identity/jwt (read-only). For dev / e2e the same
            # mount can be left empty and JWT_KEYPAIR_AUTOGEN=1 set,
            # in which case the binary writes an ephemeral keypair to
            # the /tmp/jwt-keys emptyDir below.
            - name: JWT_PRIVATE_KEY_PATH
              value: /etc/identity/jwt/private.pem
            - name: JWT_PUBLIC_KEY_PATH
              value: /etc/identity/jwt/public.pem
            - name: JWT_AUTOGEN_DIR
              value: /tmp/jwt-keys
            # Redis for SIWS challenge store + session cache (#453). When
            # the in-cluster Redis StatefulSet at
            # `infra/k8s/base/data/redis.yaml` is applied, the client
            # service `redis-client` resolves to a TCP load-balanced
            # 6-node cluster. Until then, identity-svc's main.go best-
            # effort path falls back to the in-memory store with a WARN
            # — single-pod-only safe. Both modes work today.
            - name: REDIS_URL
              value: redis://redis-client.iogrid.svc.cluster.local:6379/0
            # 🛑 PROD CUTOVER GATE (#452): remove `JWT_KEYPAIR_AUTOGEN=1`
            # once the SealedSecret `identity-svc-jwt` lands. Today the
            # ephemeral keypair is regenerated on every Pod start —
            # which means every roll signs every active user out.
            # `scripts/identity-svc-jwt-keypair-gen.sh` produces the
            # founder-side material; `kubeseal` packages it; Flux
            # applies; THEN this env var must be deleted so the
            # binary reads from the Secret mount instead.
            #
            # Captured in git here (was previously a `kubectl set env`
            # drift, see #452) so the runtime matches IaC and the
            # drop-trigger is unambiguous.
            - name: JWT_KEYPAIR_AUTOGEN
              value: "1"
          envFrom:
            - configMapRef:
                name: identity-svc-config
                optional: true
            - secretRef:
                name: identity-svc-secrets
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # JWT keypair — SealedSecret in prod, optional in dev.
            # `optional: true` on the projected secret lets the Pod
            # start when the Secret is absent (dev / e2e); operators
            # set JWT_KEYPAIR_AUTOGEN=1 in that path and the binary
            # writes an ephemeral keypair to the jwt-keys emptyDir.
            - name: jwt
              mountPath: /etc/identity/jwt
              readOnly: true
            - name: jwt-keys
              mountPath: /tmp/jwt-keys
      volumes:
        - name: tmp
          emptyDir: {}
        - name: jwt
          secret:
            secretName: identity-svc-jwt
            optional: true
        - name: jwt-keys
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: identity-svc
