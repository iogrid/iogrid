apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-svc
  namespace: iogrid
  labels:
    app.kubernetes.io/name: identity-svc
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-svc
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        # Bumped by .github/workflows/coordinator-ci.yml on every push to main
        # so the rolling update fires even when the image digest happens to be
        # cache-identical. Treated as an opaque ISO-8601 string by the deploy-bot
        # sed in the workflow — do not hand-edit unless you intend to roll the
        # pods.  Refs #335.
        kubectl.kubernetes.io/restartedAt: "2026-05-21T00:00:00Z"
    spec:
      serviceAccountName: identity-svc
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: identity-svc
          # The image reference is rewritten by .github/workflows/coordinator-ci.yml
          # on every push to main to a fully-qualified digest pin of the form
          #   ghcr.io/iogrid/identity-svc@sha256:<digest>
          # so that:
          #   (a) the deployment is bit-exact reproducible from `git show`
          #   (b) the kustomize-controller detects the change on the next
          #       5m reconcile interval (gitops/flux/iogrid-kustomization.yaml)
          #   (c) imagePullPolicy: Always belt-and-braces guarantees the
          #       node pulls the digest even when the tag string is unchanged
          # Refs #335.
          image: ghcr.io/iogrid/identity-svc:scaffold
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: info
            - name: SERVICE_NAME
              value: identity-svc
            # JWT keys — prod mounts the SealedSecret `identity-svc-jwt`
            # at /etc/identity/jwt (read-only). For dev / e2e the same
            # mount can be left empty and JWT_KEYPAIR_AUTOGEN=1 set,
            # in which case the binary writes an ephemeral keypair to
            # the /tmp/jwt-keys emptyDir below.
            - name: JWT_PRIVATE_KEY_PATH
              value: /etc/identity/jwt/private.pem
            - name: JWT_PUBLIC_KEY_PATH
              value: /etc/identity/jwt/public.pem
            - name: JWT_AUTOGEN_DIR
              value: /tmp/jwt-keys
          envFrom:
            - configMapRef:
                name: identity-svc-config
                optional: true
            - secretRef:
                name: identity-svc-secrets
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # JWT keypair — SealedSecret in prod, optional in dev.
            # `optional: true` on the projected secret lets the Pod
            # start when the Secret is absent (dev / e2e); operators
            # set JWT_KEYPAIR_AUTOGEN=1 in that path and the binary
            # writes an ephemeral keypair to the jwt-keys emptyDir.
            - name: jwt
              mountPath: /etc/identity/jwt
              readOnly: true
            - name: jwt-keys
              mountPath: /tmp/jwt-keys
      volumes:
        - name: tmp
          emptyDir: {}
        - name: jwt
          secret:
            secretName: identity-svc-jwt
            optional: true
        - name: jwt-keys
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: identity-svc
