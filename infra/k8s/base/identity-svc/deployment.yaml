apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-svc
  namespace: iogrid
  labels:
    app.kubernetes.io/name: identity-svc
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-svc
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        # Bumped by .github/workflows/coordinator-ci.yml on every push to
        # main so the rolling update fires even when the image digest is
        # cache-identical. Treated as an opaque ISO-8601 string by the
        # deploy-bot — do not hand-edit unless you intend to roll the
        # pods. Refs #335.
        kubectl.kubernetes.io/restartedAt: "2026-06-11T13:19:42Z"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      priorityClassName: iogrid-serving
      serviceAccountName: identity-svc
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: identity-svc
          image: harbor.openova.io/iogrid/identity-svc@sha256:85fb423ae878ec3ef8e186c286adcb90ac026db20d66bb2ef4e804181fbe8845
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: info
            - name: SERVICE_NAME
              value: identity-svc
            # JWT keys — prod mounts the SealedSecret `identity-svc-jwt`
            # at /etc/identity/jwt (read-only). For dev / e2e the same
            # mount can be left empty and JWT_KEYPAIR_AUTOGEN=1 set,
            # in which case the binary writes an ephemeral keypair to
            # the /tmp/jwt-keys emptyDir below.
            - name: JWT_PRIVATE_KEY_PATH
              value: /etc/identity/jwt/private.pem
            - name: JWT_PUBLIC_KEY_PATH
              value: /etc/identity/jwt/public.pem
            - name: JWT_AUTOGEN_DIR
              value: /tmp/jwt-keys
            # Redis for SIWS challenge store + session cache (#453). When
            # the in-cluster Redis StatefulSet at
            # `infra/k8s/base/data/redis.yaml` is applied, the client
            # service `redis-client` resolves to a TCP load-balanced
            # 6-node cluster. Until then, identity-svc's main.go best-
            # effort path falls back to the in-memory store with a WARN
            # — single-pod-only safe. Both modes work today.
            - name: REDIS_URL
              value: redis://redis-client.iogrid.svc.cluster.local:6379/0
            # JWT signing keypair is persisted in Secret `identity-svc-jwt`
            # (created by Job `identity-svc-jwt-bootstrap` — RSA-4096
            # generated inside a one-shot pod, never lands on a non-pod
            # disk). AUTOGEN flag retained as opt-in fallback for dev
            # clusters where the Secret is absent — when "0" (or unset)
            # the binary REQUIRES the Secret mount; the deploy refuses
            # to start otherwise. Closes #452.
            - name: JWT_KEYPAIR_AUTOGEN
              value: "0"
          envFrom:
            - configMapRef:
                name: identity-svc-config
                optional: true
            - secretRef:
                name: identity-svc-secrets
                optional: true
            # CNPG Postgres connection — carries DATABASE_URL (+ DB_HOST/
            # DB_NAME/DB_USER/DB_PASSWORD/DB_PORT). identity-svc's siblings
            # (providers/vpn/billing) all reference their iogrid-<svc>-db
            # the same way; identity-svc was missing it, so DATABASE_URL
            # only existed as a hardcoded literal on the live pod — a
            # declarative apply would have dropped it (#637 killer #2 / #640).
            - secretRef:
                name: iogrid-identity-db
                optional: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # JWT keypair — SealedSecret in prod, optional in dev.
            # `optional: true` on the projected secret lets the Pod
            # start when the Secret is absent (dev / e2e); operators
            # set JWT_KEYPAIR_AUTOGEN=1 in that path and the binary
            # writes an ephemeral keypair to the jwt-keys emptyDir.
            - name: jwt
              mountPath: /etc/identity/jwt
              readOnly: true
            - name: jwt-keys
              mountPath: /tmp/jwt-keys
      volumes:
        - name: tmp
          emptyDir: {}
        - name: jwt
          secret:
            secretName: identity-svc-jwt
            optional: true
        - name: jwt-keys
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: identity-svc
