---
# identity-svc — auth/identity microservice.
# Ingress: from gateway-bff (BFF orchestrates auth flows for the web app).
# Egress: Postgres (CNPG), Redis (sessions), NATS (auth events).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: identity-svc-allow
  namespace: iogrid
  labels:
    app.kubernetes.io/name: identity-svc
    app.kubernetes.io/part-of: iogrid
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: identity-svc
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway-bff
      ports:
        - protocol: TCP
          port: 8080
    # Prometheus scrape
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Postgres (CNPG)
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: iogrid-pg
      ports:
        - protocol: TCP
          port: 5432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # NATS JetStream
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - protocol: TCP
          port: 4222
