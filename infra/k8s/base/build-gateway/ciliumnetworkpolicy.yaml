---
# build-gateway CiliumNetworkPolicy — SPIFFE-style mutual auth.
# Companion to networkpolicy.yaml (issue #35).
#
# build-gateway accepts iOS-build submissions from the public Gateway —
# that hop is NOT SPIFFE-auth'd (source is the customer). The metrics
# scrape path is the only other ingress today.
#
# See docs/SECURITY-mTLS.md.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: build-gateway-mtls
  namespace: iogrid
  labels:
    app.kubernetes.io/name: build-gateway
    app.kubernetes.io/part-of: iogrid
    iogrid.org/policy-class: spiffe-mtls
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: build-gateway
  ingress:
    # Public Gateway → build data plane — different trust domain.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gateway-system
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Prometheus scrape — different trust domain.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
