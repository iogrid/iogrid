---
# Kept as L3/L4 defense-in-depth alongside ./ciliumnetworkpolicy.yaml.
#
# admin — Next.js 15 RSC frontend for admin.iogrid.org (EPIC #422
# Phase 1). Independent of web/.
#
# Ingress: from Traefik (gateway-system) on :3000, and from the
# monitoring namespace on :9090 for Prometheus scrapes.
# Egress: gateway-bff (server-side data fetching from RSC), telemetry-svc
# (RUM), plus cluster DNS (kube-dns).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: admin-allow
  namespace: iogrid
  labels:
    app.kubernetes.io/name: admin
    app.kubernetes.io/part-of: iogrid
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: admin
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway-system
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Cluster DNS (kube-dns / CoreDNS) on UDP+TCP/53. Without this the
    # admin pod cannot resolve gateway-bff.iogrid.svc.cluster.local.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # gateway-bff (server-side BFF proxy) + telemetry-svc (RUM beacons).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway-bff
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: telemetry-svc
      ports:
        - protocol: TCP
          port: 8080
