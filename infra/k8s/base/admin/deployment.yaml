apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: iogrid
  labels:
    app.kubernetes.io/name: admin
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: admin-frontend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: admin-frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: admin
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin
          # Was `:scaffold` which was never pushed → 404 on every pull
          # (#426 + #454 diag 2026-05-23). Pinned to the latest tag
          # admin-ci pushed (sha-d85e56b). The admin-ci.yml deploy-bot
          # step that should auto-bump this on each main push is a
          # separate gap tracked in the same fix.
          image: harbor.openova.io/iogrid/admin:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: info
            - name: SERVICE_NAME
              value: admin
            # admin/ pins the NextAuth session cookie to this host so
            # admin sessions can NEVER bleed into the user-facing app
            # on iogrid.org. See admin/src/auth.config.ts.
            - name: IOGRID_ADMIN_HOST
              value: admin.iogrid.org
            # IOGRID_ADMIN_EMAILS — admin middleware allowlist. When unset,
            # admin/src/middleware.ts treats the allowlist as empty + bounces
            # every authenticated user (the cookie auth passes but the
            # email gate fails, so a 403 lands on every /). Live-verified
            # 2026-05-24 admin walk needed this set; capturing here so it
            # survives a fresh prov instead of staying a `kubectl set env`
            # drift. Closes the gap caught during #422 Phase 4.1 walk.
            - name: IOGRID_ADMIN_EMAILS
              value: emrah.baysal@openova.io,hatice.yildiz@openova.io
            # NextAuth v5 requires AUTH_TRUST_HOST=true when running behind
            # a reverse proxy that terminates TLS (Traefik passes the
            # Host header verbatim). Without this, every /api/auth/* call
            # logs "[auth][error] UntrustedHost". Closes #475.
            - name: AUTH_TRUST_HOST
              value: "true"
          envFrom:
            - configMapRef:
                name: admin-config
                optional: true
            - secretRef:
                name: admin-secrets
                optional: true
            # admin-auth-secrets carries AUTH_SECRET (random 32-byte
            # NextAuth signing key). admin-db-secrets carries DATABASE_URL
            # for the DrizzleAdapter (admin schema in shared iogrid-pg
            # CNPG cluster). Both wired live 2026-05-24 (Closes #475 #476).
            # Provisioning playbook is in
            # `docs/runbooks/2026-05-24-harbor-mirror-bypass.md` follow-up.
            - secretRef:
                name: admin-auth-secrets
                optional: true
            - secretRef:
                name: admin-db-secrets
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: admin
