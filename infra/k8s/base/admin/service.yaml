apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: iogrid
  labels:
    app.kubernetes.io/name: admin
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: admin-frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: admin
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
