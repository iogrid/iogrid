---
# gateway-bff CiliumNetworkPolicy — SPIFFE-style mutual auth.
# Companion to networkpolicy.yaml (issue #35).
#
# gateway-bff is the BFF that orchestrates customer requests from the
# public Gateway. Its ingress comes from TWO trust domains:
#   * The Gateway-API ingress controller (gateway-system namespace) —
#     this is the public boundary; TLS terminates here. No SPIFFE auth
#     is meaningful at this hop because the source identity is the
#     end-user, not a SPIFFE workload.
#   * The web (Next.js RSC) pod — this IS an iogrid SPIFFE workload,
#     so its server-side fetches require mutual auth.
#
# See docs/SECURITY-mTLS.md.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: gateway-bff-mtls
  namespace: iogrid
  labels:
    app.kubernetes.io/name: gateway-bff
    app.kubernetes.io/part-of: iogrid
    iogrid.org/policy-class: spiffe-mtls
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: gateway-bff
  ingress:
    # web → BFF (RSC server-side fetch) — SPIFFE mutual auth required.
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: web
            io.kubernetes.pod.namespace: iogrid
      authentication:
        mode: required
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Public Gateway → BFF — different trust domain, no SPIFFE auth.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gateway-system
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Prometheus scrape — different trust domain.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
