---
# gateway-bff — Backend-For-Frontend for app.iogrid.org (Next.js web).
# Ingress: from Gateway (api.iogrid.org) and from web pods (server-side RSC calls).
# Egress: all internal microservices (it's the front-door orchestrator), Redis (session cache), NATS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-bff-allow
  namespace: iogrid
  labels:
    app.kubernetes.io/name: gateway-bff
    app.kubernetes.io/part-of: iogrid
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gateway-bff
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From the Gateway API ingress (envoy / cilium gateway sits in a separate namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway-system
      ports:
        - protocol: TCP
          port: 8080
    # From the web (Next.js) pod for server-side data fetching
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: web
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Internal microservices on port 8080
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: identity-svc
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: providers-svc
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: workloads-svc
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: antiabuse-svc
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: billing-svc
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: telemetry-svc
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - protocol: TCP
          port: 4222
