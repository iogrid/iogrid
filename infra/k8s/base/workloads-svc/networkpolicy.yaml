---
# workloads-svc — schedules customer workloads (proxy/docker/gpu/ios-build) onto providers.
# Ingress: gateway-bff (customer API), build-gateway (iOS builds), proxy-gateway (proxy sessions).
# Egress: Postgres, Redis, NATS, providers-svc (peer call), antiabuse-svc (pre-flight).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workloads-svc-allow
  namespace: iogrid
  labels:
    app.kubernetes.io/name: workloads-svc
    app.kubernetes.io/part-of: iogrid
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: workloads-svc
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway-bff
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: build-gateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: proxy-gateway
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: iogrid-pg
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - protocol: TCP
          port: 4222
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: providers-svc
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: antiabuse-svc
      ports:
        - protocol: TCP
          port: 8080
