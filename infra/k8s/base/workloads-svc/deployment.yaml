apiVersion: apps/v1
kind: Deployment
metadata:
  name: workloads-svc
  namespace: iogrid
  labels:
    app.kubernetes.io/name: workloads-svc
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: workloads-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workloads-svc
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        # Bumped by .github/workflows/coordinator-ci.yml on every push to
        # main so the rolling update fires even when the image digest is
        # cache-identical. Treated as an opaque ISO-8601 string by the
        # deploy-bot — do not hand-edit unless you intend to roll the
        # pods. Refs #335.
        kubectl.kubernetes.io/restartedAt: "2026-06-13T23:01:30Z"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: workloads-svc
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: workloads-svc
          image: harbor.openova.io/iogrid/workloads-svc@sha256:d0d9b6f61cc54fc43ea9fef4062c7a8383ee9e4e4488aa2ac2c59f2694e3a86f
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            # TCP-over-DispatchFrame forwarder (issue #222). The
            # proxy-gateway dials this port to forward customer bytes
            # to the daemon connected via this workloads-svc replica.
            # Split off port 9090 (metrics) in the PR for #267 — the
            # boot race between the two listeners was the silent root
            # of the Phase 0 vCard smoke failure.
            - name: forwarder
              containerPort: 9091
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: info
            - name: SERVICE_NAME
              value: workloads-svc
            # Forwarder listener address — see internal/forwarder.
            # 9091 (not 9090) so it doesn't collide with the
            # Prometheus /metrics listener. Issue #267.
            - name: FORWARDER_LISTEN_ADDR
              value: ":9091"
            # WORKLOADS_SVC_PROVIDER_ENDPOINT is the host:port the
            # proxy-gateway dials to reach the forwarder. Mirrors
            # FORWARDER_LISTEN_ADDR but resolved via the Kubernetes
            # Service DNS name so the proxy-gateway can reach the
            # correct replica. See #217 / #222 / #267.
            - name: WORKLOADS_SVC_PROVIDER_ENDPOINT
              value: "workloads-svc.iogrid.svc.cluster.local:9091"
          envFrom:
            - configMapRef:
                name: workloads-svc-config
                optional: true
            - secretRef:
                name: workloads-svc-secrets
                optional: true
            # CNPG Postgres connection — carries DATABASE_URL. #771: without
            # this, workloads-svc falls back to its in-memory assignment store,
            # which is split-brain across replicas (HPA maxReplicas:10) — a long
            # iOS build's terminal-status POST can hit a different replica than
            # the one that created the assignment → GetAssignment 404 → the
            # build-gateway ForwardStatus never fires → the build stays "running"
            # and metering / $GRID settle never run (ping's Ping.app built but
            # never settled, #770). The `workloads` database + `workloads_user`
            # role are already provisioned by the CNPG bootstrap
            # (infra/k8s/base/data/postgres.yaml). Same pattern as vpn-svc
            # (iogrid-vpn-svc-db) / billing-svc (iogrid-billing-db). optional:
            # true so the pod still boots (in-memory, WARN) before the
            # SealedSecret lands; flip to required once it's sealed.
            - secretRef:
                # the live CNPG-provisioned secret is iogrid-workloads-db (with a
                # DATABASE_URL key); the previous iogrid-workloads-svc-db name was
                # wrong → the optional ref found nothing → in-memory fallback (no fix).
                name: iogrid-workloads-db
                optional: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: workloads-svc
