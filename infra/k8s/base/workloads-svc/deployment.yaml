apiVersion: apps/v1
kind: Deployment
metadata:
  name: workloads-svc
  namespace: iogrid
  labels:
    app.kubernetes.io/name: workloads-svc
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: workloads-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workloads-svc
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        # Bumped by .github/workflows/coordinator-ci.yml on every push to
        # main so the rolling update fires even when the image digest is
        # cache-identical. Treated as an opaque ISO-8601 string by the
        # deploy-bot — do not hand-edit unless you intend to roll the
        # pods. Refs #335.
        kubectl.kubernetes.io/restartedAt: "2026-05-22T20:54:51Z"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: workloads-svc
      automountServiceAccountToken: true
      # ghcr.io/iogrid/* repos are private; the kubelet needs an
      # explicit pull-secret to authenticate. Without this, fresh
      # rollouts hit `failed to fetch oauth token ... 403 Forbidden`
      # from ghcr.io's token endpoint and the new replicaset stays
      # in ImagePullBackOff while the old replicaset's pod stays
      # Running on a local image cache (proven 2026-05-23 in #456:
      # workloads-svc Deployment at generation 45, replicas=2/1,
      # f95c6f68b-ghvmt running for 2d2h while 7b7bc6dff9-r77qq +
      # f95c6f68b-ks8r8 stuck in ImagePullBackOff).
      #
      # The ghcr-pull Secret in ns `iogrid` is valid (Basic auth test
      # against ghcr.io/token returns HTTP 200), it just wasn't wired
      # to this Deployment. proxy-gateway + gateway-bff Deployments
      # have it via runtime kubectl-edit; this commit brings the base
      # manifest into alignment with the working runtime.
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: workloads-svc
          image: ghcr.io/iogrid/workloads-svc@sha256:e5f57b52dcd4f1bdde397fc2ebe58fb68c9f059ad8474abb619c1916e55df45c
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            # TCP-over-DispatchFrame forwarder (issue #222). The
            # proxy-gateway dials this port to forward customer bytes
            # to the daemon connected via this workloads-svc replica.
            # Split off port 9090 (metrics) in the PR for #267 — the
            # boot race between the two listeners was the silent root
            # of the Phase 0 vCard smoke failure.
            - name: forwarder
              containerPort: 9091
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: info
            - name: SERVICE_NAME
              value: workloads-svc
            # Forwarder listener address — see internal/forwarder.
            # 9091 (not 9090) so it doesn't collide with the
            # Prometheus /metrics listener. Issue #267.
            - name: FORWARDER_LISTEN_ADDR
              value: ":9091"
            # WORKLOADS_SVC_PROVIDER_ENDPOINT is the host:port the
            # proxy-gateway dials to reach the forwarder. Mirrors
            # FORWARDER_LISTEN_ADDR but resolved via the Kubernetes
            # Service DNS name so the proxy-gateway can reach the
            # correct replica. See #217 / #222 / #267.
            - name: WORKLOADS_SVC_PROVIDER_ENDPOINT
              value: "workloads-svc.iogrid.svc.cluster.local:9091"
          envFrom:
            - configMapRef:
                name: workloads-svc-config
                optional: true
            - secretRef:
                name: workloads-svc-secrets
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: workloads-svc
