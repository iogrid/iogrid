---
# workloads-svc CiliumNetworkPolicy — SPIFFE-style mutual auth.
# Companion to networkpolicy.yaml (issue #35).
# See docs/SECURITY-mTLS.md.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: workloads-svc-mtls
  namespace: iogrid
  labels:
    app.kubernetes.io/name: workloads-svc
    app.kubernetes.io/part-of: iogrid
    iogrid.org/policy-class: spiffe-mtls
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: workloads-svc
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: gateway-bff
            io.kubernetes.pod.namespace: iogrid
        - matchLabels:
            app.kubernetes.io/name: build-gateway
            io.kubernetes.pod.namespace: iogrid
        - matchLabels:
            app.kubernetes.io/name: proxy-gateway
            io.kubernetes.pod.namespace: iogrid
        - matchLabels:
            app.kubernetes.io/name: vpn-gateway
            io.kubernetes.pod.namespace: iogrid
      authentication:
        mode: required
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # proxy-gateway dials the TCP-over-DispatchFrame forwarder on
    # port 9091 (see #222 / #267). Cilium L4 allow; the forwarder
    # preamble enforces L7 attempt-id binding inside the stream.
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: proxy-gateway
            io.kubernetes.pod.namespace: iogrid
      authentication:
        mode: required
      toPorts:
        - ports:
            - port: "9091"
              protocol: TCP
