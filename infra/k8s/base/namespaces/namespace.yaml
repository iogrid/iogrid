apiVersion: v1
kind: Namespace
metadata:
  name: iogrid
  labels:
    name: iogrid
    app.kubernetes.io/part-of: iogrid
    # Cilium / network-policy enforcement labels
    io.cilium.k8s.policy.cluster: mothership
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    # Allow Cilium NetworkPolicy and Kubernetes NetworkPolicy
    networking.iogrid.org/policy-enforcement: strict
