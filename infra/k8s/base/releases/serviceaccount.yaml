apiVersion: v1
kind: ServiceAccount
metadata:
  name: releases
  namespace: iogrid
  labels:
    app.kubernetes.io/name: releases
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: releases
# releases is a stateless static redirect server. It does not call any
# Kubernetes API — disable token automounting so a runtime compromise
# of the nginx container cannot enumerate the API server. Refs #392.
automountServiceAccountToken: false
