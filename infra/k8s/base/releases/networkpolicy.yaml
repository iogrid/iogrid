---
# releases — static redirect server for releases.iogrid.org. Issues 302s
# pointing at GitHub Releases asset URLs (the actual binary blob hosting
# happens off-cluster, on github.com). The pod itself never proxies the
# blob body — clients follow the 302 directly to objects.githubusercontent.com
# — so egress is locked down to cluster DNS only. Ingress comes from the
# Traefik shim (today) and the Cilium Gateway (future cutover); both
# rules are present pre-emptively so the cutover is a one-config flip.
#
# Refs #392.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: releases-allow
  namespace: iogrid
  labels:
    app.kubernetes.io/name: releases
    app.kubernetes.io/part-of: iogrid
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: releases
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Traefik shim (kube-system) — current edge until Cilium Gateway
    # migration completes per `infra/k8s/traefik/README.md`.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 8080
    # Cilium Gateway (gateway-system) — future canonical edge. Pre-staged
    # so the Gateway-Cilium cutover doesn't need a second NetworkPolicy roll.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway-system
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Cluster DNS only. The pod renders 302 redirects from a static nginx
    # config — no upstream HTTP fetch, no GitHub API call at request time.
    # If a future iteration wants to validate that a release tag exists
    # (e.g. for a /macos/latest-version JSON endpoint) the egress rule
    # would need to extend to ghcr.io / api.github.com on TCP/443; the
    # current scope deliberately does NOT — keep blast radius minimal.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
