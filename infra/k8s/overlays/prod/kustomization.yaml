apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Production overlay — `*.iogrid.org`, full HPA range, LE prod issuer.
resources:
  - ../../base
namespace: iogrid
commonAnnotations:
  iogrid.org/environment: prod
patches:
  # Production gets PodDisruptionBudgets via overlay (kept out of base because
  # PDBs interfere with small staging environments).
  - target:
      kind: Deployment
      labelSelector: app.kubernetes.io/component=gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
