# Static self-signed wildcard TLS — replaces the cert-manager Certificate
# refs from infra/k8s/base/certs/. Valid 10 years from 2026-05-19; covers
# the *.iogrid.local hostnames the dev overlay uses (since the base
# *.iogrid.org names need real DNS + LE HTTP-01).
#
# Same Secret is referenced by app-iogrid-org-tls, api-iogrid-org-tls,
# build-iogrid-org-tls, proxy-iogrid-org-tls so the Gateway / HTTPRoute /
# TLSRoute resources resolve. Gateway / HTTPRoute / TLSRoute themselves
# are still removed by the dev overlay (kind has no Gateway-API
# controller); these Secrets stick around so ingress-nginx-based Ingress
# rules in dev can mount them.
#
# DO NOT use this keypair in any environment that anyone outside the
# kind cluster boundary can reach. It is checked in to git, public, and
# unsigned. Real environments use cert-manager + Let's Encrypt.
---
