# settlement-worker — batched $GRID provider-payout cron.
#
# Refs iogrid/iogrid#598 (Track 5 / EPIC #581).
#
# Same image as billing-svc, different entrypoint binary
# (`/app/settlement-worker` vs the default `/app/billing-svc`). Reuses the
# same `iogrid-billing-db` + `iogrid-solana-payout` Secrets so there's no
# extra credential surface to manage.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-worker
  namespace: iogrid
  labels:
    app.kubernetes.io/name: settlement-worker
    app.kubernetes.io/part-of: iogrid
    app.kubernetes.io/component: backend
spec:
  # Single replica — the cron is a critical-section workload (idempotency
  # comes from MarkSettled's WHERE settled_at IS NULL clause, but two
  # workers double-submitting transfers would waste fees + spam the chain).
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: settlement-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: settlement-worker
        app.kubernetes.io/part-of: iogrid
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        # Hand-bump the timestamp here when you intend to roll the pod;
        # the coordinator-ci workflow bumps it automatically on every
        # push to main (same pattern as the billing-svc Deployment).
        kubectl.kubernetes.io/restartedAt: "2026-06-02T00:00:00Z"
    spec:
      serviceAccountName: billing-svc
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: settlement-worker
          # Image is the SAME as billing-svc (Dockerfile builds both
          # binaries into the same layer) — coordinator-ci rewrites the
          # digest in lockstep with the billing-svc deployment.
          image: harbor.openova.io/iogrid/billing-svc@sha256:7f4c85b761b00481b86064041ad4879f9b3445f5fcec5f1840496d2f9a3b2cb6
          imagePullPolicy: Always
          # The image's entrypoint is /app/billing-svc by default; for
          # this Deployment we override to the settlement-worker binary.
          command: ["/app/settlement-worker"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: settlement-worker
            - name: SETTLEMENT_TICK
              value: "5m"
            - name: SETTLEMENT_BATCH_LIMIT
              value: "500"
            - name: GRID_TOKEN_MINT_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: iogrid-solana-payout
                  key: grid_token_mint_address
                  optional: true
          envFrom:
            - configMapRef:
                name: billing-svc-config
                optional: true
            - secretRef:
                name: billing-svc-secrets
                optional: true
            - secretRef:
                name: iogrid-billing-db
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # Treasury keypair — must match the one billing-svc uses for
            # the daily payout cron so the same on-chain wallet signs
            # both flows.
            - name: solana-keypair
              mountPath: /var/run/solana
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: solana-keypair
          secret:
            secretName: iogrid-solana-payout
            optional: true
            defaultMode: 0400
            items:
              - key: keypair_json
                path: keypair.json
---
apiVersion: v1
kind: Service
metadata:
  name: settlement-worker
  namespace: iogrid
  labels:
    app.kubernetes.io/name: settlement-worker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: settlement-worker
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
