apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: iogrid
# The 2 per-svc Secrets #637-killer-#2 / #640 needs, sealed from existing
# cluster values via the live sealed-secrets-controller (kube-system). Sealed
# for THIS prod cluster's controller key (decryptable only by prod).
#
# NOW referenced by base/kustomization.yaml (../sealed-secrets) — the secrets are
# NOT a deploy/boot blocker on #646. Their sealed values are the SAME phase0
# Google placeholders + real IOGRID_SERVICE_TOKEN that live identity-svc already
# boots with (sha256-verified equal to the live literal env, 2026-06-03) and they
# unseal cleanly against the prod controller key (applied live 2026-06-03 -> both
# secrets EXIST; identity-svc stayed 1/1, /healthz 200). The secret only needs to
# EXIST + be structurally valid for the envFrom boot path; making Google sign-in
# WORK with real OAuth creds is #646 (a feature patch to GOOGLE_CLIENT_ID/SECRET),
# not a prerequisite for the secret to apply. Off-prod validation re-seals with
# test values (a different cluster has a different controller key).
resources:
  - identity-svc-secrets.sealed.yaml
  - proxy-gateway-secrets.sealed.yaml
