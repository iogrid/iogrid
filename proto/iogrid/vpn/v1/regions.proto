syntax = "proto3";

package iogrid.vpn.v1;

import "iogrid/vpn/v1/ice.proto";

option go_package = "github.com/iogrid/iogrid/coordinator/internal/pb/iogrid/vpn/v1;pb";

// ProviderProbe is the per-provider payload returned by the
// top-N-providers-in-region endpoint. The iOS app (and any other mobile
// client) uses this to run client-side latency probes during the roaming
// flow (#572) — it picks the lowest-RTT host candidate from each
// candidate_set, races a few short STUN-like RTT measurements, and
// commits to whichever provider wins. The coordinator's median_rtt_ms
// is only a hint (server-side aggregate over the last hour of
// candidate-discovery RTT samples); the client's own probe is the
// authoritative signal.
message ProviderProbe {
  string provider_id = 1; // Provider UUID
  string wg_public_key = 2; // Base64-encoded WireGuard public key (may be "" if daemon hasn't registered yet)
  repeated IceCandidate candidate_set = 3; // Fresh (non-expired) host / srflx / relay candidates
  uint32 median_rtt_ms = 4; // Server-side median over the last hour of candidate-discovery RTT samples; 0 if no samples
}

// ListTopProvidersResponse is returned by
// GET /v1/vpn/regions/{region}/providers?limit=N. The providers list is
// ordered by ascending session_count (least-loaded first) — the same
// scoring the existing SelectProviderForSession uses — so clients that
// don't run their own RTT probes still get a reasonable fan-out.
message ListTopProvidersResponse {
  string region = 1;
  repeated ProviderProbe providers = 2;
}
