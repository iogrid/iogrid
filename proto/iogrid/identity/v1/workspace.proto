// Workspace service: the bounded-context that links a User to billing
// + workloads + API keys. Every paid resource in iogrid is owned by a
// Workspace, not by a User directly; this gives us multi-tenant
// permission boundaries (one user can belong to many workspaces) and
// matches Stripe's "customer" granularity.
//
// On first authentication identity-svc auto-mints a "personal
// workspace" for the user with the user as OWNER. The user can rename
// it, invite collaborators, upgrade the plan, or create additional
// workspaces from the management plane.
//
// Authorization rules:
//   * GetWorkspace / ListMembers       — any member (OWNER, ADMIN, BILLING_ONLY, READ_ONLY)
//   * UpdateWorkspace                  — OWNER or ADMIN
//   * AddMember / RemoveMember /
//     UpdateMemberRole                 — OWNER or ADMIN
//   * DeleteWorkspace                  — OWNER only
//   * CreateWorkspace / ListWorkspaces — any authenticated user
syntax = "proto3";

package iogrid.identity.v1;

import "google/protobuf/timestamp.proto";
import "iogrid/common/v1/types.proto";

option go_package = "github.com/iogrid/iogrid/coordinator/internal/pb/iogrid/identity/v1;identityv1";

// WorkspacePlan is the billing tier the workspace is on. Mirrors the
// commercial tiers in docs/PRICING.md; billing-svc joins on this enum
// to resolve rate-limit ceilings + allowed_categories.
enum WorkspacePlan {
  WORKSPACE_PLAN_UNSPECIFIED = 0;
  // FREE: hobbyist tier, capped at 1 GB/month bandwidth, 1 CPU-hour.
  WORKSPACE_PLAN_FREE = 1;
  // STARTER: indie devs, 100 GB/month, 50 CPU-hours, monthly card.
  WORKSPACE_PLAN_STARTER = 2;
  // GROWTH: SMB, 2 TB/month, 1000 CPU-hours, prepaid credits.
  WORKSPACE_PLAN_GROWTH = 3;
  // ENTERPRISE: contractual seat, no hard caps, invoicing.
  WORKSPACE_PLAN_ENTERPRISE = 4;
}

// Role enumerates the per-membership role. We deliberately keep this
// small — fine-grained per-resource ACLs are out of scope; if you can
// see the workspace you can see every resource in it (with read/write
// gated by the role rank below).
//
// Rank order (most → least privilege):
//   OWNER > ADMIN > BILLING_ONLY ≈ READ_ONLY
//
// BILLING_ONLY and READ_ONLY have equal read access; BILLING_ONLY can
// additionally view + change payment methods (so an external finance
// person can pay invoices without seeing workloads).
enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_OWNER = 1;
  ROLE_ADMIN = 2;
  ROLE_BILLING_ONLY = 3;
  ROLE_READ_ONLY = 4;
}

// Workspace is the canonical record. Identifier columns
// (billing_customer_id_stripe) come from external integrations and may
// be empty until the user starts a Stripe checkout flow.
message Workspace {
  iogrid.common.v1.UUID id = 1;
  // owner_user_id is denormalised here for convenience; it MUST also
  // appear as a Membership row with role=OWNER.
  iogrid.common.v1.UUID owner_user_id = 2;
  // Human-readable display name. Defaults to "<email>'s workspace"
  // on auto-creation.
  string name = 3;
  WorkspacePlan plan = 4;
  // Stripe customer id once the workspace has subscribed; empty
  // before first checkout.
  string billing_customer_id_stripe = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// Membership joins User → Workspace. UNIQUE (workspace_id, user_id)
// in the underlying table prevents duplicate rows.
message Membership {
  iogrid.common.v1.UUID workspace_id = 1;
  iogrid.common.v1.UUID user_id = 2;
  Role role = 3;
  google.protobuf.Timestamp joined_at = 4;
}

// MemberDetail enriches a Membership with the joined User's primary
// email + display name for the management-plane "Members" tab.
message MemberDetail {
  Membership membership = 1;
  // Human-facing fields lifted from the linked User row. Empty when
  // the user has been hard-deleted.
  string primary_email = 2;
  string display_name = 3;
}

// --- RPCs -----------------------------------------------------------------

message CreateWorkspaceRequest {
  // Free-form display name. Required. Trimmed; max 100 chars.
  string name = 1;
  // Optional. Defaults to WORKSPACE_PLAN_FREE for self-serve signups.
  WorkspacePlan plan = 2;
}
message CreateWorkspaceResponse {
  Workspace workspace = 1;
}

message GetWorkspaceRequest {
  iogrid.common.v1.UUID id = 1;
}
message GetWorkspaceResponse {
  Workspace workspace = 1;
  // The caller's role within this workspace — handy for the UI to
  // gate write affordances without a second RPC.
  Role caller_role = 2;
}

message ListWorkspacesRequest {
  // Optional. When empty the server uses the authenticated caller as
  // the user filter. Admin tooling can pass a different id (gated by
  // a separate role check upstream).
  iogrid.common.v1.UUID user_id = 1;
  iogrid.common.v1.PageRequest page = 2;
}
message ListWorkspacesResponse {
  // Each entry includes the caller's role, so the UI can render the
  // workspace selector without a second round-trip.
  repeated Workspace workspaces = 1;
  repeated Role roles = 2;
  iogrid.common.v1.PageResponse page = 3;
}

message UpdateWorkspaceRequest {
  iogrid.common.v1.UUID id = 1;
  // Empty fields are "do not change". Plan change is a privileged
  // operation in the proxy/billing tier — billing-svc reconciles the
  // Stripe subscription out-of-band.
  string name = 2;
  WorkspacePlan plan = 3;
}
message UpdateWorkspaceResponse {
  Workspace workspace = 1;
}

message DeleteWorkspaceRequest {
  iogrid.common.v1.UUID id = 1;
  // Fresh step-up token required — destructive op.
  string step_up_token = 2;
}
message DeleteWorkspaceResponse {}

message AddMemberRequest {
  iogrid.common.v1.UUID workspace_id = 1;
  // The invitee. We use email rather than user_id so admins can
  // invite people who haven't signed up yet — identity-svc creates a
  // pending magic-link bind once the invitee redeems an emailed link.
  string user_email = 2;
  Role role = 3;
}
message AddMemberResponse {
  Membership membership = 1;
  // True when the invitee didn't have a User yet and we created a
  // pending stub. UI surfaces "Pending — email sent" in that case.
  bool pending = 2;
}

message RemoveMemberRequest {
  iogrid.common.v1.UUID workspace_id = 1;
  iogrid.common.v1.UUID user_id = 2;
}
message RemoveMemberResponse {}

message ListMembersRequest {
  iogrid.common.v1.UUID workspace_id = 1;
  iogrid.common.v1.PageRequest page = 2;
}
message ListMembersResponse {
  repeated MemberDetail members = 1;
  iogrid.common.v1.PageResponse page = 2;
}

message UpdateMemberRoleRequest {
  iogrid.common.v1.UUID workspace_id = 1;
  iogrid.common.v1.UUID user_id = 2;
  Role role = 3;
}
message UpdateMemberRoleResponse {
  Membership membership = 1;
}

// WorkspaceService is the bounded-context's wire contract. Lives in
// identity-svc alongside Users + Identifiers because Workspace ownership
// follows from the User record and membership is checked on every auth.
service WorkspaceService {
  rpc CreateWorkspace(CreateWorkspaceRequest) returns (CreateWorkspaceResponse);
  rpc GetWorkspace(GetWorkspaceRequest) returns (GetWorkspaceResponse);
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);
  rpc UpdateWorkspace(UpdateWorkspaceRequest) returns (UpdateWorkspaceResponse);
  rpc DeleteWorkspace(DeleteWorkspaceRequest) returns (DeleteWorkspaceResponse);

  rpc AddMember(AddMemberRequest) returns (AddMemberResponse);
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (UpdateMemberRoleResponse);
}
