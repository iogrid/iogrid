// Structured error model used across iogrid services. Connect/gRPC supplies
// the transport-level Status; this package adds richer domain context that
// can be returned via Connect error details.
syntax = "proto3";

package iogrid.common.v1;

option go_package = "github.com/iogrid/iogrid/coordinator/internal/pb/iogrid/common/v1;commonv1";

// ErrorCode is a domain-level error taxonomy. It supplements (does not
// replace) the gRPC canonical status codes. Every code MUST map to a
// stable HTTP status server-side for Connect JSON fallback.
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;

  // Caller-side problems.
  ERROR_CODE_INVALID_ARGUMENT = 1;
  ERROR_CODE_NOT_FOUND = 2;
  ERROR_CODE_ALREADY_EXISTS = 3;
  ERROR_CODE_PERMISSION_DENIED = 4;
  ERROR_CODE_UNAUTHENTICATED = 5;
  ERROR_CODE_RESOURCE_EXHAUSTED = 6;
  ERROR_CODE_FAILED_PRECONDITION = 7;
  ERROR_CODE_OUT_OF_RANGE = 8;

  // Server-side problems.
  ERROR_CODE_INTERNAL = 100;
  ERROR_CODE_UNAVAILABLE = 101;
  ERROR_CODE_DEADLINE_EXCEEDED = 102;

  // Anti-abuse refusals that need fine-grained reporting to the caller.
  ERROR_CODE_ABUSE_BLOCKED = 200;
  ERROR_CODE_ABUSE_RATE_LIMITED = 201;
  ERROR_CODE_ABUSE_CATEGORY_DISALLOWED = 202;
  ERROR_CODE_ABUSE_DESTINATION_BLOCKED = 203;

  // Identity / step-up auth.
  ERROR_CODE_STEP_UP_REQUIRED = 300;
  ERROR_CODE_IDENTITY_MERGE_AMBIGUOUS = 301;

  // Billing.
  ERROR_CODE_BILLING_PAST_DUE = 400;
  ERROR_CODE_BILLING_CARD_DECLINED = 401;
  ERROR_CODE_PAYOUT_NOT_ELIGIBLE = 402;
}

// ErrorDetail is attached to gRPC/Connect error responses via the error
// details mechanism. It encodes both a stable machine code and a human
// message localized at the boundary (callers MUST NOT rely on string
// content for control flow — use `code` only).
message ErrorDetail {
  ErrorCode code = 1;

  // Stable English message (callers MAY display verbatim to operators).
  string message = 2;

  // Optional pointer to the offending request field, in dotted form,
  // e.g. "workload.target.url". Empty when not field-specific.
  string field_path = 3;

  // Free-form structured metadata, e.g. {"retry_after_seconds": "30"}.
  map<string, string> metadata = 4;

  // Unique request id (matches the X-Request-Id header / OTel trace_id)
  // for support escalation.
  string request_id = 5;
}
