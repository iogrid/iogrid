version: v2
modules:
  - path: .
    name: buf.build/iogrid/iogrid
lint:
  use:
    - STANDARD
  except:
    # We use envelope/frame types whose names don't follow the
    # ServiceMethod{Request,Response} convention because they're shared
    # across both directions of a bidi stream (DispatchFrame) or because
    # they're streamed elements rather than per-call payloads
    # (AuditEvent, Heartbeat, HeartbeatAck, WorkloadEvent).
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
