packages:
  - "web"
  - "marketing"
  - "docs-site"
  - "sdks/typescript"

# Force a single React 18 type tree across the dep graph. Some of the
# transitive deps from `@solana/wallet-adapter-wallets` (e.g.
# react-native@0.85 brought in by the Trust / Ledger adapters) ask for
# @types/react@^19, which pnpm would otherwise install side-by-side
# with our React 18 types. Two copies of @types/react in node_modules
# break JSX type resolution in `tsc --noEmit` ("X cannot be used as a
# JSX component").
overrides:
  "@types/react": "^18.3.12"
  "@types/react-dom": "^18.3.1"

# Wallet-adapter pulls in mobile-only and node-only optional peer
# dependencies that surface as pnpm warnings in CI. Ignore them so
# the install logs stay legible.
peerDependencyRules:
  ignoreMissing:
    - "react-native"
    - "@react-native/*"
    - "utf-8-validate"
    - "bufferutil"
    - "encoding"
