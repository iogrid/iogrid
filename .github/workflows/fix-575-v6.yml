name: fix-575-v6
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: v6 — assign build 61 to vpn-internal + verify install ready
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY:       ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json, sys
          key = base64.b64decode(os.environ['ASC_KEY'])
          tok = jwt.encode(
              {'iss': os.environ['ASC_ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'},
              key, algorithm='ES256', headers={'kid': os.environ['ASC_KEY_ID']})
          H = {'Authorization': f'Bearer {tok}', 'Content-Type': 'application/json'}
          BASE = 'https://api.appstoreconnect.apple.com'
          BUILD_ID = '1af277d1-d7f3-4d97-aa30-63364f383c77'
          INTERNAL_GROUP_ID = 'e0ddb17e-7f92-4b13-a3e3-a0749745d58e'

          # === 1) Assign build 61 to vpn-internal group
          payload = {'data': [{'type': 'builds', 'id': BUILD_ID}]}
          r = requests.post(
              f'{BASE}/v1/betaGroups/{INTERNAL_GROUP_ID}/relationships/builds',
              headers=H, json=payload, timeout=20)
          print(f'Assign build to vpn-internal → HTTP {r.status_code}: {r.text[:300]}')

          # === 2) Verify build IS now in the internal group's installable list
          time.sleep(2)
          builds = requests.get(
              f'{BASE}/v1/betaGroups/{INTERNAL_GROUP_ID}/builds?limit=10',
              headers=H, timeout=20).json()
          print(f'\n=== vpn-internal installable builds ===')
          for b in builds.get('data', []):
              a = b['attributes']
              print(f"  id={b['id']} ver={a.get('version')}")

          # === 3) Verify tester is still in the group
          gtest = requests.get(
              f'{BASE}/v1/betaGroups/{INTERNAL_GROUP_ID}/betaTesters?limit=200',
              headers=H, timeout=20).json()
          print(f'\n=== vpn-internal testers ===')
          for t in gtest.get('data', []):
              a = t['attributes']
              print(f"  email={a.get('email')} state={a.get('state')} inviteType={a.get('inviteType')}")

          # === 4) Build beta state (informational; internal doesn't need it)
          bd = requests.get(f'{BASE}/v1/buildBetaDetails/{BUILD_ID}', headers=H, timeout=20).json()
          print(f'\nBuild beta state: {json.dumps(bd.get("data", {}).get("attributes", {}), indent=2)}')

          print('\n::notice::Internal beta path ready — emrahbaysal@gmail.com should see iogrid in TestFlight within 1-2 min')
          PY
