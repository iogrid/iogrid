name: fix-575-v3
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: v3 — drop apps rel, set betaAppReviewDetails, retry
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY:       ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json, sys
          key = base64.b64decode(os.environ['ASC_KEY'])
          tok = jwt.encode(
              {'iss': os.environ['ASC_ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'},
              key, algorithm='ES256', headers={'kid': os.environ['ASC_KEY_ID']})
          H = {'Authorization': f'Bearer {tok}', 'Content-Type': 'application/json'}
          BASE = 'https://api.appstoreconnect.apple.com'
          APP_ID = '6775617937'
          BUILD_ID = '1af277d1-d7f3-4d97-aa30-63364f383c77'
          GROUP_ID = '474ed0b2-429e-47f5-8382-f776e43a3423'
          EMAIL = 'emrahbaysal@gmail.com'

          # === 1) Set betaAppReviewDetails — required for submission
          rad = requests.get(f'{BASE}/v1/apps/{APP_ID}/betaAppReviewDetail', headers=H, timeout=20).json()
          existing_rad = rad.get('data')
          print(f'betaAppReviewDetail exists: {bool(existing_rad)}')
          if existing_rad:
              print(f'  Current attrs: {json.dumps(existing_rad.get("attributes", {}), indent=2)[:500]}')
              rad_id = existing_rad['id']
              # PATCH it
              payload = {'data': {
                  'type': 'betaAppReviewDetails',
                  'id': rad_id,
                  'attributes': {
                      'contactEmail': EMAIL,
                      'contactFirstName': 'Emrah',
                      'contactLastName': 'Baysal',
                      'contactPhone': '+1-555-0100',
                      'demoAccountRequired': False,
                      'demoAccountName': '',
                      'demoAccountPassword': '',
                      'notes': 'No sign-in required. Mullvad-style anonymous account ID generated on first launch. Toggle the big switch to test the VPN connection state machine. WireGuardKit data plane is deferred to a follow-up (#576); tunnel UI flows + region picker + settings are testable.',
                  },
              }}
              r = requests.patch(f'{BASE}/v1/betaAppReviewDetails/{rad_id}', headers=H, json=payload, timeout=20)
              print(f'PATCH betaAppReviewDetails → HTTP {r.status_code}: {r.text[:500]}')
          else:
              print('::error::No betaAppReviewDetail to PATCH — needs creation but Apple auto-creates per app')

          # === 2) Recreate tester WITHOUT apps relationship (only betaGroups)
          # First clean stale
          tq = requests.get(f'{BASE}/v1/betaTesters?filter[email]={EMAIL}', headers=H, timeout=20).json()
          for t in tq.get('data', []):
              print(f'Deleting stale tester {t["id"]}')
              requests.delete(f'{BASE}/v1/betaTesters/{t["id"]}', headers=H, timeout=20)

          payload = {'data': {
              'type': 'betaTesters',
              'attributes': {'email': EMAIL, 'firstName': 'Emrah', 'lastName': 'Baysal'},
              'relationships': {
                  'betaGroups': {'data': [{'type': 'betaGroups', 'id': GROUP_ID}]},
              },
          }}
          r = requests.post(f'{BASE}/v1/betaTesters', headers=H, json=payload, timeout=20)
          print(f'\nRecreate tester (no apps rel) → HTTP {r.status_code}: {r.text[:500]}')

          # === 3) Verify
          gtest = requests.get(f'{BASE}/v1/betaGroups/{GROUP_ID}/betaTesters?limit=200', headers=H, timeout=20).json()
          print(f'\n=== vpn-beta testers ===')
          for t in gtest.get('data', []):
              a = t['attributes']
              print(f"  email={a.get('email')} state={a.get('state')} inviteType={a.get('inviteType')}")

          # === 4) Submit Beta Review
          payload = {'data': {
              'type': 'betaAppReviewSubmissions',
              'relationships': {'build': {'data': {'type': 'builds', 'id': BUILD_ID}}},
          }}
          r = requests.post(f'{BASE}/v1/betaAppReviewSubmissions', headers=H, json=payload, timeout=20)
          print(f'\nBeta Review submit → HTTP {r.status_code}: {r.text[:800]}')

          # === 5) Final state
          bd = requests.get(f'{BASE}/v1/buildBetaDetails/{BUILD_ID}', headers=H, timeout=20).json()
          print(f'\nFinal build beta state: {json.dumps(bd.get("data", {}).get("attributes", {}), indent=2)}')
          PY
