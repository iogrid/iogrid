name: sdk-typescript-publish

# Publishes @iogrid/sdk to npm with provenance.
#
# Trigger: push a tag matching `sdk-typescript/v*` (e.g. `sdk-typescript/v0.1.0`).
# Auth:    npm OIDC + provenance — NO long-lived NPM_TOKEN needed for a
#          public package on a public repository. Provenance is signed by
#          GitHub's OIDC identity and verifiable on npmjs.com.
#
# See `sdks/RELEASING.md` for the release cadence.

on:
  push:
    tags:
      - "sdk-typescript/v*"
  workflow_dispatch:

jobs:
  publish:
    name: build + publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false --filter @iogrid/sdk...

      - name: Test
        working-directory: sdks/typescript
        run: pnpm test

      - name: Build
        working-directory: sdks/typescript
        run: pnpm build

      - name: Verify package metadata matches tag
        working-directory: sdks/typescript
        run: |
          set -euo pipefail
          PKG_VER=$(node -p "require('./package.json').version")
          TAG_VER="${GITHUB_REF#refs/tags/sdk-typescript/v}"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::package.json version ($PKG_VER) does not match tag ($TAG_VER)"
            exit 1
          fi
          echo "version match: $PKG_VER"

      - name: Dry-run publish (prints the tarball contents)
        working-directory: sdks/typescript
        run: pnpm publish --dry-run --no-git-checks --access public

      - name: Publish to npm with provenance
        working-directory: sdks/typescript
        run: pnpm publish --no-git-checks --access public --provenance
        env:
          # NODE_AUTH_TOKEN is unset on purpose — npm OIDC + provenance
          # authenticates via id-token. For private packages you'd add
          # NPM_TOKEN here from secrets.
          NPM_CONFIG_PROVENANCE: "true"
