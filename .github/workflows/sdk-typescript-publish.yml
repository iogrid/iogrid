name: sdk-typescript-publish

# Phase 2: actual npm publish is wired but commented out until the
# release process is gated on the founder signing off on the first
# customer-facing SDK release. Triggering this workflow today is a
# no-op build + dry-run check.

on:
  push:
    tags:
      - "sdk-typescript/v*"
  workflow_dispatch:

jobs:
  publish:
    name: build + publish (dry-run until Phase 2)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance once we flip the publish on
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false --filter @iogrid/sdk...

      - name: Test
        working-directory: sdks/typescript
        run: pnpm test

      - name: Build
        working-directory: sdks/typescript
        run: pnpm build

      - name: Dry-run publish (prints the tarball contents)
        working-directory: sdks/typescript
        run: pnpm publish --dry-run --no-git-checks --access public

      # PHASE 2 — uncomment when we're ready to ship.
      # - name: Publish to npm
      #   working-directory: sdks/typescript
      #   run: pnpm publish --no-git-checks --access public --provenance
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
