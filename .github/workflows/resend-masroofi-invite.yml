name: resend-masroofi-invite
on:
  workflow_dispatch:
jobs:
  resend:
    runs-on: macos-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Trigger TestFlight invite email for BD Masroofi
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY:       ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json
          key = base64.b64decode(os.environ['ASC_KEY'])
          tok = jwt.encode(
              {'iss': os.environ['ASC_ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'},
              key, algorithm='ES256', headers={'kid': os.environ['ASC_KEY_ID']})
          H = {'Authorization': f'Bearer {tok}', 'Content-Type': 'application/json'}
          BASE = 'https://api.appstoreconnect.apple.com'
          APP_ID = '6763848992'  # BD Masroofi
          EMAIL = 'emrahbaysal@gmail.com'

          # Find the tester record for emrahbaysal
          tq = requests.get(f'{BASE}/v1/betaTesters?filter[email]={EMAIL}&limit=20', headers=H, timeout=20).json()
          print(f'Tester records: {len(tq.get("data", []))}')
          for t in tq.get('data', []):
              print(f"  id={t['id']} state={t['attributes'].get('state')} firstName={t['attributes'].get('firstName')}")

          if not tq.get('data'):
              print('::error::No tester record')
              exit(1)

          tester_id = tq['data'][0]['id']

          # POST betaTesterInvitations for BD Masroofi
          payload = {'data': {
              'type': 'betaTesterInvitations',
              'relationships': {
                  'app': {'data': {'type': 'apps', 'id': APP_ID}},
                  'betaTester': {'data': {'type': 'betaTesters', 'id': tester_id}},
              },
          }}
          r = requests.post(f'{BASE}/v1/betaTesterInvitations', headers=H, json=payload, timeout=20)
          print(f'\nPOST betaTesterInvitations (BD Masroofi) → HTTP {r.status_code}: {r.text[:600]}')

          # Also check buildBetaDetail.autoNotifyEnabled on the latest builds
          builds = requests.get(f'{BASE}/v1/builds?filter[app]={APP_ID}&sort=-uploadedDate&limit=3', headers=H, timeout=20).json()
          for b in builds.get('data', []):
              bd = requests.get(f"{BASE}/v1/buildBetaDetails/{b['id']}", headers=H, timeout=20).json()
              attrs = bd.get('data', {}).get('attributes', {})
              print(f"\nBuild v{b['attributes'].get('version')}: autoNotify={attrs.get('autoNotifyEnabled')} internal={attrs.get('internalBuildState')} external={attrs.get('externalBuildState')}")

          # Check tester state post-invite
          time.sleep(2)
          tq = requests.get(f'{BASE}/v1/betaTesters?filter[email]={EMAIL}&limit=20', headers=H, timeout=20).json()
          for t in tq.get('data', []):
              print(f"\nTester post-invite: id={t['id']} state={t['attributes'].get('state')}")
          PY
