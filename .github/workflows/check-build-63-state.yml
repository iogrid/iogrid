name: check-build-63-state
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: macos-latest
    timeout-minutes: 3
    env:
      ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_KEY:       ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
    steps:
      - name: Query build 63 state
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json
          tok = jwt.encode(
              {'iss': os.environ['ASC_ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
              base64.b64decode(os.environ['ASC_KEY']), algorithm='ES256',
              headers={'kid': os.environ['ASC_KEY_ID']})
          H = {'Authorization': f'Bearer {tok}'}
          BASE = 'https://api.appstoreconnect.apple.com'
          BID = 'b3f19ebd-fac3-42d8-873b-ea6cdcd6c9e9'

          # 1) buildBetaDetails (review state)
          bd = requests.get(f'{BASE}/v1/buildBetaDetails/{BID}', headers=H, timeout=20).json()
          print('=== buildBetaDetails ===')
          print(json.dumps(bd.get('data',{}).get('attributes', {}), indent=2))

          # 2) build state
          b = requests.get(f'{BASE}/v1/builds/{BID}?include=app,preReleaseVersion,betaAppReviewSubmission', headers=H, timeout=20).json()
          print('\n=== build ===')
          print(json.dumps(b.get('data',{}).get('attributes', {}), indent=2))
          for inc in b.get('included', []):
              print(f"\n--- included type={inc['type']} ---")
              print(json.dumps(inc.get('attributes', {}), indent=2)[:500])

          # 3) any betaAppReviewSubmissions for this build
          subs = requests.get(f'{BASE}/v1/betaAppReviewSubmissions?filter[build]={BID}', headers=H, timeout=20).json()
          print('\n=== betaAppReviewSubmissions ===')
          for s in subs.get('data', []):
              print(f"  id={s['id']} state={s['attributes'].get('betaReviewState')}")
          PY
