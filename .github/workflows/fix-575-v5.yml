name: fix-575-v5
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: v5 — list team users + create internal-beta path
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY:       ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json, sys
          key = base64.b64decode(os.environ['ASC_KEY'])
          tok = jwt.encode(
              {'iss': os.environ['ASC_ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'},
              key, algorithm='ES256', headers={'kid': os.environ['ASC_KEY_ID']})
          H = {'Authorization': f'Bearer {tok}', 'Content-Type': 'application/json'}
          BASE = 'https://api.appstoreconnect.apple.com'
          APP_ID = '6775617937'
          BUILD_ID = '1af277d1-d7f3-4d97-aa30-63364f383c77'
          EMAIL = 'emrahbaysal@gmail.com'

          # === 1) List ALL ASC team users
          users = requests.get(f'{BASE}/v1/users?limit=200', headers=H, timeout=20).json()
          print(f'=== Team users ({len(users.get("data", []))}) ===')
          for u in users.get('data', []):
              a = u['attributes']
              print(f"  id={u['id']} email={a.get('username')} roles={a.get('roles')}")

          # === 2) Check for the email or a match
          found_user = next((u for u in users.get('data', []) if u['attributes'].get('username') == EMAIL), None)
          
          # === 3) Get the betaAppReviewDetail readback (notes=null was suspicious; maybe PATCH was rejected silently)
          rad = requests.get(f'{BASE}/v1/apps/{APP_ID}/betaAppReviewDetail', headers=H, timeout=20).json()
          print(f'\n=== betaAppReviewDetail FULL ===')
          print(json.dumps(rad.get('data', {}).get('attributes', {}), indent=2))

          # === 4) Try to find what's MISSING for submission
          # Submit attempts again with detailed error capture
          payload = {'data': {
              'type': 'betaAppReviewSubmissions',
              'relationships': {'build': {'data': {'type': 'builds', 'id': BUILD_ID}}},
          }}
          r = requests.post(f'{BASE}/v1/betaAppReviewSubmissions', headers=H, json=payload, timeout=20)
          print(f'\nBeta Review submit → HTTP {r.status_code}')
          # Print full response (no truncation)
          print(f'  Response body: {r.text}')

          # === 5) Internal beta group: create if missing
          groups = requests.get(f'{BASE}/v1/apps/{APP_ID}/betaGroups', headers=H, timeout=20).json()
          internal = next((g for g in groups.get('data', []) if g['attributes'].get('isInternalGroup')), None)
          if not internal:
              payload = {'data': {
                  'type': 'betaGroups',
                  'attributes': {
                      'name': 'vpn-internal',
                      'isInternalGroup': True,
                      'publicLinkEnabled': False,
                  },
                  'relationships': {'app': {'data': {'type': 'apps', 'id': APP_ID}}},
              }}
              r = requests.post(f'{BASE}/v1/betaGroups', headers=H, json=payload, timeout=20)
              print(f'\nCreate vpn-internal → HTTP {r.status_code}: {r.text[:400]}')
              if r.status_code in (200, 201):
                  internal_id = r.json()['data']['id']
              else:
                  internal_id = None
          else:
              internal_id = internal['id']
              print(f'\nvpn-internal exists: {internal_id}')

          # === 6) If founder IS on the team, add them as internal tester
          if found_user and internal_id:
              # Find their tester record (every team member has one auto-created for internal beta)
              tq = requests.get(f'{BASE}/v1/betaTesters?filter[email]={EMAIL}', headers=H, timeout=20).json()
              if tq.get('data'):
                  tester_id = tq['data'][0]['id']
                  payload = {'data': [{'type': 'betaTesters', 'id': tester_id}]}
                  r = requests.post(
                      f'{BASE}/v1/betaGroups/{internal_id}/relationships/betaTesters',
                      headers=H, json=payload, timeout=20)
                  print(f'\nAdd to vpn-internal → HTTP {r.status_code}: {r.text[:300]}')
          elif not found_user:
              print(f'\n::warning::{EMAIL} NOT on Apple Developer team. Need to invite via POST /v1/userInvitations.')
              # Try to invite
              payload = {'data': {
                  'type': 'userInvitations',
                  'attributes': {
                      'email': EMAIL,
                      'firstName': 'Emrah',
                      'lastName': 'Baysal',
                      'roles': ['ADMIN'],
                      'allAppsVisible': True,
                      'provisioningAllowed': True,
                  },
              }}
              r = requests.post(f'{BASE}/v1/userInvitations', headers=H, json=payload, timeout=20)
              print(f'POST userInvitations → HTTP {r.status_code}: {r.text[:500]}')
          PY
