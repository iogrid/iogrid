name: mobile-ios-ci TestFlight

on:
  push:
    branches: [main]
    # GitHub Actions doesn't allow both `paths` and `paths-ignore` on
    # one trigger. Use negation prefixes (`!`) inside `paths` to
    # exclude .md docs — they don't affect the iOS build artifact and
    # cancelling an in-flight 30-minute build for a CONTRIBUTING typo
    # is waste (caught on 2026-06-02 when a gotcha-doc push cancelled
    # CI 26830609872 mid-`Build app for iOS Simulator`).
    paths:
      - 'mobile/ios/**'
      - '.github/workflows/mobile-ios-ci.yml'
      - '!mobile/ios/**/*.md'
  workflow_dispatch:

# Concurrency group: ALL mobile-ios-ci runs serialize on a single
# group. Apple's Distribution cert cap is 2 per team AND each run
# now revokes existing certs in its pre-flight (otherwise fastlane
# cert hits the limit). If two runs race, run B revokes run A's
# cert mid-archive → run A's xcodebuild fails to sign. The
# `cancel-in-progress: true` policy ensures only the latest commit's
# run survives — exactly what we want during rapid-fix iteration.
concurrency:
  group: mobile-ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: mobile/ios
    env:
      # HAS_APPLE_SECRETS gates the credential-requiring steps.
      # We must NOT reference `secrets.*` directly in step-level `if:`
      # conditions (GitHub Actions security restriction); instead set
      # a job-level env var derived from the secret, then check the
      # env var. The string comparison works because empty secrets
      # surface as empty strings.
      HAS_APPLE_SECRETS: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: mobile/ios/package-lock.json

      # Apple requires iOS 26 SDK (Xcode 26+) for App Store uploads as of
      # 2026-04. Default macos-latest may still have an older Xcode pinned;
      # explicitly select latest-stable.
      - name: Select latest-stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Add PacketTunnelProvider NE target (#568)
        # The Expo config plugin already copied the Swift source +
        # entitlements + extension Info.plist into ios/. This Ruby
        # script (using the canonical xcodeproj gem) creates the
        # actual Xcode target, wires WireGuardKit SwiftPM dep, and
        # embeds the .appex into the main app. Idempotent — bails
        # cleanly if the target already exists.
        #
        # APPLE_TEAM_ID is read by the Ruby script to set per-target
        # DEVELOPMENT_TEAM build settings, so the archive step doesn't
        # need a global xcodebuild flag that would clobber the
        # extension's separate provisioning profile.
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          gem install xcodeproj --no-document --silent
          ruby scripts/add-network-extension-target.rb

      - name: Bump CFBundleVersion to GitHub run number
        # Each TestFlight upload needs a unique CFBundleVersion. Without
        # this, altool silently dedupes against the prior build with the
        # same version. github.run_number monotonically increases per
        # workflow run on this repo — perfect fit. Glob the Info.plist
        # since the directory name varies with app slug.
        run: |
          for plist in ios/*/Info.plist; do
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$plist"
            echo "  $plist → CFBundleVersion=${{ github.run_number }}"
          done

      - name: Patch Podfile — disable signing for Pod static libs + force SKIP_INSTALL=NO on app
        # Pod targets are static libraries / resource bundles — must NOT be
        # signed (else "empty code signing identity" error). Additionally
        # Xcode 26 archives end up with empty Products/Applications because
        # the auto-generated Podfile sets SKIP_INSTALL=YES on every target;
        # we force SKIP_INSTALL=NO on the user_project's app target so the
        # archive copies the .app into Products/Applications.
        run: |
          python3 << 'PY'
          import re
          p = open('ios/Podfile').read()
          snippet = """
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED']  = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY']    = ''
                config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
              end
            end
            # Ensure the user project's app target is INSTALLABLE in archives
            # (Xcode 26 default of SKIP_INSTALL=YES leaves Products/Applications empty)
            installer.aggregate_targets.each do |agg|
              agg.user_project.targets.each do |target|
                # Only force-install the main app target. App extensions
                # (e.g. PacketTunnelProvider for the iOS VPN data plane,
                # #568) must keep SKIP_INSTALL=YES so they're embedded
                # via the main app's PlugIns folder, NOT separately
                # installed at /Applications/<empty>.appex.
                next if target.product_type == 'com.apple.product-type.app-extension'
                target.build_configurations.each do |config|
                  if config.name == 'Release'
                    config.build_settings['SKIP_INSTALL'] = 'NO'
                    config.build_settings['INSTALL_PATH'] = '$(LOCAL_APPS_DIR)'
                    config.build_settings['DEPLOYMENT_LOCATION'] = 'YES'
                  end
                end
              end
              agg.user_project.save
            end
          """
          new, n = re.subn(r'(post_install do \|installer\|\s*\n)', r'\1' + snippet, p, count=1)
          if n == 0:
              new = p + "\npost_install do |installer|\n" + snippet + "end\n"
          open('ios/Podfile', 'w').write(new)
          print('Podfile patched')
          PY

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Write App Store Connect API key
        # GATE: skip when Apple secrets aren't set (operator-action #575)
        if: ${{ env.HAS_APPLE_SECRETS == 'true' }}
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" \
            | base64 -d > ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          chmod 600 ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Create temp keychain (cert comes from fastlane cert)
        # GATE: skip when Apple secrets aren't set (operator-action #575)
        if: ${{ env.HAS_APPLE_SECRETS == 'true' }}
        # The IOS_DIST_CERT_P12 secret holds a REVOKED Distribution cert
        # (HATICE YILDIZ BAYSAL, serial 1977D8398FBA7D19E244D688F2CB211D).
        # Importing it caused xcodebuild to pick the revoked cert during
        # archive even when fastlane cert had created a fresh one — the
        # revoked one was listed first in the keychain.
        #
        # Don't import the secret. Create an empty keychain; fastlane
        # cert in the next step creates a fresh cert in Apple's portal
        # and imports it here.
        run: |
          set -euo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true
          # Replace the user keychain search list with ONLY our new
          # keychain — do NOT append the existing ones. The macOS runner
          # may have stale "Apple Distribution: HATICE YILDIZ BAYSAL"
          # certs in the login keychain from prior CI jobs on other
          # team projects (vcard/cinova/ping all share the Dynolabs team).
          # If the search list includes them, xcodebuild picks the FIRST
          # matching cert by generic name "Apple Distribution" — which
          # may be a stale/revoked cert from a prior job rather than our
          # freshly-imported one. iter 10 (run 26788950651) failed at
          # archive with serial 1CE647F4992DFD0CEAA4528443705912 (NOT
          # the cert fastlane just created) for exactly this reason.
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          # Persist for fastlane cert / sigh in the next step.
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Fetch fresh App Store provisioning profile via fastlane sigh
        # GATE: skip when Apple secrets aren't set (operator-action #575)
        if: ${{ env.HAS_APPLE_SECRETS == 'true' }}
        # fastlane sigh hits Apple Developer Portal via the ASC API key,
        # regenerates the App Store profile for io.iogrid.app with
        # whatever capabilities are CURRENTLY enabled on the App ID
        # (SIWA / push / associated-domains / anything added later just
        # works), downloads the fresh .mobileprovision, and installs it
        # where Xcode reads it. Manual signing in the archive step picks
        # it up by PROVISIONING_PROFILE_SPECIFIER name.
        #
        # sigh CLI doesn't read APP_STORE_CONNECT_API_KEY_* env vars
        # (those only work inside a Fastfile), so we materialise the
        # API key as a JSON file and pass --api_key_path.
        env:
          FASTLANE_HIDE_CHANGELOG:    "1"
          FASTLANE_SKIP_UPDATE_CHECK: "1"
        run: |
          set -euo pipefail
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Build the fastlane api-key JSON. `key` carries the P8 PEM
          # body inline (raw multi-line PEM, not base64) — fastlane
          # parses this format directly.
          export KEY_FILE=$HOME/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          export API_JSON=$RUNNER_TEMP/asc_api_key.json
          export ASC_KEY_ID="${{ secrets.APP_STORE_CONNECT_KEY_ID }}"
          export ASC_ISSUER_ID="${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
          python3 - <<'PY'
          import json, os
          pem = open(os.environ['KEY_FILE']).read()
          obj = {
            "key_id":   os.environ['ASC_KEY_ID'],
            "issuer_id":os.environ['ASC_ISSUER_ID'],
            "key":      pem,
            "duration": 1200,
            "in_house": False,
          }
          with open(os.environ['API_JSON'], 'w') as f:
            json.dump(obj, f)
          PY
          # SKIP pre-revoke — we're NOT creating a new cert. We import
          # the team's existing dist .p12 (exfil'd from vcard). The
          # pre-revoke logic would kill the cert we're about to import.
          pip3 install --quiet --break-system-packages --user pyjwt cryptography 2>&1 | tail -2 || true
          python3 - <<'PY'
          import json, os, sys, time, base64, urllib.request, urllib.error, urllib.parse
          # Look in user site-packages.
          import site
          for p in site.getusersitepackages() if isinstance(site.getusersitepackages(), list) else [site.getusersitepackages()]:
              if p not in sys.path:
                  sys.path.insert(0, p)
          import jwt as pyjwt
          key_id    = os.environ['ASC_KEY_ID']
          issuer_id = os.environ['ASC_ISSUER_ID']
          pem       = open(os.environ['KEY_FILE']).read()
          tok = pyjwt.encode(
              {'iss': issuer_id, 'iat': int(time.time()), 'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
              pem, algorithm='ES256', headers={'kid': key_id, 'typ': 'JWT'}
          )
          if isinstance(tok, bytes):
              tok = tok.decode()
          hdrs = {'Authorization': f'Bearer {tok}', 'Accept': 'application/json'}

          # Purge existing provisioning profiles for both the main app
          # and the PacketTunnelProvider extension — they're bound to
          # certs we just revoked. If we don't, sigh sees a name
          # collision and (without --force) downloads the stale profile
          # bound to a non-existent cert, breaking the archive step.
          for PROFILE_NAME in ("iogrid App Store", "iogrid PacketTunnelProvider App Store"):
              preq = urllib.request.Request(
                  f'https://api.appstoreconnect.apple.com/v1/profiles?filter[name]={urllib.parse.quote(PROFILE_NAME)}&limit=200',
                  headers=hdrs,
              )
              try:
                  with urllib.request.urlopen(preq) as r:
                      pdata = json.load(r)
              except urllib.error.HTTPError as e:
                  print(f'profiles list HTTP {e.code}: {e.read().decode()[:200]}')
                  pdata = {'data': []}
              for p in pdata.get('data', []):
                  pid = p['id']
                  pname = p.get('attributes', {}).get('name', '')
                  print(f'deleting profile {pid} ({pname})')
                  dreq = urllib.request.Request(
                      f'https://api.appstoreconnect.apple.com/v1/profiles/{pid}',
                      headers=hdrs, method='DELETE',
                  )
                  try:
                      urllib.request.urlopen(dreq).read()
                      print('  deleted OK')
                  except urllib.error.HTTPError as e:
                      print(f'  delete HTTP {e.code}: {e.read().decode()[:200]}')

          # PRE-REVOKE: each CI run creates a fresh Distribution cert.
          # Apple caps Distribution certs at 2 per team, so we revoke
          # stale ones before fastlane cert creates a fresh one.
          #
          # CROSS-PROJECT CONCURRENCY: vcard / cinova / ping all share
          # the Dynolabs Apple Developer team and all do their own
          # pre-revoke. If we revoke ALL distribution certs, we'd nuke
          # a sibling's just-created cert mid-archive — exactly the bug
          # iogrid iter 10/12 hit, where cinova's CI was running in
          # parallel and revoked iogrid's fresh cert.
          #
          # Heuristic fix: revoke only certs OLDER than 10 minutes.
          # In-flight CI runs created their cert within the last few
          # minutes; truly-stale certs have been around for tens of
          # minutes (or hours) — typically from cancelled runs that
          # the concurrency: cancel-in-progress kills mid-flight,
          # leaving the cert orphaned. Apple caps at 2 distribution
          # certs and won't reclaim cancelled-run certs automatically.
          #
          # Lowered from 60min to 10min on 2026-06-02 after rapid-fire
          # session pushes stranded certs from cancelled runs and
          # blocked sigh with "Could not create another Distribution
          # certificate" (#575 comment).
          #
          # Apple's certs.expirationDate is set to creation+1year, so
          # filter: expirationDate < (now + 365days - 10min).
          import datetime
          print('=== revoking Distribution certs older than 10min ===')
          now = datetime.datetime.now(datetime.timezone.utc)
          threshold = now + datetime.timedelta(days=365) - datetime.timedelta(minutes=10)
          creq = urllib.request.Request(
              'https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=IOS_DISTRIBUTION,DISTRIBUTION&limit=200',
              headers=hdrs,
          )
          try:
              with urllib.request.urlopen(creq) as r:
                  cdata = json.load(r)
          except urllib.error.HTTPError as e:
              print(f'  certs list HTTP {e.code}: {e.read().decode()[:200]}')
              cdata = {'data': []}
          for c in cdata.get('data', []):
              cid = c['id']
              cname = c.get('attributes', {}).get('name', '')
              ctype = c.get('attributes', {}).get('certificateType', '')
              exp_str = c.get('attributes', {}).get('expirationDate', '')
              try:
                  exp = datetime.datetime.fromisoformat(exp_str.replace('Z', '+00:00'))
              except (ValueError, AttributeError):
                  print(f'  SKIP cert {cid} — unparseable expirationDate: {exp_str!r}')
                  continue
              if exp >= threshold:
                  age_min = round((now + datetime.timedelta(days=365) - exp).total_seconds() / 60, 1)
                  print(f'  SKIP cert {cid} ({ctype} {cname}) — {age_min}min old, sibling CI in-flight')
                  continue
              age_h = round((now + datetime.timedelta(days=365) - exp).total_seconds() / 3600, 1)
              print(f'  revoking cert {cid} ({ctype} {cname}) — {age_h}h old')
              dreq = urllib.request.Request(
                  f'https://api.appstoreconnect.apple.com/v1/certificates/{cid}',
                  headers=hdrs, method='DELETE',
              )
              try:
                  urllib.request.urlopen(dreq).read()
                  print('    revoked OK')
              except urllib.error.HTTPError as e:
                  print(f'    revoke HTTP {e.code}: {e.read().decode()[:200]}')
          PY
          # fastlane cert creates a fresh DISTRIBUTION cert + writes a
          # .p12 the keychain can import. The pre-revoke block above
          # freed all slots, so cert has room.
          fastlane cert \
            --api_key_path "$API_JSON" \
            --team_id ${{ secrets.APPLE_TEAM_ID }} \
            --output_path $RUNNER_TEMP \
            --keychain_path "$KEYCHAIN_PATH" \
            --keychain_password "$KEYCHAIN_PASSWORD" \
            --force \
            2>&1 | tee "$RUNNER_TEMP/cert.log"
          NEW_CERT_ID=$(grep -oE 'Successfully generated [A-Z0-9]{10}|Found the certificate [A-Z0-9]{10}' "$RUNNER_TEMP/cert.log" \
            | head -1 | awk '{print $NF}')
          if [ -z "$NEW_CERT_ID" ]; then
            echo "::error::Could not parse cert ID from fastlane cert output"
            cat "$RUNNER_TEMP/cert.log"
            exit 1
          fi
          echo "Pinning sigh to cert ID: $NEW_CERT_ID"
          # Import any .p12 fastlane cert wrote.
          for p12 in "$RUNNER_TEMP"/*.p12; do
            [ -f "$p12" ] || continue
            security import "$p12" -P "" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" || true
          done
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
          echo "=== identities in keychain ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          fastlane sigh renew \
            --api_key_path "$API_JSON" \
            --app_identifier io.iogrid.app.PacketTunnelProvider \
            --team_id ${{ secrets.APPLE_TEAM_ID }} \
            --provisioning_name "iogrid PacketTunnelProvider App Store" \
            --output_path $RUNNER_TEMP \
            --filename ext.mobileprovision \
            --cert_id "$NEW_CERT_ID" \
            --force
          # Install the extension profile in the same dir Xcode reads
          # from. (The next step installs the main profile but only one
          # of them — we need both available.) Decode the CMS-signed
          # .mobileprovision to extract its UUID, then copy keyed on
          # that UUID — Xcode finds profiles by UUID, not filename.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          security cms -D -i $RUNNER_TEMP/ext.mobileprovision \
            > $RUNNER_TEMP/ext.plist 2>/dev/null
          EXT_UUID=$(plutil -extract UUID raw -o - $RUNNER_TEMP/ext.plist)
          echo "Extension profile UUID: $EXT_UUID"
          cp $RUNNER_TEMP/ext.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$EXT_UUID.mobileprovision
          fastlane sigh renew \
            --api_key_path "$API_JSON" \
            --app_identifier io.iogrid.app \
            --team_id ${{ secrets.APPLE_TEAM_ID }} \
            --provisioning_name "iogrid App Store" \
            --output_path $RUNNER_TEMP \
            --filename dist.mobileprovision \
            --cert_id "$NEW_CERT_ID" \
            --force
          # Install the just-downloaded profile where Xcode reads it
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<<"$(security cms -D -i $RUNNER_TEMP/dist.mobileprovision)")
          echo "Fresh profile UUID: $UUID"
          cp $RUNNER_TEMP/dist.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Discover scheme
        id: scheme
        # Workspace schemes include Pod schemes (AsyncStorage, etc.) +
        # the PacketTunnelProvider extension target (#568). Picking
        # alphabetically would land on a Pod. Strategy: enumerate
        # schemes, drop "Pods-*" and known extension target names,
        # take whatever's left. Falls back to workspace basename if
        # the heuristic produces an empty set.
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          DEFAULT_SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          export DEFAULT_SCHEME
          APP_SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list -json \
            | python3 -c '
          import json, sys, os
          d = json.load(sys.stdin)
          schemes = d["workspace"]["schemes"]
          default = os.environ["DEFAULT_SCHEME"]
          # Drop Pod-internal + known extension schemes
          drop_prefixes = ("Pods-",)
          drop_exact = {"PacketTunnelProvider"}
          app_schemes = [s for s in schemes
                         if not any(s.startswith(p) for p in drop_prefixes)
                         and s not in drop_exact]
          if default in app_schemes:
              print(default)
          elif app_schemes:
              print(app_schemes[0])
          else:
              print(default)  # fallback — fails later with clearer msg
          ')
          export APP_SCHEME
          echo "Discovered app scheme: $APP_SCHEME (default basename was $DEFAULT_SCHEME)"
          echo "All schemes:"
          xcodebuild -workspace "$WORKSPACE" -list -json | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          for s in d['workspace']['schemes']:
              print(f'  - {s}')
          "
          echo "scheme=$APP_SCHEME" >> $GITHUB_OUTPUT
          echo "Discovered scheme: $APP_SCHEME"

      - name: Force SKIP_INSTALL=NO on the app target (early, surgical)
        # The naive regex from earlier matched EVERY /* Release */ XCBuildConfiguration
        # block — including the project-level one — and that broke the Release sim
        # build entirely (only dSYM emitted, no .app). Surgical fix: parse the
        # pbxproj, find the PBXNativeTarget whose productType == application,
        # walk its buildConfigurationList, and only patch THAT target's Release.
        run: |
          python3 << 'PY'
          import re, glob
          for pbx in glob.glob('ios/*.xcodeproj/project.pbxproj'):
              if 'Pods' in pbx:
                  continue
              data = open(pbx).read()
              # 1. Find all PBXNativeTarget entries with productType com.apple.product-type.application
              target_re = re.compile(r'([0-9A-F]{24})\s*/\*\s*[^*]+\s*\*/\s*=\s*\{\s*isa = PBXNativeTarget;[^}]*?productType = "com\.apple\.product-type\.application";', re.S)
              app_targets = target_re.findall(data)
              print(f'  app targets: {app_targets}')
              # 2. For each, find its buildConfigurationList
              for tid in app_targets:
                  m = re.search(rf'{tid}\s*/\*[^*]+\*/\s*=\s*\{{[^}}]*?buildConfigurationList = ([0-9A-F]{{24}})', data, re.S)
                  if not m:
                      continue
                  list_id = m.group(1)
                  # 3. Find the build configuration list, get the Release config id
                  m2 = re.search(rf'{list_id}\s*/\*[^*]+\*/\s*=\s*\{{[^}}]*?buildConfigurations = \(([^)]+)\)', data, re.S)
                  if not m2:
                      continue
                  cfg_block = m2.group(1)
                  # match lines like "  ABCDEF... /* Release */,"
                  release_id_match = re.search(r'([0-9A-F]{24})\s*/\*\s*Release\s*\*/', cfg_block)
                  if not release_id_match:
                      continue
                  rel_id = release_id_match.group(1)
                  # 4. Patch ONLY that XCBuildConfiguration's buildSettings
                  pattern = re.compile(rf'({rel_id}\s*/\*[^*]+\*/\s*=\s*\{{\s*isa = XCBuildConfiguration;\s*buildSettings = \{{)', re.S)
                  new = pattern.sub(r'\1\n\t\t\t\tSKIP_INSTALL = NO;\n\t\t\t\tINSTALL_PATH = "$(LOCAL_APPS_DIR)";', data, count=1)
                  if new != data:
                      data = new
                      print(f'  patched target {tid} release config {rel_id}')
              open(pbx, 'w').write(data)
          PY

      # ───────────────────────────────────────────────────────────
      # SIMULATOR E2E GATE — runs BEFORE archive/upload.
      # If any Maestro flow fails, this job exits non-zero, the
      # archive + TestFlight upload steps are skipped, and the
      # broken build never reaches Apple.
      # ───────────────────────────────────────────────────────────
