name: sdk-java-publish

# Phase 2: Maven Central publish via Sonatype OSSRH.
# Requires signing key + Sonatype credentials in repo secrets:
#   - SIGNING_KEY (ASCII-armoured GPG private key)
#   - SIGNING_PASSWORD
#   - OSSRH_USERNAME
#   - OSSRH_TOKEN
# Until those are wired, this workflow performs a local `publishToMavenLocal`
# smoke step so the build script is exercised on every release tag.

on:
  push:
    tags:
      - "sdk-java/v*"
  workflow_dispatch:

jobs:
  publish:
    name: build + publish (local until Phase 2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        working-directory: sdks/java
        run: gradle check --no-daemon

      - name: Build artifacts
        working-directory: sdks/java
        run: gradle build --no-daemon

      - name: Publish to local Maven (smoke)
        working-directory: sdks/java
        run: gradle publishToMavenLocal --no-daemon -Psigning.skip=true

