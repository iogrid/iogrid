name: restore-v2-user-visibility
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: v2 — check user visibleApps, delete bad tester record, escalate visibility
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY:       ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json
          key = base64.b64decode(os.environ['ASC_KEY'])
          tok = jwt.encode(
              {'iss': os.environ['ASC_ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'},
              key, algorithm='ES256', headers={'kid': os.environ['ASC_KEY_ID']})
          H = {'Authorization': f'Bearer {tok}', 'Content-Type': 'application/json'}
          BASE = 'https://api.appstoreconnect.apple.com'
          EMAIL = 'emrahbaysal@gmail.com'
          USER_ID = 'e844a019-ba05-46dd-8a5b-b8952653701d'

          # 1. Get user's current attributes + relationships
          u = requests.get(f'{BASE}/v1/users/{USER_ID}?include=visibleApps', headers=H, timeout=20).json()
          print(f'User attrs: {json.dumps(u.get("data", {}).get("attributes", {}), indent=2)}')
          print(f'Included (visibleApps + others): {len(u.get("included", []))}')
          rel = u.get('data', {}).get('relationships', {}).get('visibleApps', {})
          print(f'visibleApps data: {json.dumps(rel.get("data", []), indent=2)[:1000]}')

          # 2. Get rid of the bad external-style tester record I created
          tq = requests.get(f'{BASE}/v1/betaTesters?filter[email]={EMAIL}&limit=20', headers=H, timeout=20).json()
          for t in tq.get('data', []):
              print(f'Deleting bad tester record {t["id"]}')
              r = requests.delete(f'{BASE}/v1/betaTesters/{t["id"]}', headers=H, timeout=20)
              print(f'  DELETE → HTTP {r.status_code}')

          # 3. If user has allAppsVisible=false, PATCH to true
          attrs = u['data']['attributes']
          all_visible = attrs.get('allAppsVisible')
          print(f'\nallAppsVisible: {all_visible}')
          if not all_visible:
              payload = {'data': {
                  'type': 'users',
                  'id': USER_ID,
                  'attributes': {'allAppsVisible': True},
              }}
              r = requests.patch(f'{BASE}/v1/users/{USER_ID}', headers=H, json=payload, timeout=20)
              print(f'PATCH user allAppsVisible=true → HTTP {r.status_code}: {r.text[:400]}')

          # 4. Re-verify - check beta groups again
          time.sleep(2)
          apps = requests.get(f'{BASE}/v1/apps?limit=200', headers=H, timeout=20).json()
          print(f'\n=== Beta group membership after fix ===')
          for app in apps.get('data', []):
              app_id = app['id']
              app_name = app['attributes'].get('name')
              groups = requests.get(f'{BASE}/v1/apps/{app_id}/betaGroups?limit=50', headers=H, timeout=20).json()
              for g in groups.get('data', []):
                  if not g['attributes'].get('isInternalGroup'):
                      continue
                  g_id = g['id']
                  g_name = g['attributes'].get('name')
                  testers = requests.get(
                      f'{BASE}/v1/betaGroups/{g_id}/betaTesters?filter[email]={EMAIL}&limit=10',
                      headers=H, timeout=20).json()
                  has_founder = bool(testers.get('data'))
                  marker = '✅' if has_founder else '❌'
                  print(f"  {marker} {app_name} → {g_name}")
          PY
