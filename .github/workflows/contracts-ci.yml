name: contracts-ci

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  workflow_dispatch: {}

# Conservative concurrency: cancel older runs of the same ref to save CI minutes; main runs
# are not cancelled (they may be required for branch protection).
concurrency:
  group: contracts-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  SOLANA_VERSION: "v1.18.26"
  ANCHOR_VERSION: "0.31.1"
  NODE_VERSION: "20"
  CARGO_TERM_COLOR: always
  # `-D warnings` would fail on a handful of lints emitted from inside anchor-lang's
  # `#[program]` attribute macro on solana-program 2.x, which we can't fix without
  # forking anchor. Treat warnings as errors EXCEPT for those specific upstream
  # diagnostics. To be revisited when anchor 1.x is fully audited.
  RUSTFLAGS: "--cfg procmacro2_semver_exempt -D warnings -A unexpected_cfgs -A deprecated"

jobs:
  anchor-build-test:
    name: anchor build + test
    # ubuntu-24.04 ships glibc 2.39 which the upstream-built anchor binary requires.
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (pkg-config, libudev, libssl)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust toolchain (1.85.0 — edition2024-capable)
        # 1.85.0: first rustc stable with edition2024 (required by recent solana-program
        # / cpufeatures transitive deps). Earlier versions fail to even parse the manifests.
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
          components: clippy, rustfmt

      - name: Cache Cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('contracts/Cargo.lock', 'contracts/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Solana CLI
        id: solana-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        if: steps.solana-cache.outputs.cache-hit != 'true'
        run: |
          # release.solana.com was retired in 2025; the new canonical install endpoint
          # for Solana CLI artefacts (still in the Anza namespace) is release.anza.xyz.
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Verify Solana
        run: |
          solana --version
          solana-keygen --version

      - name: Cache Anchor CLI
        id: anchor-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor CLI ${{ env.ANCHOR_VERSION }}
        if: steps.anchor-cache.outputs.cache-hit != 'true'
        # Download the prebuilt Linux x86_64 binary from the upstream GitHub release.
        # Avoids `cargo install`'s transitive proc-macro-error 1.0.4 toolchain compat issues.
        run: |
          mkdir -p ~/.cargo/bin
          curl -fsSL \
            "https://github.com/coral-xyz/anchor/releases/download/v${ANCHOR_VERSION}/anchor-${ANCHOR_VERSION}-x86_64-unknown-linux-gnu" \
            -o ~/.cargo/bin/anchor
          chmod +x ~/.cargo/bin/anchor

      - name: Verify Anchor
        run: anchor --version

      - name: Generate ephemeral keypair (for anchor test signer)
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase --silent --outfile ~/.config/solana/id.json
          solana config set --keypair ~/.config/solana/id.json
          solana config set --url localhost

      - name: Cache target/
        uses: actions/cache@v4
        with:
          path: contracts/target
          key: ${{ runner.os }}-anchor-target-${{ env.ANCHOR_VERSION }}-${{ hashFiles('contracts/**/Cargo.toml', 'contracts/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-anchor-target-${{ env.ANCHOR_VERSION }}-

      - name: Install node deps
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          else
            yarn install
          fi

      - name: Anchor build
        run: anchor build

      - name: Anchor test (skip deploy — uses bundled local validator)
        run: anchor test --skip-deploy

  cargo-clippy:
    name: cargo clippy
    # ubuntu-24.04 ships glibc 2.39 which the upstream-built anchor binary requires.
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - name: Install Rust toolchain (1.85.0 — edition2024-capable)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
          components: clippy

      - name: Cache Cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('contracts/Cargo.lock', 'contracts/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache target/
        uses: actions/cache@v4
        with:
          path: contracts/target
          key: ${{ runner.os }}-cargo-clippy-target-${{ hashFiles('contracts/**/Cargo.toml', 'contracts/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-target-

      - name: Clippy (host arch, lib only — skips BPF compile)
        # `-A unexpected_cfgs` suppresses the noisy `unexpected cfg condition value:
        # anchor-debug` lint that anchor 0.31's macros emit with newer rustc.
        # `-A deprecated` covers `AccountInfo::realloc` deprecation emitted by the
        # `#[program]` attribute macro on solana-program 2.x.
        run: cargo clippy --workspace --lib --all-features -- -D warnings -A unexpected_cfgs -A deprecated
