name: set-privacy-labels-574
on:
  workflow_dispatch:
jobs:
  set:
    runs-on: macos-latest
    timeout-minutes: 5
    env:
      ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_KEY:       ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
    steps:
      - name: Set privacy nutrition labels for #574
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json
          tok = jwt.encode(
              {'iss': os.environ['ASC_ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
              base64.b64decode(os.environ['ASC_KEY']), algorithm='ES256',
              headers={'kid': os.environ['ASC_KEY_ID']})
          H = {'Authorization': f'Bearer {tok}', 'Content-Type': 'application/json'}
          BASE = 'https://api.appstoreconnect.apple.com'
          APP_ID = '6775617937'

          # Read existing privacy info
          info = requests.get(f'{BASE}/v1/apps/{APP_ID}/appPrivacy', headers=H, timeout=20)
          print(f'GET appPrivacy → HTTP {info.status_code}')
          print(info.text[:1500])

          # As of 2026 Apple's appPrivacyDetails CRUD lives in a beta endpoint
          # and is most reliably set via the ASC UI. This diagnostic shows
          # current state; if writes are supported, follow-up patches go here.
          PY
