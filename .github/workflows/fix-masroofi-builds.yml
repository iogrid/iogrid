name: fix-masroofi-builds
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: macos-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Assign latest BD Masroofi build to internal beta groups
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY:       ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json
          key = base64.b64decode(os.environ['ASC_KEY'])
          tok = jwt.encode(
              {'iss': os.environ['ASC_ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'},
              key, algorithm='ES256', headers={'kid': os.environ['ASC_KEY_ID']})
          H = {'Authorization': f'Bearer {tok}', 'Content-Type': 'application/json'}
          BASE = 'https://api.appstoreconnect.apple.com'
          LATEST_BUILD_ID = '11af4c32-48b9-4bd9-a876-adfea3c6e886'  # v24
          BD_TESTERS_GROUP   = '0a2a48b9-04ff-492e-9cf3-5c0d1d90f3fe'  # internal, hasAccessToAllBuilds=True
          INTERNAL_GROUP     = 'd47ebb44-5284-4c5e-b1b5-f8470e2a325c'  # internal, hasAccessToAllBuilds=False

          for g_id, g_name in [(BD_TESTERS_GROUP, 'BD Testers'), (INTERNAL_GROUP, 'Internal Testers')]:
              payload = {'data': [{'type': 'builds', 'id': LATEST_BUILD_ID}]}
              r = requests.post(
                  f'{BASE}/v1/betaGroups/{g_id}/relationships/builds',
                  headers=H, json=payload, timeout=20)
              print(f'Assign build v24 to {g_name} → HTTP {r.status_code}: {r.text[:200]}')

          # Verify
          time.sleep(2)
          for g_id, g_name in [(BD_TESTERS_GROUP, 'BD Testers'), (INTERNAL_GROUP, 'Internal Testers')]:
              builds = requests.get(f'{BASE}/v1/betaGroups/{g_id}/builds?limit=10', headers=H, timeout=20).json()
              print(f'\n{g_name} now has {len(builds.get("data", []))} builds:')
              for b in builds.get('data', []):
                  print(f"  ver={b['attributes'].get('version')}")
          PY
