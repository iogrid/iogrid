name: probe-external-beta-state
on:
  workflow_dispatch:
# Refs #574 — characterize the external TestFlight beta state end-to-end:
#   beta groups (incl. isInternalGroup / publicLinkEnabled / publicLink),
#   build 137 betaAppReviewSubmission state, and whether the public-link
#   external group + build attachment can be created purely via ASC API
#   (no founder cookie).
jobs:
  probe:
    runs-on: macos-latest
    timeout-minutes: 5
    env:
      ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_KEY:       ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
    steps:
      - name: Probe external beta state
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json
          tok = jwt.encode(
              {'iss': os.environ['ASC_ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
              base64.b64decode(os.environ['ASC_KEY']), algorithm='ES256',
              headers={'kid': os.environ['ASC_KEY_ID']})
          H = {'Authorization': f'Bearer {tok}', 'Content-Type': 'application/json'}
          BASE = 'https://api.appstoreconnect.apple.com'
          APP = '6775617937'

          # Beta groups
          bg = requests.get(f'{BASE}/v1/apps/{APP}/betaGroups', headers=H, timeout=15).json()
          print('=== betaGroups ===')
          for g in bg.get('data', []):
              a = g['attributes']
              print(f"  id={g['id']} name={a.get('name')!r} internal={a.get('isInternalGroup')} "
                    f"publicLinkEnabled={a.get('publicLinkEnabled')} publicLink={a.get('publicLink')!r} "
                    f"publicLinkLimitEnabled={a.get('publicLinkLimitEnabled')}")

          # Build 137 + its beta build usages / external review state
          builds = requests.get(
              f'{BASE}/v1/builds?filter[app]={APP}&sort=-uploadedDate&limit=3'
              f'&include=betaBuildLocalizations',
              headers=H, timeout=15).json()
          print('\n=== recent builds ===')
          for b in builds.get('data', []):
              ba = b['attributes']
              print(f"  build id={b['id']} version={ba.get('version')} "
                    f"processingState={ba.get('processingState')} "
                    f"expired={ba.get('expired')}")
              # external build state
              bd = requests.get(f"{BASE}/v1/builds/{b['id']}/buildBetaDetail",
                                headers=H, timeout=15).json()
              da = bd.get('data', {}).get('attributes', {})
              print(f"    internalBuildState={da.get('internalBuildState')} "
                    f"externalBuildState={da.get('externalBuildState')}")

          # Existing beta review submissions
          subs = requests.get(
              f'{BASE}/v1/betaAppReviewSubmissions?filter[build.app]={APP}&limit=5',
              headers=H, timeout=15).json()
          print('\n=== betaAppReviewSubmissions ===')
          for s in subs.get('data', []):
              print(f"  id={s['id']} state={s['attributes'].get('betaReviewState')}")
          if not subs.get('data'):
              print(f"  (none) raw: {json.dumps(subs)[:300]}")
          PY
