name: sdk-python-ci

on:
  push:
    branches: [main]
    paths:
      - "sdks/python/**"
      - ".github/workflows/sdk-python-ci.yml"
  pull_request:
    paths:
      - "sdks/python/**"
      - ".github/workflows/sdk-python-ci.yml"

jobs:
  test:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install hatch
        run: pip install hatch==1.13.0

      - name: Lint (ruff)
        working-directory: sdks/python
        run: hatch run lint

      - name: Typecheck (mypy)
        working-directory: sdks/python
        run: hatch run typecheck

      - name: Test (pytest)
        working-directory: sdks/python
        run: hatch run test

      - name: Build wheel + sdist
        working-directory: sdks/python
        run: hatch build
