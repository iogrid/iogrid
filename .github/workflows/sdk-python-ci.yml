name: sdk-python-ci

on:
  push:
    branches: [main]
    paths:
      - "sdks/python/**"
      - ".github/workflows/sdk-python-ci.yml"
  pull_request:
    paths:
      - "sdks/python/**"
      - ".github/workflows/sdk-python-ci.yml"

jobs:
  test:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime + dev deps
        working-directory: sdks/python
        run: |
          python -m pip install --upgrade pip
          # Install the package itself + dev deps directly. We avoid
          # `hatch env create` because hatch's auto-managed venv path
          # has a known compatibility issue with virtualenv>=21.0 on
          # GitHub Actions runners (2026-05 incident).
          python -m pip install -e .
          python -m pip install \
            "pytest>=8.0" \
            "pytest-asyncio>=0.23" \
            "respx>=0.21" \
            "mypy>=1.10" \
            "ruff>=0.6" \
            "build"

      - name: Lint (ruff)
        working-directory: sdks/python
        run: ruff check src tests

      - name: Typecheck (mypy)
        working-directory: sdks/python
        run: mypy src

      - name: Test (pytest)
        working-directory: sdks/python
        run: pytest -q tests

      - name: Build wheel + sdist
        working-directory: sdks/python
        run: python -m build
