name: probe-app-data-usages
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: macos-latest
    timeout-minutes: 5
    env:
      ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_KEY:       ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
    steps:
      - name: Probe all privacy-related ASC endpoints
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json
          tok = jwt.encode(
              {'iss': os.environ['ASC_ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
              base64.b64decode(os.environ['ASC_KEY']), algorithm='ES256',
              headers={'kid': os.environ['ASC_KEY_ID']})
          H = {'Authorization': f'Bearer {tok}'}
          BASE = 'https://api.appstoreconnect.apple.com'
          APP = '6775617937'
          for path in [
              f'/v1/apps/{APP}/appDataUsages',
              f'/v1/apps/{APP}/appDataUsagePublishState',
              f'/v1/apps/{APP}/appDataUsageCategories',
              f'/v1/apps/{APP}/appDataUsagePurposes',
              f'/v1/apps/{APP}/appDataUsageDataProtections',
              f'/v1/apps/{APP}/appInfos',
              f'/v1/dataTypes',
              f'/v1/categories',
          ]:
              r = requests.get(BASE+path, headers=H, timeout=15)
              print(f'GET {path} → HTTP {r.status_code}')
              if r.status_code < 400:
                  print(f'  body[:600]: {r.text[:600]}')
              else:
                  print(f'  err: {r.text[:200]}')
          PY
