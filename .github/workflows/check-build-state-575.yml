name: check-build-state-575
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Query ASC for build 61 state
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY:       ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json, sys
          key = base64.b64decode(os.environ['ASC_KEY'])
          tok = jwt.encode(
              {'iss': os.environ['ASC_ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'},
              key, algorithm='ES256', headers={'kid': os.environ['ASC_KEY_ID']})
          h = {'Authorization': f'Bearer {tok}'}
          base = 'https://api.appstoreconnect.apple.com'

          # Find app
          apps = requests.get(f'{base}/v1/apps?filter[bundleId]=io.iogrid.app', headers=h, timeout=20).json()
          if not apps.get('data'):
              print('::error::App io.iogrid.app NOT FOUND in ASC')
              sys.exit(1)
          app_id = apps['data'][0]['id']
          print(f'App ID: {app_id}')

          # List ALL recent builds (not just version=61)
          builds = requests.get(
              f'{base}/v1/builds?filter[app]={app_id}&sort=-uploadedDate&limit=10',
              headers=h, timeout=20).json()
          print(f'\n=== Recent builds (top 10) ===')
          for b in builds.get('data', []):
              a = b['attributes']
              print(f"  id={b['id']} ver={a.get('version')} state={a.get('processingState')} uploaded={a.get('uploadedDate')} expired={a.get('expired')}")

          # Beta groups
          groups = requests.get(f'{base}/v1/apps/{app_id}/betaGroups', headers=h, timeout=20).json()
          print(f'\n=== Beta groups ===')
          for g in groups.get('data', []):
              a = g['attributes']
              print(f"  id={g['id']} name={a.get('name')} internal={a.get('isInternalGroup')} publicLinkEnabled={a.get('publicLinkEnabled')} publicLink={a.get('publicLink')}")

          # vpn-beta testers
          vb = next((g for g in groups.get('data', []) if g['attributes']['name'] == 'vpn-beta'), None)
          if vb:
              testers = requests.get(f"{base}/v1/betaGroups/{vb['id']}/betaTesters", headers=h, timeout=20).json()
              print(f'\n=== vpn-beta testers ===')
              for t in testers.get('data', []):
                  a = t['attributes']
                  print(f"  id={t['id']} email={a.get('email')} state={a.get('state')} invitedDate={a.get('inviteType')}")

          # Beta build details for build 61
          b61 = next((b for b in builds.get('data', []) if b['attributes'].get('version') == '61'), None)
          if b61:
              print(f'\n=== Build 61 detail ===')
              bd = requests.get(f"{base}/v1/builds/{b61['id']}?include=betaBuildLocalizations,buildBetaDetail,betaAppReviewSubmission", headers=h, timeout=20).json()
              print(json.dumps(bd.get('included', []), indent=2)[:2000])
          else:
              print('\n::warning::Build 61 NOT in recent builds')
          PY
