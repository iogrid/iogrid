name: admin-ci

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
      - "infra/k8s/base/admin/**"
      - ".github/workflows/admin-ci.yml"
  pull_request:
    paths:
      - "admin/**"
      - "infra/k8s/base/admin/**"
      - ".github/workflows/admin-ci.yml"

concurrency:
  group: admin-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Auth secrets are deliberately empty at build-time; NextAuth.js v5
          # only reads them at request-time so the build still completes.
          AUTH_SECRET: ci-placeholder-not-used-at-build-time
          NEXTAUTH_URL: http://localhost:3000

      - name: Unit tests
        run: pnpm test

  docker:
    runs-on: ubuntu-latest
    needs: quality
    # Cold-cache Next.js standalone build on QEMU-emulated linux/arm64
    # exceeds the previous 30-min timeout on PR #446's first push. Bump
    # to 60 so the first build under a fresh GHA-cache scope finishes;
    # subsequent runs hit cache and complete in ~5 min.
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/iogrid/admin
          tags: |
            type=sha,format=long
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,scope=admin,mode=max

      # ----------------------------------------------------------------------
      # CD bump: rewrite infra/k8s/base/admin/deployment.yaml to pin the
      # freshly built admin image by digest. Mirrors the coordinator-ci
      # deploy-bot pattern (#335) so admin doesn't drift to `:scaffold`
      # (#426 / #454 diagnostic). Only fires on push to main.
      # ----------------------------------------------------------------------
      - name: Checkout main for manifest rewrite
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          path: deploy-bump

      - name: Rewrite + commit + push (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: deploy-bump
        env:
          IMAGE: ghcr.io/iogrid/admin@${{ steps.build.outputs.digest }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          RESTARTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          MANIFEST=infra/k8s/base/admin/deployment.yaml
          # Substitute the admin image line (matches `:scaffold`,
          # `:sha-...`, or `@sha256:...` forms equivalently).
          python3 - <<PY
          import os, re, pathlib, sys
          img = os.environ["IMAGE"]
          p = pathlib.Path("$MANIFEST")
          src = p.read_text()
          pat = re.compile(r'(\s+image:\s+)ghcr\.io/iogrid/admin[:@][^\s]+')
          new_src, n = pat.subn(r'\g<1>' + img, src, count=1)
          if n != 1:
              print(f"::error::admin image substitution count={n}, expected 1", file=sys.stderr)
              sys.exit(1)
          ts_pat = re.compile(r'(kubectl\.kubernetes\.io/restartedAt:\s+")[^"]*(")')
          new_src, _ = ts_pat.subn(r'\g<1>' + "$RESTARTED_AT" + r'\g<2>', new_src, count=1)
          p.write_text(new_src)
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$MANIFEST"
          if git diff --cached --quiet; then
            echo "no manifest changes — image digest unchanged"
            exit 0
          fi
          git commit -m "infra(admin): deploy ${IMAGE#ghcr.io/iogrid/admin@} after CI ${COMMIT_SHA:0:12}"
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "push succeeded on attempt $i"
              break
            fi
            git pull --rebase origin main
            sleep 2
          done
