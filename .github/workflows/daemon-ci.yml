name: daemon-ci

on:
  push:
    branches: ["**"]
    tags: ["v*"]
    paths:
      - "daemon/**"
      - ".github/workflows/daemon-ci.yml"
      - "installer/macos/sparkle/**"
  pull_request:
    paths:
      - "daemon/**"
      - ".github/workflows/daemon-ci.yml"
      - "installer/macos/sparkle/**"

concurrency:
  group: daemon-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  fmt-clippy-test:
    name: fmt + clippy + test (linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon/target
          key: daemon-${{ runner.os }}-cargo-${{ hashFiles('daemon/Cargo.toml', 'daemon/rust-toolchain.toml', 'daemon/crates/**/Cargo.toml') }}
          restore-keys: |
            daemon-${{ runner.os }}-cargo-
      - name: rust-toolchain (pinned via rust-toolchain.toml)
        run: rustc --version && cargo --version
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test --workspace
        run: cargo test --workspace --all-targets

  build-release:
    name: release build (${{ matrix.target }})
    needs: fmt-clippy-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            binary: iogridd
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            binary: iogridd
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            binary: iogridd
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            binary: iogridd
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            binary: iogridd.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon/target
          key: daemon-${{ matrix.target }}-${{ hashFiles('daemon/Cargo.toml', 'daemon/rust-toolchain.toml', 'daemon/crates/**/Cargo.toml') }}
          restore-keys: |
            daemon-${{ matrix.target }}-
      - name: rustup add target
        run: rustup target add ${{ matrix.target }}
      - name: Install aarch64-linux-gnu cross-linker
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: cargo build --release
        run: cargo build --workspace --release --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "../artifacts/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "../artifacts/${{ matrix.target }}/${{ matrix.binary }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iogridd-${{ matrix.target }}
          path: artifacts/${{ matrix.target }}/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------
  # Sparkle appcast — on every `v*` tag push, generate a fresh appcast.xml
  # over the .pkg artifacts produced by installer-ci, sign it with the
  # ed25519 private key from the SPARKLE_ED_PRIVKEY_B64 repo secret, and
  # upload it as an artifact (the bastion's static-release publisher picks
  # it up + drops it at releases.iogrid.org/macos/appcast.xml).
  #
  # On non-tag pushes / PRs this job dry-runs: it generates an UNSIGNED
  # appcast.xml against synthetic .pkg fixtures so we still catch
  # template / shell bugs in PR review, but never publishes.
  #
  # Phase 1 of EPIC #348 — macOS Sparkle auto-update path.
  # ---------------------------------------------------------------------
  generate-appcast:
    name: generate Sparkle appcast.xml
    needs: build-release
    runs-on: macos-latest
    timeout-minutes: 15
    # Run on every push so PR diff lint still happens, but the upload step
    # is tag-gated below.
    steps:
      - uses: actions/checkout@v4
      - name: Download release artifacts
        # The installer-ci workflow produces the actual .pkg files; here in
        # daemon-ci we only have the bare binaries. For appcast purposes
        # we'd normally pull from installer-ci's published artifacts via
        # gh-action-cross-workflow-download, but for Phase 1 the appcast
        # generation step runs in installer-ci itself when the tag fires;
        # this job is the LINT side that smoke-tests the script.
        uses: actions/download-artifact@v4
        with:
          pattern: iogridd-*-apple-darwin
          path: artifacts/
      - name: Smoke generate-appcast.sh (synthetic .pkg fixtures)
        env:
          IOGRID_VERSION: "0.0.0-smoke"
          IOGRID_PKG_URL_BASE: "https://releases.iogrid.org/macos/0.0.0-smoke"
          IOGRID_RELEASE_NOTES_URL: "https://iogrid.org/releases/0.0.0-smoke.html"
        run: |
          set -euxo pipefail
          # Generate a throwaway keypair locally so the smoke run exercises
          # sign_update end-to-end without needing the prod private key.
          KEYDIR="$(mktemp -d)"
          ./installer/macos/sparkle/generate-keypair.sh "$KEYDIR"
          # Synthetic 1 KiB .pkg files — sign_update treats them as blobs.
          dd if=/dev/urandom of="$KEYDIR/iogrid-0.0.0-smoke-arm64.pkg" bs=1024 count=1 2>/dev/null
          dd if=/dev/urandom of="$KEYDIR/iogrid-0.0.0-smoke-amd64.pkg" bs=1024 count=1 2>/dev/null
          IOGRID_PKG_ARM64="$KEYDIR/iogrid-0.0.0-smoke-arm64.pkg" \
          IOGRID_PKG_AMD64="$KEYDIR/iogrid-0.0.0-smoke-amd64.pkg" \
          SPARKLE_ED_PRIVKEY_PATH="$KEYDIR/privkey.ed25519" \
          IOGRID_APPCAST_OUT="$KEYDIR/appcast.xml" \
            ./installer/macos/sparkle/generate-appcast.sh
          # XML well-formedness check.
          xmllint --noout "$KEYDIR/appcast.xml"
          # Mandatory tags Sparkle requires.
          grep -q 'sparkle:edSignature' "$KEYDIR/appcast.xml" || { echo "missing edSignature"; exit 1; }
          grep -q 'sparkle:version' "$KEYDIR/appcast.xml"     || { echo "missing version";     exit 1; }
          grep -q 'SUFeedURL\|releases.iogrid.org/macos' "$KEYDIR/appcast.xml" || true
          echo "::group::appcast.xml"
          cat "$KEYDIR/appcast.xml"
          echo "::endgroup::"
      - name: Generate + upload real appcast (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          IOGRID_VERSION: ${{ github.ref_name }}
          IOGRID_PKG_URL_BASE: "https://releases.iogrid.org/macos/${{ github.ref_name }}"
          IOGRID_RELEASE_NOTES_URL: "https://iogrid.org/releases/${{ github.ref_name }}.html"
          # SPARKLE_ED_PRIVKEY_B64 is a repo-level secret managed by the
          # platform team. Empty on fork-PRs (skip). The decoded blob is
          # the same `privkey.ed25519` shape produced by generate-keypair.sh.
          SPARKLE_ED_PRIVKEY_B64: ${{ secrets.SPARKLE_ED_PRIVKEY_B64 }}
        run: |
          set -euxo pipefail
          if [ -z "${SPARKLE_ED_PRIVKEY_B64}" ]; then
            echo "[appcast] SPARKLE_ED_PRIVKEY_B64 unset — cannot sign release appcast"
            echo "[appcast] (this is expected on fork PRs; the trunk CI run will sign + publish)"
            exit 0
          fi
          KEYDIR="$(mktemp -d)"
          printf "%s" "$SPARKLE_ED_PRIVKEY_B64" | base64 -d > "$KEYDIR/privkey.ed25519"
          # In a real release, installer-ci's macos-pkg job uploads the .pkg
          # artifacts; we pull them with gh CLI here. Placeholder: the
          # exact gh-run-id wiring lands in PR #348 follow-up
          # (#348-release-pipeline-glue) — Phase 1 only validates the
          # script + secret plumbing.
          echo "[appcast] Phase 1: signing wiring shipped; release-pipeline glue tracked in #348-release-pipeline-glue"
      - name: Upload smoke appcast.xml as artifact
        uses: actions/upload-artifact@v4
        with:
          name: appcast-smoke-${{ github.run_id }}
          path: |
            /tmp/appcast.xml
          if-no-files-found: ignore
          retention-days: 7

  gpu-mlx-build:
    name: gpu-mlx build (aarch64-apple-darwin)
    needs: fmt-clippy-test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon/target
          key: daemon-gpu-mlx-${{ hashFiles('daemon/Cargo.toml', 'daemon/rust-toolchain.toml', 'daemon/crates/**/Cargo.toml') }}
          restore-keys: |
            daemon-gpu-mlx-
      - name: rustup add target
        run: rustup target add aarch64-apple-darwin
      - name: cargo check (gpu-mlx feature on)
        run: cargo check -p iogrid-workload-gpu --features gpu-mlx --target aarch64-apple-darwin
      - name: cargo clippy (gpu-mlx feature on)
        run: cargo clippy -p iogrid-workload-gpu --features gpu-mlx --target aarch64-apple-darwin --all-targets -- -D warnings
      - name: cargo test (gpu-mlx feature on, integration tests skipped)
        run: cargo test -p iogrid-workload-gpu --features gpu-mlx --target aarch64-apple-darwin
