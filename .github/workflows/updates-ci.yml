name: updates-ci

# Build + push the `updates.iogrid.org` manifestd image and keep the
# ConfigMap manifest.json up-to-date when a new v* tag is pushed.
#
# Jobs:
#   build    — compile + smoke-test manifestd (all PRs + main pushes)
#   docker   — build + push ghcr.io/iogrid/updates-server (main only)
#   deploy   — rewrite deployment.yaml digest + restartedAt (main only)
#   manifest — regenerate configmap.yaml from GH Release assets (v* tags)
#
# Refs #485.

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "installer/auto-update/server/**"
      - "infra/k8s/base/updates/**"
      - ".github/workflows/updates-ci.yml"
  pull_request:
    paths:
      - "installer/auto-update/server/**"
      - "infra/k8s/base/updates/**"
      - ".github/workflows/updates-ci.yml"
  workflow_dispatch:

concurrency:
  group: updates-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: auto-update manifest server (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: installer/auto-update/server/go.sum

      - name: Build manifestd
        working-directory: installer/auto-update/server
        run: go build -o /tmp/manifestd ./...

      - name: Smoke-test manifestd
        run: |
          set -euo pipefail
          mkdir -p /tmp/manifest-root/0.1.0
          cp installer/auto-update/manifest.example.json /tmp/manifest-root/manifest.json
          echo -n fakebin > /tmp/manifest-root/0.1.0/iogridd-linux-amd64
          IOGRID_MANIFEST_PATH=/tmp/manifest-root/manifest.json \
          IOGRID_BINARY_DIR=/tmp/manifest-root \
          IOGRID_LISTEN=:18088 \
          /tmp/manifestd &
          sleep 1
          STATUS=$(curl -so /dev/null -w '%{http_code}' http://127.0.0.1:18088/healthz)
          test "${STATUS}" = "200" || (echo "healthz returned ${STATUS}"; exit 1)
          curl -fsS http://127.0.0.1:18088/manifest.json | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['version']==1, 'bad version'"
          echo "manifestd smoke test PASSED"

  docker:
    name: build · push updates-server image
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/iogrid/updates-server
          tags: |
            type=sha,format=long
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: installer/auto-update/server
          file: installer/auto-update/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=updates-server
          cache-to: type=gha,scope=updates-server,mode=max

  deploy:
    name: deploy · rewrite deployment digest
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve digest + timestamp
        id: vars
        env:
          DIGEST: ${{ needs.docker.outputs.digest }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/iogrid/updates-server@${DIGEST}"
          RESTARTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "image=${IMAGE}"            | tee -a "$GITHUB_OUTPUT"
          echo "restartedAt=${RESTARTED_AT}" | tee -a "$GITHUB_OUTPUT"

      - name: Rewrite deployment.yaml + push
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
          RESTARTED_AT: ${{ steps.vars.outputs.restartedAt }}
          COMMIT_SHA: ${{ github.sha }}
          MANIFEST: infra/k8s/base/updates/deployment.yaml
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          sed -i \
            -e "s|image: ghcr.io/iogrid/updates-server:.*|image: ${IMAGE}|" \
            -e "s|kubectl.kubernetes.io/restartedAt:.*|kubectl.kubernetes.io/restartedAt: \"${RESTARTED_AT}\"|" \
            "${MANIFEST}"

          git add "${MANIFEST}"
          git diff --cached --quiet && echo "no changes, skip commit" && exit 0

          MAX=5; ATTEMPT=0
          while [ $ATTEMPT -lt $MAX ]; do
            git commit -m "ci(updates): pin image to ${COMMIT_SHA:0:7} [skip ci]"
            git push origin main && break
            git fetch origin main && git rebase origin/main
            ATTEMPT=$((ATTEMPT + 1))
          done

  manifest-publish:
    name: manifest · update configmap.yaml from GH Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for release assets to be available
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Waiting for GH Release ${TAG} to exist..."
          for i in $(seq 1 20); do
            if gh release view "${TAG}" --json tagName -q .tagName 2>/dev/null; then
              echo "Release ${TAG} found."
              break
            fi
            echo "  attempt ${i}/20 — not yet. sleeping 15s..."
            sleep 15
          done

      - name: Compute SHA256 + sizes for daemon binaries
        id: artifacts
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"   # strip leading 'v'
          TMPDIR="$(mktemp -d)"

          # Target → GH asset name mapping (matches daemon-ci.yml artifact names).
          declare -A TARGETS=(
            ["aarch64-apple-darwin"]="iogridd-${VERSION}-aarch64-apple-darwin"
            ["x86_64-apple-darwin"]="iogridd-${VERSION}-x86_64-apple-darwin"
            ["x86_64-unknown-linux-gnu"]="iogridd-${VERSION}-x86_64-unknown-linux-gnu"
            ["aarch64-unknown-linux-gnu"]="iogridd-${VERSION}-aarch64-unknown-linux-gnu"
            ["x86_64-pc-windows-msvc"]="iogridd-${VERSION}-x86_64-pc-windows-msvc.exe"
          )

          ARTIFACTS_JSON="["
          FIRST=1
          for TARGET in "${!TARGETS[@]}"; do
            ASSET="${TARGETS[$TARGET]}"
            DEST="${TMPDIR}/${ASSET}"
            URL="https://github.com/iogrid/iogrid/releases/download/${TAG}/${ASSET}"

            if ! gh release download "${TAG}" --pattern "${ASSET}" --dir "${TMPDIR}" 2>/dev/null; then
              echo "WARNING: asset ${ASSET} not found in release ${TAG}, skipping"
              continue
            fi

            SHA256="$(sha256sum "${DEST}" | awk '{print $1}')"
            SIZE="$(stat -c%s "${DEST}")"

            [ $FIRST -eq 0 ] && ARTIFACTS_JSON="${ARTIFACTS_JSON},"
            ARTIFACTS_JSON="${ARTIFACTS_JSON}
              {
                \"target\": \"${TARGET}\",
                \"url\": \"${URL}\",
                \"sha256\": \"${SHA256}\",
                \"size_bytes\": ${SIZE}
              }"
            FIRST=0
          done
          ARTIFACTS_JSON="${ARTIFACTS_JSON}
            ]"

          # Write a JSON snippet for use in the next step.
          cat > "${TMPDIR}/artifacts.json" <<EOF
          ${ARTIFACTS_JSON}
          EOF
          echo "version=${VERSION}" | tee -a "$GITHUB_OUTPUT"
          echo "artifactsFile=${TMPDIR}/artifacts.json" | tee -a "$GITHUB_OUTPUT"

      - name: Generate updated configmap.yaml
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.artifacts.outputs.version }}
          ARTIFACTS_FILE: ${{ steps.artifacts.outputs.artifactsFile }}
        run: |
          set -euo pipefail
          ISSUED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ARTIFACTS="$(cat "${ARTIFACTS_FILE}")"

          python3 - <<PYEOF
          import json, sys, textwrap

          with open("${ARTIFACTS_FILE}") as f:
              artifacts = json.load(f)

          manifest = {
              "version": 1,
              "channel": "stable",
              "issued_at": "${ISSUED_AT}",
              "releases": [
                  {
                      "version": "${VERSION}",
                      "min_supported_from": "0.0.1",
                      "release_notes_url": f"https://iogrid.org/releases/${VERSION}",
                      "artifacts": artifacts,
                  }
              ],
          }

          manifest_json = json.dumps(manifest, indent=2)
          # Indent each line of manifest.json to fit inside the ConfigMap data: | block.
          indented = "\n".join("    " + l for l in manifest_json.splitlines())

          configmap = f"""---
          # AUTO-GENERATED by updates-ci.yml manifest-publish job on tag ${TAG}.
          # Do not edit manually — the next tag push will overwrite this file.
          # Refs #485.
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: updates-manifest
            namespace: iogrid
            labels:
              app.kubernetes.io/name: updates
              app.kubernetes.io/part-of: iogrid
              app.kubernetes.io/component: updates
          data:
            manifest.json: |
          {indented}
          """
          with open("infra/k8s/base/updates/configmap.yaml", "w") as f:
              f.write(textwrap.dedent(configmap))
          print("configmap.yaml written.")
          PYEOF

      - name: Commit + push updated configmap.yaml
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/base/updates/configmap.yaml
          git diff --cached --quiet && echo "no changes, skip commit" && exit 0

          MAX=5; ATTEMPT=0
          while [ $ATTEMPT -lt $MAX ]; do
            git commit -m "ci(updates): publish manifest for ${TAG} [skip ci]"
            git push origin main && break
            git fetch origin main && git rebase origin/main
            ATTEMPT=$((ATTEMPT + 1))
          done
          echo "configmap.yaml pushed to main — Flux will reconcile within ~1 min."
