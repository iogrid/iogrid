name: identity-svc-integration

# Integration tests for identity-svc. The default coordinator-ci workflow
# runs unit tests across every module; this workflow stands up Postgres
# (via the dockertest harness inside the test) and exercises the auth
# Service end-to-end: magic-link round-trip, refresh rotation, and the
# Google→magic-link auto-merge path.
#
# Triggered only when identity-svc itself changes — avoids burning
# minutes on every unrelated PR.

on:
  push:
    branches: [main]
    paths:
      - 'coordinator/services/identity-svc/**'
      - 'coordinator/shared/**'
      - '.github/workflows/identity-svc-integration.yml'
  pull_request:
    paths:
      - 'coordinator/services/identity-svc/**'
      - 'coordinator/shared/**'
      - '.github/workflows/identity-svc-integration.yml'

permissions:
  contents: read

concurrency:
  group: identity-svc-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: integration (dockertest postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: |
            coordinator/services/identity-svc/go.sum

      # Docker is pre-installed on ubuntu-latest runners; dockertest
      # talks to the same socket. No extra setup needed.

      - name: integration tests
        working-directory: coordinator/services/identity-svc
        run: |
          go test -tags=integration -count=1 -v ./...
