name: releases-ci

# Build + push the `releases.iogrid.org` redirect image and rewrite the
# deployment manifest to pin the freshly built digest. Mirrors
# marketing-ci's three-stage shape (build → docker → deploy) but with a
# single thin nginx step — no Next.js / pnpm cycle.
#
# Refs #392.

on:
  push:
    branches: [main]
    paths:
      - "releases/**"
      - ".github/workflows/releases-ci.yml"
    # Deliberately do NOT list `infra/**` here — the `deploy` job below
    # pushes a manifest rewrite that touches `infra/k8s/base/releases/`;
    # listing infra paths would trigger an infinite CI loop. Same pattern
    # as marketing-ci.yml.
  pull_request:
    paths:
      - "releases/**"
      - ".github/workflows/releases-ci.yml"
  workflow_dispatch:

concurrency:
  group: releases-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: nginx config lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: nginx -t (config syntax)
        run: |
          # Run nginx inside the same alpine image we ship with the
          # production conf mounted. -t exits non-zero on any syntax
          # error or directive in the wrong block, catching trivial
          # mistakes before docker build.
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/releases/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.27-alpine nginx -t

  docker:
    # Build + push ghcr.io/iogrid/releases. Mirrors marketing-ci's
    # docker job step-for-step; the only difference is the build
    # context (./releases) and the image name.
    name: build · push releases image
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/iogrid/releases
          tags: |
            type=sha,format=long
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          # The Dockerfile COPYs ./releases/nginx.conf into the image —
          # use the repo root as the build context so the relative path
          # resolves the same way it does in `docker build .` locally.
          context: .
          file: releases/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=releases
          cache-to: type=gha,scope=releases,mode=max

  deploy:
    # Rewrite infra/k8s/base/releases/deployment.yaml to pin the
    # freshly pushed digest + bump restartedAt, then push back to main
    # so Flux's kustomize-controller rolls the pods. Same shape as
    # marketing-ci's deploy job — keep the two in lockstep so a future
    # CI consolidation can fold them into one composite action.
    runs-on: ubuntu-latest
    needs: docker
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout main (full history for rebase loop)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve digest + timestamp
        id: vars
        env:
          DIGEST: ${{ needs.docker.outputs.digest }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ -z "${DIGEST:-}" ]; then
            if [ "${EVENT}" = "pull_request" ]; then
              DIGEST="sha256:<resolved-on-merge-to-main>"
            else
              echo "::error::docker job did not emit a digest output on event=${EVENT}" >&2
              exit 1
            fi
          fi
          IMAGE="ghcr.io/iogrid/releases@${DIGEST}"
          RESTARTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "image=${IMAGE}"            | tee -a "$GITHUB_OUTPUT"
          echo "restartedAt=${RESTARTED_AT}" | tee -a "$GITHUB_OUTPUT"

      - name: Preview manifest bump (dry-run on PRs)
        if: github.event_name == 'pull_request'
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
          RESTARTED_AT: ${{ steps.vars.outputs.restartedAt }}
        run: |
          set -euo pipefail
          echo "── PR dry-run: releases-ci would rewrite infra/k8s/base/releases/deployment.yaml as ──"
          echo "    image            -> ${IMAGE}"
          echo "    restartedAt      -> ${RESTARTED_AT}"
          echo "── (no commit will be pushed on PR builds) ──"

      - name: Rewrite manifest + commit + push (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
          RESTARTED_AT: ${{ steps.vars.outputs.restartedAt }}
          COMMIT_SHA: ${{ github.sha }}
          MANIFEST: infra/k8s/base/releases/deployment.yaml
        run: |
          set -euo pipefail

          python3 - <<PY
          import re, sys, pathlib
          p = pathlib.Path("${MANIFEST}")
          src = p.read_text()

          img_pat = re.compile(r'(\s+image:\s+)(?:ghcr\.io|harbor\.openova\.io)/iogrid/releases[:@][^\s]+')
          new_src, n_img = img_pat.subn(r'\g<1>${IMAGE}', src, count=1)
          if n_img != 1:
              print(f"::error::image line substitution count={n_img}, expected 1", file=sys.stderr)
              sys.exit(1)

          ts_pat = re.compile(r'(kubectl\.kubernetes\.io/restartedAt:\s+")[^"]*(")')
          new_src, n_ts = ts_pat.subn(r'\g<1>${RESTARTED_AT}\g<2>', new_src, count=1)
          if n_ts != 1:
              print(f"::error::restartedAt substitution count={n_ts}, expected 1", file=sys.stderr)
              sys.exit(1)

          p.write_text(new_src)
          print(f"Rewrote {p}: image={n_img} subs, restartedAt={n_ts} subs")
          PY

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet "${MANIFEST}"; then
            echo "Manifest already matches the freshly built image — nothing to commit."
            exit 0
          fi

          git add "${MANIFEST}"
          COMMIT_MSG="infra(releases): deploy ${IMAGE} after CI ${COMMIT_SHA}

          Auto-generated by releases-ci on push to main. Pins the
          releases Deployment to the freshly built+pushed image digest
          so Flux's kustomize-controller rolls the pods on the next
          reconcile interval.

          Refs #392."
          git commit -m "${COMMIT_MSG}"

          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed deploy bump on attempt ${attempt}."
              exit 0
            fi
            echo "Push attempt ${attempt} rejected — rebasing onto origin/main."
            git fetch origin main
            git rebase origin/main || {
              echo "::error::rebase conflict on deploy-bot commit; aborting."
              git rebase --abort || true
              exit 1
            }
            sleep $((attempt * 2))
          done
          echo "::error::failed to push deploy bump after 5 attempts"
          exit 1
