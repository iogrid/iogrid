name: ghcr-pull-rotator

# Mints a fresh ghcr.io-compatible token from this workflow's
# GITHUB_TOKEN (which has packages:read on the iogrid org) and patches
# the cluster's `ghcr-pull` Secret. Then rolls every deployment that
# depends on it so the new images land.
#
# Why this exists: the cluster's `ghcr-pull` Secret was minted from a
# user PAT (hatiyildiz) that was revoked. Re-issuing user PATs requires
# either SAML/SSO authorization (browser flow) or org-admin web-UI
# manipulation. The workflow GITHUB_TOKEN sidesteps both — it's
# auto-issued per run, has packages:read on the iogrid org because the
# workflow runs in iogrid CI context, and is good for the ~1h run TTL.
#
# Cadence: every 45 minutes (under the 1h token TTL with a safety
# margin). Workflow_dispatch trigger also exposed so the operator can
# force-rotate immediately.
#
# Auth: pushes to the cluster via a service-account kubeconfig stored
# in GHA Secret IOGRID_KUBECONFIG_B64. The SA `ghcr-pull-rotator` in
# the iogrid namespace has patch-only permission on Secret/ghcr-pull
# and patch on Deployments — minimum-blast-radius RBAC, NOT full
# admin.
#
# Closes #454 end-to-end without any web-UI intervention.

on:
  schedule:
    - cron: "*/45 * * * *"
  workflow_dispatch: {}

permissions:
  packages: read
  contents: read

concurrency:
  group: ghcr-pull-rotator
  cancel-in-progress: false

jobs:
  rotate:
    name: rotate ghcr-pull secret + roll deployments
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Wire kubeconfig
        env:
          KCFG_B64: ${{ secrets.IOGRID_KUBECONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          echo "$KCFG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context
          kubectl auth can-i patch secrets/ghcr-pull -n iogrid

      - name: Verify GITHUB_TOKEN can pull from ghcr.io
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BEARER=$(curl -sS -u "x:$GHCR_TOKEN" \
            "https://ghcr.io/token?scope=repository:iogrid/identity-svc:pull&service=ghcr.io" \
            | python3 -c 'import sys,json;print(json.load(sys.stdin)["token"])')
          echo "Bearer token minted (${#BEARER} chars)"
          curl -sS -H "Authorization: Bearer $BEARER" \
            "https://ghcr.io/v2/iogrid/identity-svc/manifests/latest" \
            | head -3

      - name: Patch ghcr-pull Secret with fresh credential
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          AUTH=$(printf 'x:%s' "$GHCR_TOKEN" | base64 -w0)
          DOCKERCFG=$(printf '{"auths":{"ghcr.io":{"username":"x","password":"%s","auth":"%s"}}}' "$GHCR_TOKEN" "$AUTH")
          DOCKERCFG_B64=$(echo -n "$DOCKERCFG" | base64 -w0)
          kubectl -n iogrid patch secret ghcr-pull --type='json' \
            -p="[{\"op\":\"replace\",\"path\":\"/data/.dockerconfigjson\",\"value\":\"$DOCKERCFG_B64\"}]"
          echo "ghcr-pull patched at $(date -u +%FT%TZ)"

      - name: Pre-cache all desired images on the cluster node while token is valid
        # Critical: the workflow GITHUB_TOKEN dies when this job ends.
        # If we only patch ghcr-pull + roll deployments, the new pods
        # try to pull AFTER the token has expired → 403. Solution: spin
        # up a one-shot Pod that uses the fresh ghcr-pull to pull EVERY
        # image we need, RIGHT NOW while the token is still valid.
        # containerd caches the layers on the node. Future pods using
        # those images skip the network pull entirely → no auth needed.
        run: |
          set -e
          # Collect the live cluster's desired image refs (what each
          # Deployment expects).
          mapfile -t IMAGES < <(kubectl -n iogrid get deploy -o json \
            | jq -r '.items[].spec.template.spec.containers[].image' \
            | grep '^ghcr.io/iogrid/' | sort -u)
          echo "${#IMAGES[@]} unique images to pre-cache:"
          printf '  %s\n' "${IMAGES[@]}"

          # Build a single Pod with one init-container per image. Init
          # containers run sequentially; each just exits immediately
          # after kubelet pulls the image. Total wall-time ≈ pull-time
          # × N images (~3-5 min for 13 images on a stable network).
          POD_NAME="ghcr-image-warmer-$(date +%s)"
          {
            cat <<HEADER
          apiVersion: v1
          kind: Pod
          metadata:
            name: $POD_NAME
            namespace: iogrid
          spec:
            restartPolicy: Never
            imagePullSecrets:
              - name: ghcr-pull
            securityContext:
              runAsNonRoot: true
              runAsUser: 65532
              seccompProfile:
                type: RuntimeDefault
            initContainers:
          HEADER
            i=0
            for img in "${IMAGES[@]}"; do
              cat <<INIT
              - name: warm-$i
                image: $img
                command: ["sh","-c","true"]
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop: ["ALL"]
          INIT
              i=$((i+1))
            done
            cat <<TAIL
            containers:
              - name: done
                image: busybox:1.36
                command: ["sh","-c","echo all warmed"]
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop: ["ALL"]
          TAIL
          } > /tmp/warmer.yaml
          cat /tmp/warmer.yaml | head -20
          kubectl apply -f /tmp/warmer.yaml

          # Wait up to 10min for the Pod to complete — kubelet sequentially
          # pulls each init-container's image, layer cache lands on the node.
          kubectl -n iogrid wait --for=condition=Ready=true \
            pod/$POD_NAME --timeout=600s 2>&1 || true
          # Even if Ready times out (e.g., a single image really is
          # broken), the warming pulls that DID succeed cache their layers.
          echo "--- warmer pod status ---"
          kubectl -n iogrid get pod $POD_NAME -o wide
          echo "--- per-image pull state ---"
          kubectl -n iogrid get pod $POD_NAME -o json | jq -r \
            '.status.initContainerStatuses[]? | "  \(.image): \(.state | keys[0])"'
          # Cleanup
          kubectl -n iogrid delete pod $POD_NAME --grace-period=0 --force 2>&1 || true

      - name: Roll stuck deployments
        run: |
          set +e
          for deploy in identity-svc providers-svc workloads-svc \
                       antiabuse-svc billing-svc telemetry-svc \
                       gateway-bff proxy-gateway web admin releases; do
            unready=$(kubectl -n iogrid get pods -l app.kubernetes.io/name=$deploy \
              -o json 2>/dev/null \
              | jq '[.items[]?.status.containerStatuses[]? | select(.ready==false)] | length' 2>/dev/null)
            unready=${unready:-0}
            if [ "$unready" -gt 0 ]; then
              echo "rolling deploy/$deploy ($unready non-ready pod(s))"
              kubectl -n iogrid rollout restart deploy/$deploy 2>&1 | head -1
            else
              echo "deploy/$deploy all ready, skipping roll"
            fi
          done
