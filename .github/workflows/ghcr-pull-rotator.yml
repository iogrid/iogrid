name: ghcr-pull-rotator

# Mints a fresh ghcr.io-compatible token from this workflow's
# GITHUB_TOKEN (which has packages:read on the iogrid org) and patches
# the cluster's `ghcr-pull` Secret. Then rolls every deployment that
# depends on it so the new images land.
#
# Why this exists: the cluster's `ghcr-pull` Secret was minted from a
# user PAT (hatiyildiz) that was revoked. Re-issuing user PATs requires
# either SAML/SSO authorization (browser flow) or org-admin web-UI
# manipulation. The workflow GITHUB_TOKEN sidesteps both — it's
# auto-issued per run, has packages:read on the iogrid org because the
# workflow runs in iogrid CI context, and is good for the ~1h run TTL.
#
# Cadence: every 45 minutes (under the 1h token TTL with a safety
# margin). Workflow_dispatch trigger also exposed so the operator can
# force-rotate immediately.
#
# Auth: pushes to the cluster via a service-account kubeconfig stored
# in GHA Secret IOGRID_KUBECONFIG_B64. The SA `ghcr-pull-rotator` in
# the iogrid namespace has patch-only permission on Secret/ghcr-pull
# and patch on Deployments — minimum-blast-radius RBAC, NOT full
# admin.
#
# Closes #454 end-to-end without any web-UI intervention.

on:
  schedule:
    - cron: "*/45 * * * *"
  workflow_dispatch: {}

permissions:
  packages: read
  contents: read

concurrency:
  group: ghcr-pull-rotator
  cancel-in-progress: false

jobs:
  rotate:
    name: rotate ghcr-pull secret + roll deployments
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Wire kubeconfig
        env:
          KCFG_B64: ${{ secrets.IOGRID_KUBECONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          echo "$KCFG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context
          kubectl auth can-i patch secrets/ghcr-pull -n iogrid

      - name: Verify GITHUB_TOKEN can pull from ghcr.io
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BEARER=$(curl -sS -u "x:$GHCR_TOKEN" \
            "https://ghcr.io/token?scope=repository:iogrid/identity-svc:pull&service=ghcr.io" \
            | python3 -c 'import sys,json;print(json.load(sys.stdin)["token"])')
          echo "Bearer token minted (${#BEARER} chars)"
          curl -sS -H "Authorization: Bearer $BEARER" \
            "https://ghcr.io/v2/iogrid/identity-svc/manifests/latest" \
            | head -3

      - name: Patch ghcr-pull Secret with fresh credential
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          AUTH=$(printf 'x:%s' "$GHCR_TOKEN" | base64 -w0)
          DOCKERCFG=$(printf '{"auths":{"ghcr.io":{"username":"x","password":"%s","auth":"%s"}}}' "$GHCR_TOKEN" "$AUTH")
          DOCKERCFG_B64=$(echo -n "$DOCKERCFG" | base64 -w0)
          kubectl -n iogrid patch secret ghcr-pull --type='json' \
            -p="[{\"op\":\"replace\",\"path\":\"/data/.dockerconfigjson\",\"value\":\"$DOCKERCFG_B64\"}]"
          echo "ghcr-pull patched at $(date -u +%FT%TZ)"

      - name: Roll deployments stuck on ErrImagePull
        run: |
          set +e
          for deploy in identity-svc providers-svc workloads-svc \
                       antiabuse-svc billing-svc telemetry-svc \
                       gateway-bff proxy-gateway web admin releases; do
            # only roll if any pod for this deploy is non-Ready
            unready=$(kubectl -n iogrid get pods -l app.kubernetes.io/name=$deploy \
              -o json 2>/dev/null | python3 -c 'import sys,json
try:
    d=json.load(sys.stdin)
    n=sum(1 for p in d.get("items",[])
          if any(not c.get("ready",False) for c in p.get("status",{}).get("containerStatuses",[])))
    print(n)
except Exception:
    print(0)' )
            if [ "${unready:-0}" -gt 0 ]; then
              echo "rolling deploy/$deploy ($unready non-ready pod(s))"
              kubectl -n iogrid rollout restart deploy/$deploy 2>&1 | head -1
            else
              echo "deploy/$deploy all ready, skipping roll"
            fi
          done
