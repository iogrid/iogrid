name: probe-asc-privacy-v3
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: macos-latest
    timeout-minutes: 5
    env:
      ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_KEY:       ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
    steps:
      - name: Probe more privacy paths
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json
          tok = jwt.encode(
              {'iss': os.environ['ASC_ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
              base64.b64decode(os.environ['ASC_KEY']), algorithm='ES256',
              headers={'kid': os.environ['ASC_KEY_ID']})
          H = {'Authorization': f'Bearer {tok}'}
          BASE = 'https://api.appstoreconnect.apple.com'
          APP = '6775617937'
          for path in [
              f'/v1/apps/{APP}?include=appInfos.appInfoLocalizations',
              f'/v1/apps/{APP}?include=preReleaseVersions,builds',
              f'/v1/apps/{APP}/appPriceTier',
              f'/v1/apps/{APP}/appAvailability',
              f'/v1/apps/{APP}/marketingURL',
              f'/v1/apps/{APP}/privacyPolicyUrl',
              f'/v1/apps/{APP}/customerReviewSummarizations',
              f'/v1/apps/{APP}/appShelf',
              f'/v1/apps/{APP}/datasourceUsages',
              f'/v1/apps/{APP}/appPrivacyChoices',
          ]:
              try:
                  r = requests.get(BASE+path, headers=H, timeout=15)
                  print(f'GET {path} → HTTP {r.status_code}')
                  if 200 <= r.status_code < 400:
                      body = r.json()
                      if 'included' in body:
                          types = sorted({inc['type'] for inc in body['included']})
                          print(f'  included types: {types}')
                      print(f'  body: {r.text[:300]}')
              except Exception as e:
                  print(f'  err: {e}')
          PY
