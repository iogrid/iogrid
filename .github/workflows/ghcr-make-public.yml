name: ghcr-make-public

# One-shot workflow to flip every iogrid/* container package's visibility
# from private to public, run from inside the iogrid org's Actions context
# where the GITHUB_TOKEN has packages:write scope on the iogrid org.
#
# Cluster impact: once all packages are public, the cluster pulls each
# image anonymously — no `ghcr-pull` Secret needed, no per-user
# package-access grant needed. Unblocks #454 (revoked hatiyildiz PAT)
# AND #426 (admin package visibility) in one shot.
#
# Trigger: workflow_dispatch (manual) so it only fires when the operator
# explicitly wants to flip visibility. NOT scheduled.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, only list current visibility; don't change anything."
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  packages: write
  contents: read

jobs:
  flip:
    name: flip container packages → public
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: List current container packages and their visibility
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # The org has multiple container packages; the canonical set
          # the cluster pulls (per infra/k8s/base/*/deployment.yaml):
          PACKAGES=(
            identity-svc
            providers-svc
            workloads-svc
            antiabuse-svc
            billing-svc
            telemetry-svc
            gateway-bff
            proxy-gateway
            vpn-gateway
            build-gateway
            web
            admin
            releases
          )
          echo "=== current visibility ==="
          for pkg in "${PACKAGES[@]}"; do
            vis=$(gh api "/orgs/iogrid/packages/container/$pkg" --jq '.visibility' 2>/dev/null || echo "<not-found>")
            printf "  %-15s %s\n" "$pkg" "$vis"
          done

      - name: Flip each package to public
        if: ${{ inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          PACKAGES=(
            identity-svc
            providers-svc
            workloads-svc
            antiabuse-svc
            billing-svc
            telemetry-svc
            gateway-bff
            proxy-gateway
            vpn-gateway
            build-gateway
            web
            admin
            releases
          )
          for pkg in "${PACKAGES[@]}"; do
            echo "=== $pkg ==="
            # Two API forms exist in the wild for this op; try both
            # so we land on whichever ghcr accepts.
            (
              gh api -X PATCH "/orgs/iogrid/packages/container/$pkg" \
                  -f visibility=public 2>&1 \
              || gh api -X PATCH "/orgs/iogrid/packages/container/$pkg/visibility" \
                  -f visibility=public 2>&1 \
              || gh api -X POST "/orgs/iogrid/packages/container/$pkg/visibility" \
                  -f visibility=public 2>&1 \
              || echo "FAILED: $pkg — neither PATCH nor POST visibility endpoint accepted by ghcr"
            ) | head -5
          done

      - name: Verify final visibility
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGES=(
            identity-svc providers-svc workloads-svc antiabuse-svc
            billing-svc telemetry-svc gateway-bff proxy-gateway
            vpn-gateway build-gateway web admin releases
          )
          echo "=== final visibility ==="
          for pkg in "${PACKAGES[@]}"; do
            vis=$(gh api "/orgs/iogrid/packages/container/$pkg" --jq '.visibility' 2>/dev/null || echo "<not-found>")
            printf "  %-15s %s\n" "$pkg" "$vis"
          done
