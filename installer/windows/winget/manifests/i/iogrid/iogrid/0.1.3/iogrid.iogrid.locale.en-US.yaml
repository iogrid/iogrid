ShortDescription: Peer-to-peer compute + bandwidth mesh — VPN, residential proxy, distributed compute
Description: |-
  iogrid is a peer-to-peer network where home PC/Mac owners share idle
  compute and bandwidth with enterprise customers in exchange for cash,
  free unlimited VPN, or charity contributions. The Windows installer
  bundles the provider daemon (iogridd) and the customer-side CLI
  (iogrid). After install, run `iogrid login` then
  `iogrid vpn run --region us-east-1` to bring up a VPN tunnel routed
  through a paired residential provider.
